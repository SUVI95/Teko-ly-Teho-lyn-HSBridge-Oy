<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin · Opiskelijoiden bannerit</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#181510;--ink2:#2E2820;
  --sand:#F5F0E8;--sand2:#EDE8DE;--sand3:#DDD6CA;
  --rust:#B54E28;--rust-l:#D4693F;--rust-pale:#F7EDE6;
  --forest:#2D5C4A;--forest-l:#3D7A63;
  --text:#241E18;--muted:#7A6E60;--border:#D8D0C4;--white:#FFF;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--sand);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;}

.top{background:var(--ink);color:var(--white);padding:24px 36px;display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;}
.top h1{font-family:'Fraunces',serif;font-size:24px;font-weight:900;}
.top .back{color:rgba(255,255,255,0.7);text-decoration:none;font-size:13px;padding:8px 14px;border:1px solid rgba(255,255,255,0.2);border-radius:6px;}
.top .back:hover{background:rgba(255,255,255,0.1);color:#fff;}

.wrap{max-width:1200px;margin:0 auto;padding:32px 28px;}

.toolbar{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:22px;}
.toolbar label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.toolbar select,.toolbar input{border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-family:inherit;font-size:14px;background:var(--white);color:var(--text);}
.toolbar button{background:var(--ink);color:var(--white);border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;}
.toolbar button:hover{background:var(--rust);}
.toolbar .count{margin-left:auto;font-size:13px;color:var(--muted);}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,0.04);transition:all .2s;}
.card:hover{box-shadow:0 4px 18px rgba(0,0,0,0.08);transform:translateY(-1px);}
.thumb{width:100%;height:120px;background:var(--sand2);overflow:hidden;cursor:zoom-in;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.meta{padding:14px 16px;}
.meta .who{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.meta .email{font-size:12px;color:var(--muted);margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.meta .row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);gap:8px;}
.meta .row strong{color:var(--ink);}

.empty{background:var(--white);border:1px dashed var(--border);border-radius:12px;padding:42px 24px;text-align:center;color:var(--muted);}

.loading{text-align:center;padding:48px 0;color:var(--muted);}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(20,20,20,0.88);z-index:9999;display:none;align-items:center;justify-content:center;padding:24px;}
.modal.show{display:flex;}
.modal-inner{max-width:1100px;max-height:92vh;background:var(--white);border-radius:14px;padding:18px;position:relative;display:flex;flex-direction:column;gap:12px;}
.modal-inner img{max-width:100%;max-height:78vh;object-fit:contain;border-radius:8px;background:var(--sand2);}
.modal-close{position:absolute;top:10px;right:10px;background:var(--ink);color:var(--white);border:none;border-radius:50%;width:34px;height:34px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.modal-meta{font-size:13px;color:var(--muted);text-align:center;}
.modal-meta strong{color:var(--ink);}

@media(max-width:680px){
  .top{padding:16px 20px;}
  .wrap{padding:20px 16px;}
  .grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));}
}
</style>
</head>
<body>

<div class="top">
  <h1>🎨 Opiskelijoiden bannerit</h1>
  <a href="/admin" class="back">← Admin-hallintapaneeli</a>
</div>

<div class="wrap">
  <div class="toolbar">
    <label>Moduuli</label>
    <select id="modSel">
      <option value="moduuli-minna-b">Moduuli B — Minna</option>
      <option value="">Kaikki</option>
    </select>
    <label>Tyyppi</label>
    <select id="keySel">
      <option value="canva-banner">Canva-banneri</option>
      <option value="">Kaikki</option>
    </select>
    <button onclick="loadList()">Päivitä</button>
    <span class="count" id="count"></span>
  </div>

  <div id="content"><div class="loading">Ladataan…</div></div>
</div>

<div class="modal" id="modal" onclick="if(event.target.id==='modal')closeModal()">
  <div class="modal-inner">
    <button class="modal-close" onclick="closeModal()" aria-label="Sulje">×</button>
    <img id="modalImg" alt="Banneri">
    <div class="modal-meta" id="modalMeta"></div>
  </div>
</div>

<script>
function fmtDate(s){
  if(!s)return '';
  try{return new Date(s).toLocaleString('fi-FI');}catch(e){return s;}
}
function fmtSize(b){
  if(!b)return '';
  if(b<1024)return b+' B';
  if(b<1024*1024)return Math.round(b/1024)+' KB';
  return (b/1024/1024).toFixed(1)+' MB';
}
function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function loadList(){
  const moduleId=document.getElementById('modSel').value;
  const artifactKey=document.getElementById('keySel').value;
  const params=new URLSearchParams();
  if(moduleId)params.set('moduleId',moduleId);
  if(artifactKey)params.set('artifactKey',artifactKey);
  const content=document.getElementById('content');
  const count=document.getElementById('count');
  content.innerHTML='<div class="loading">Ladataan…</div>';
  count.textContent='';
  try{
    const r=await fetch('/api/artifacts/admin/list?'+params.toString(),{credentials:'include'});
    if(r.status===403){content.innerHTML='<div class="empty">Ei oikeuksia.</div>';return;}
    if(!r.ok){throw new Error('HTTP '+r.status);}
    const data=await r.json();
    const items=Array.isArray(data.items)?data.items:[];
    count.textContent=items.length+' kpl';
    if(items.length===0){
      content.innerHTML='<div class="empty">Ei vielä ladattuja bannereita tällä suodatuksella.</div>';
      return;
    }
    const grid=document.createElement('div');
    grid.className='grid';
    items.forEach(it=>{
      const card=document.createElement('div');
      card.className='card';
      const img='/api/artifacts/admin/image/'+it.id;
      const who=escapeHtml(it.name||'(nimetön)');
      const email=escapeHtml(it.email||'');
      const fname=escapeHtml(it.filename||'banner');
      const sizeText=escapeHtml(fmtSize(it.size_bytes));
      const when=escapeHtml(fmtDate(it.updated_at));
      card.innerHTML=
        '<div class="thumb"><img src="'+img+'" alt="Banner" loading="lazy"></div>'+
        '<div class="meta">'+
          '<div class="who">'+who+'</div>'+
          '<div class="email">'+email+'</div>'+
          '<div class="row"><span><strong>'+fname+'</strong></span><span>'+sizeText+'</span></div>'+
          '<div class="row" style="margin-top:4px"><span>'+when+'</span></div>'+
        '</div>';
      card.querySelector('.thumb').addEventListener('click',()=>openModal(it));
      grid.appendChild(card);
    });
    content.innerHTML='';
    content.appendChild(grid);
  }catch(e){
    content.innerHTML='<div class="empty">Virhe latauksessa: '+escapeHtml(e.message)+'</div>';
  }
}

function openModal(it){
  document.getElementById('modalImg').src='/api/artifacts/admin/image/'+it.id;
  document.getElementById('modalMeta').innerHTML=
    '<strong>'+escapeHtml(it.name||'')+'</strong> · '+escapeHtml(it.email||'')+
    ' · '+escapeHtml(it.filename||'')+' · '+escapeHtml(fmtSize(it.size_bytes))+
    ' · '+escapeHtml(fmtDate(it.updated_at));
  document.getElementById('modal').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('modal').classList.remove('show');
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

loadList();
</script>
</body>
</html>
