<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Loppumoduuli</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f5f3ef;color:#1a1a2e;font-family:'DM Sans',sans-serif;padding:2rem;line-height:1.6;}
header{max-width:1280px;margin:0 auto 2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;}
header h1{font-family:'DM Serif Display',serif;font-size:2rem;font-weight:400;}
header .sub{font-family:'DM Mono',monospace;font-size:0.75rem;color:#6b6880;letter-spacing:0.12em;text-transform:uppercase;}
header a{color:#c75b3a;text-decoration:none;font-size:0.9rem;font-weight:500;}
header a:hover{text-decoration:underline;}

.wrap{max-width:1280px;margin:0 auto;}
.empty{background:#fff;border:1px solid rgba(26,26,46,0.12);border-radius:12px;padding:3rem;text-align:center;color:#6b6880;box-shadow:0 2px 20px rgba(26,26,46,0.06);}
.nav-links{max-width:1280px;margin:0 auto 1.25rem;display:flex;gap:.75rem;flex-wrap:wrap;}
.nav-links a{background:#fff;border:1px solid rgba(26,26,46,0.12);color:#1a1a2e;text-decoration:none;padding:.45rem .85rem;border-radius:999px;font-size:.8rem;font-weight:500;}
.nav-links a:hover{border-color:#c75b3a;color:#c75b3a;}

.student{background:#fff;border:1px solid rgba(26,26,46,0.12);border-radius:14px;padding:1.75rem;margin-bottom:1.25rem;box-shadow:0 2px 20px rgba(26,26,46,0.06);}
.head{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:0.75rem;border-bottom:1px solid rgba(26,26,46,0.08);padding-bottom:1rem;margin-bottom:1.25rem;}
.who{display:flex;flex-direction:column;gap:0.25rem;}
.name{font-family:'DM Serif Display',serif;font-size:1.35rem;color:#1a1a2e;}
.email{font-family:'DM Mono',monospace;font-size:0.78rem;color:#6b6880;}
.stats{display:flex;gap:.5rem;flex-wrap:wrap;}
.chip{font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;padding:.3rem .65rem;border-radius:999px;border:1px solid rgba(26,26,46,.15);background:#faf8f4;color:#6b6880;}
.chip.on{background:#2a7a4b;color:#fff;border-color:#2a7a4b;}

.section{margin-top:1.25rem;}
.block-title{font-family:'DM Mono',monospace;font-size:0.72rem;font-weight:500;color:#c75b3a;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:0.85rem;display:flex;align-items:center;gap:.6rem;}
.block-title .count{background:#c75b3a;color:#fff;border-radius:999px;font-size:.68rem;padding:.12rem .55rem;letter-spacing:.05em;}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;}
@media(max-width:860px){.grid{grid-template-columns:1fr;}}

.map-list{display:flex;flex-direction:column;gap:0.6rem;}
.map-item{display:flex;align-items:center;justify-content:space-between;padding:0.75rem 1rem;background:#faf8f4;border:1px solid rgba(26,26,46,0.08);border-radius:10px;gap:1rem;}
.map-item .label{display:flex;flex-direction:column;gap:0.15rem;min-width:0;}
.map-item .lbl-top{font-weight:600;font-size:0.9rem;color:#1a1a2e;}
.map-item .lbl-sub{font-family:'DM Mono',monospace;font-size:0.73rem;color:#6b6880;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pdf-link{display:inline-flex;align-items:center;gap:6px;color:#c75b3a;text-decoration:none;font-weight:600;font-size:0.82rem;padding:6px 12px;border:1px solid rgba(199,91,58,0.3);border-radius:6px;background:rgba(199,91,58,0.05);flex-shrink:0;}
.pdf-link:hover{background:#c75b3a;color:#fff;border-color:#c75b3a;}
.missing{font-size:0.78rem;color:#a0a0b0;font-style:italic;}

.qa-list{display:flex;flex-direction:column;gap:1rem;}
.qa-item .q{font-family:'DM Mono',monospace;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#6b6880;margin-bottom:0.3rem;}
.qa-item .a{background:#f0fff4;border:1px solid rgba(42,122,75,0.18);border-radius:8px;padding:0.75rem 0.95rem;font-size:0.9rem;color:#1a1a2e;line-height:1.55;white-space:pre-wrap;}
.qa-item.q1 .a{background:#f0fff4;border-color:rgba(42,122,75,0.2);}
.qa-item.q2 .a{background:#fff7ed;border-color:rgba(199,91,58,0.2);}
.qa-item.q3 .a{background:#eff6ff;border-color:rgba(37,99,168,0.2);}

.reflect-box{background:#faf8f4;border:1px solid rgba(26,26,46,0.08);border-radius:10px;padding:1rem 1.1rem;font-size:.92rem;line-height:1.7;white-space:pre-wrap;color:#1a1a2e;max-height:260px;overflow:auto;}
.answers-kuulustelu{margin-top:.75rem;}
.answers-kuulustelu details{background:#fff;border:1px solid rgba(26,26,46,0.08);border-radius:8px;padding:.6rem .85rem;margin-top:.4rem;}
.answers-kuulustelu summary{cursor:pointer;font-family:'DM Mono',monospace;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:#6b6880;}
.answers-kuulustelu ol{margin:.75rem 0 0 1.2rem;padding:0;}
.answers-kuulustelu li{margin-bottom:.6rem;font-size:.9rem;}
.answers-kuulustelu li b{display:block;color:#6b6880;font-weight:500;font-size:.8rem;margin-bottom:.15rem;}

.gal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.85rem;}
.gal-card{background:#faf8f4;border:1px solid rgba(26,26,46,0.08);border-radius:10px;overflow:hidden;}
.gal-card img{width:100%;aspect-ratio:1;object-fit:cover;display:block;}
.gal-card .cap{padding:.55rem .7rem;font-size:.78rem;color:#1a1a2e;line-height:1.35;}
.gal-card .prompt{padding:0 .7rem .55rem;font-family:'DM Mono',monospace;font-size:.68rem;color:#6b6880;line-height:1.4;border-top:1px dashed rgba(26,26,46,0.08);padding-top:.4rem;margin-top:.1rem;}

.none{font-size:.85rem;color:#a0a0b0;font-style:italic;padding:.8rem 0;}
</style>
</head>
<body>
<header>
  <div>
    <h1>Loppumoduuli — Sinä ja tekoäly</h1>
    <div class="sub">Admin-näkymä · koontinäkymä opiskelijaa kohden</div>
  </div>
  <a href="/admin">← Admin-etusivulle</a>
</header>
<nav class="nav-links">
  <a href="/admin/loppumoduuli">Loppumoduuli (tämä)</a>
  <a href="/admin/mythology">Myytinmurtaja</a>
  <a href="/admin/rikkinainen-prompti">Rikkinäinen Prompti</a>
  <a href="/admin/palaute">Palaute</a>
</nav>
<div class="wrap" id="wrap">
  <div class="empty">Ladataan...</div>
</div>
<script>
(function(){
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function fmt(iso){ try{ var d=new Date(iso); return d.toLocaleDateString('fi-FI')+' '+d.toLocaleTimeString('fi-FI',{hour:'2-digit',minute:'2-digit'});}catch(_){return '';} }

  fetch('/api/final/admin-loppumoduuli',{credentials:'include'})
    .then(function(r){ return r.json().then(function(d){ return {ok:r.ok,d:d}; }); })
    .then(function(x){
      var wrap=document.getElementById('wrap');
      if(!x.ok){ wrap.innerHTML='<div class="empty">Virhe: '+esc((x.d&&x.d.error)||'')+'</div>'; return; }
      var items=x.d.items||[];
      if(!items.length){ wrap.innerHTML='<div class="empty">Ei vielä lähetyksiä yhdestäkään osiosta.</div>'; return; }

      var html='';
      items.forEach(function(it){
        var c=it.capstone;
        var refl=it.reflection;
        var gal=it.gallery||[];
        var chips=''
          + '<span class="chip '+(refl?'on':'')+'">Osio 1: Reflektio '+(refl?'✓':'—')+'</span>'
          + '<span class="chip '+(c?'on':'')+'">Osio 2: Kartat+Podcast '+(c?'✓':'—')+'</span>'
          + '<span class="chip '+(gal.length?'on':'')+'">Osio 3: Galleria '+(gal.length?('('+gal.length+')'):'—')+'</span>';

        // Reflektio
        var refHtml='<div class="none">Ei reflektiota.</div>';
        if(refl){
          var ans=Array.isArray(refl.answers_json)?refl.answers_json:[];
          var ansHtml='';
          if(ans.length){
            ansHtml='<div class="answers-kuulustelu"><details><summary>Näytä 10 vastausta kuulustelukoppiin</summary><ol>'
              + ans.map(function(a){
                  if(a && typeof a==='object'){
                    return '<li><b>'+esc(a.question||a.q||'')+'</b>'+esc(a.answer||a.a||'')+'</li>';
                  }
                  return '<li>'+esc(a)+'</li>';
                }).join('')
              + '</ol></details></div>';
          }
          refHtml = '<div class="reflect-box">'+esc(refl.reflection_text||'')+'</div>'+ansHtml;
        }

        // Kartat
        var maps = c ? [
          {n:1,title:'Kartta 1 — AI tänään',has:c.has_map1,name:c.map1_name,id:c.id},
          {n:2,title:'Kartta 2 — AI huomenna',has:c.has_map2,name:c.map2_name,id:c.id},
          {n:3,title:'Kartta 3 — Minä ja AI',has:c.has_map3,name:c.map3_name,id:c.id}
        ] : [];
        var mapsHtml = maps.length ? maps.map(function(m){
          var right = m.has
            ? '<a class="pdf-link" href="/api/final/capstone-pdf/'+esc(m.id)+'/'+m.n+'" target="_blank" rel="noopener">📄 Avaa PDF</a>'
            : '<span class="missing">— ei ladattu —</span>';
          return '<div class="map-item"><div class="label"><span class="lbl-top">'+esc(m.title)+'</span><span class="lbl-sub">'+esc(m.name||(m.has?'kartta-'+m.n+'.pdf':'—'))+'</span></div>'+right+'</div>';
        }).join('') : '<div class="none">Ei karttoja ladattu.</div>';

        var podcastHtml = c ? (
          '<div class="qa-list">'
          + '<div class="qa-item q1"><div class="q">1. Mitä tekoäly sai oikein?</div><div class="a">'+esc(c.podcast_right||'—')+'</div></div>'
          + '<div class="qa-item q2"><div class="q">2. Mitä se jätti huomaamatta / ymmärsi väärin?</div><div class="a">'+esc(c.podcast_missed||'—')+'</div></div>'
          + '<div class="qa-item q3"><div class="q">3. Mitä tämä kertoo tekoälyn tavasta tiivistää?</div><div class="a">'+esc(c.podcast_insight||'—')+'</div></div>'
          + '</div>'
        ) : '<div class="none">Ei podcast-vastauksia.</div>';

        // Galleria
        var galHtml = gal.length ? (
          '<div class="gal-grid">'
          + gal.map(function(g){
              var src = g.image_url || '';
              return '<div class="gal-card">'
                + (src ? '<img src="'+esc(src)+'" alt="" loading="lazy">' : '')
                + '<div class="cap">'+esc(g.caption||'')+'</div>'
                + (g.image_prompt_used ? '<div class="prompt">Prompt: '+esc(g.image_prompt_used)+'</div>' : '')
                + '</div>';
            }).join('')
          + '</div>'
        ) : '<div class="none">Ei ladattuja kuvia.</div>';

        html += ''
          + '<div class="student">'
          +   '<div class="head">'
          +     '<div class="who">'
          +       '<div class="name">'+esc(it.user_label||'')+'</div>'
          +       '<div class="email">'+esc(it.user_email||'')+'</div>'
          +     '</div>'
          +     '<div class="stats">'+chips+'</div>'
          +   '</div>'
          +   '<div class="section"><div class="block-title">Osio 1 · Kuulustelukoppi — reflektio</div>'+refHtml+'</div>'
          +   '<div class="section"><div class="block-title">Osio 2 · Kartat + Podcast'+(c?(' <span class="count">'+fmt(c.updated_at||c.created_at)+'</span>'):'')+'</div>'
          +     '<div class="grid">'
          +       '<div>'+mapsHtml+'</div>'
          +       '<div>'+podcastHtml+'</div>'
          +     '</div>'
          +   '</div>'
          +   '<div class="section"><div class="block-title">Osio 3 · Kuva + galleria'+(gal.length?(' <span class="count">'+gal.length+'</span>'):'')+'</div>'+galHtml+'</div>'
          + '</div>';
      });
      wrap.innerHTML = html;
    })
    .catch(function(e){
      document.getElementById('wrap').innerHTML='<div class="empty">Jokin meni pieleen — yritä uudelleen</div>';
    });
})();
</script>
</body>
</html>
