<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tekoälykurssi - Etusivu</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
  
  :root {
    --ink: #1a1a2e;
    --ink2: #2d2d44;
    --paper: #f5f3ef;
    --paper2: #eeeae3;
    --warm: #e8e0d4;
    --accent: #c75b3a;
    --accent2: #2563a8;
    --accent3: #2a7a4b;
    --gold: #b8860b;
    --text: #1a1a2e;
    --muted: #6b6880;
    --border: rgba(26,26,46,0.12);
    --shadow: 0 2px 20px rgba(26,26,46,0.08);
    --shadow-md: 0 8px 40px rgba(26,26,46,0.12);
  }
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: var(--paper);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    line-height: 1.7;
  }
  
  nav {
    background: rgba(245,243,239,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .nav-logo {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-family: 'DM Serif Display', serif;
    font-weight: 400;
    font-size: 1.3rem;
    color: var(--ink);
  }
  
  .nav-logo img {
    height: 40px;
    width: auto;
  }
  
  .nav-user {
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  
  .user-info {
    text-align: right;
  }
  
  .user-name {
    font-weight: 600;
    font-size: 0.9rem;
  }
  
  .user-email {
    font-size: 0.75rem;
    color: var(--muted);
  }
  
  .btn-logout {
    padding: 8px 16px;
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.3s;
    font-family: 'DM Sans', sans-serif;
  }
  
  .btn-logout:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(199,91,58,0.05);
  }
  
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 3rem 2rem;
  }
  
  .welcome-section {
    text-align: center;
    margin-bottom: 4rem;
  }
  
  .welcome-section h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2.5rem, 6vw, 4rem);
    font-weight: 400;
    margin-bottom: 1rem;
    color: var(--ink);
    line-height: 1.1;
  }
  
  .welcome-section p {
    font-size: 1.15rem;
    color: var(--muted);
    max-width: 600px;
    margin: 0 auto;
    font-weight: 300;
    line-height: 1.8;
  }
  
  .modules-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 2rem;
  }
  
  .module-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    transition: all 0.3s;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: block;
    box-shadow: var(--shadow);
  }
  
  .module-card:hover:not(.locked) {
    border-color: var(--accent);
    transform: translateY(-4px);
    box-shadow: var(--shadow-md);
  }
  
  .module-card.locked {
    opacity: 0.5;
    cursor: not-allowed;
    border-color: rgba(26,26,46,0.08);
  }
  
  .locked-badge {
    background: rgba(246,173,85,0.1);
    border: 1px solid rgba(246,173,85,0.3);
    color: #f6ad55;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    text-align: center;
    margin-top: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .locked-badge svg {
    width: 16px;
    height: 16px;
  }
  
  .module-icon {
    font-size: 3rem;
    margin-bottom: 1rem;
  }
  
  .module-card h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    font-weight: 400;
    margin-bottom: 0.5rem;
    color: var(--ink);
    line-height: 1.2;
  }
  
  .module-card p {
    color: var(--muted);
    margin-bottom: 1.5rem;
    line-height: 1.7;
    font-size: 0.95rem;
  }
  
  .progress-bar {
    width: 100%;
    height: 6px;
    background: var(--paper2);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 0.5rem;
  }
  
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.3s;
  }
  
  .progress-text {
    font-size: 0.85rem;
    color: var(--muted);
  }
  
  .loading {
    text-align: center;
    padding: 4rem;
    color: var(--muted);
  }

  /* Part sections */
  .part-section {
    margin-bottom: 4rem;
  }

  .part-title {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    font-weight: 400;
    color: var(--ink);
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 2px solid var(--border);
  }

  /* Statistics Dashboard */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1.5rem;
    margin-bottom: 3rem;
  }

  .stat-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    text-align: center;
    transition: all 0.3s;
    box-shadow: var(--shadow);
  }

  .stat-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }

  .stat-icon {
    width: 48px;
    height: 48px;
    margin: 0 auto 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, rgba(99,179,237,0.15), rgba(159,122,234,0.15));
    border-radius: 12px;
    color: var(--accent);
  }

  .stat-value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 0.25rem;
  }

  .stat-label {
    font-size: 0.85rem;
    color: var(--muted);
  }

  /* Progress Ring */
  .progress-ring {
    width: 120px;
    height: 120px;
    margin: 0 auto 1rem;
    position: relative;
  }

  .progress-ring svg {
    transform: rotate(-90deg);
  }

  .progress-ring-circle {
    fill: none;
    stroke-width: 8;
    transition: stroke-dashoffset 0.5s;
  }

  .progress-ring-bg {
    stroke: var(--surface2);
  }

  .progress-ring-progress {
    stroke: url(#gradient);
    stroke-linecap: round;
  }

  .progress-ring-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: #fff;
  }

  /* Achievement Badges */
  .achievements-section {
    margin-bottom: 3rem;
  }

  .achievements-grid {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .achievement-badge {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    background: var(--surface);
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    position: relative;
  }

  .achievement-badge.earned {
    border-color: var(--accent3);
    background: linear-gradient(135deg, rgba(104,211,145,0.15), rgba(99,179,237,0.15));
    box-shadow: 0 0 20px rgba(104,211,145,0.2);
  }

  .achievement-badge svg {
    width: 28px;
    height: 28px;
    color: var(--muted);
  }

  .achievement-badge.earned svg {
    color: var(--accent3);
  }

  .achievement-badge[title]:hover::after {
    content: attr(title);
    position: absolute;
    bottom: -30px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface2);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 0.75rem;
    white-space: nowrap;
    border: 1px solid var(--border);
    z-index: 10;
  }

  .module-icon {
    width: 64px;
    height: 64px;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, rgba(99,179,237,0.1), rgba(159,122,234,0.1));
    border-radius: 16px;
    color: var(--accent);
  }

  .module-icon svg {
    width: 36px;
    height: 36px;
  }

  .module-card.completed {
    border-color: var(--accent3);
    background: linear-gradient(135deg, rgba(104,211,145,0.05), rgba(99,179,237,0.05));
  }

  .module-card.completed::before {
    content: '';
    position: absolute;
    top: 1rem;
    right: 1rem;
    width: 24px;
    height: 24px;
    background: var(--accent3);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .module-card {
    position: relative;
  }

  .completion-badge {
    position: absolute;
    top: 1rem;
    right: 1rem;
    width: 32px;
    height: 32px;
    background: var(--accent3);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #050810;
    font-weight: 700;
    font-size: 0.9rem;
  }
</style>
</head>
<body>
  <nav>
    <div class="nav-logo">
      <img src="/assets/images/logo.png" alt="HSBridge Logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';" />
      <span>HSBridge</span>
    </div>
    <div class="nav-user">
      <div class="user-info">
        <div class="user-name" id="userName">Ladataan...</div>
        <div class="user-email" id="userEmail"></div>
      </div>
      <button class="btn-logout" onclick="logout()">Kirjaudu ulos</button>
    </div>
  </nav>
  
  <div class="container">
    <div class="welcome-section">
      <h1>Tervetuloa oppimaan!</h1>
      <p>Valitse moduuli ja jatka oppimista siitä mihin jäit</p>
    </div>

    <!-- Statistics Dashboard -->
    <div id="statsContainer" class="stats-grid" style="display: none;">
      <div class="stat-card">
        <div class="progress-ring">
          <svg width="120" height="120">
            <defs>
              <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:var(--accent);stop-opacity:1" />
                <stop offset="100%" style="stop-color:var(--accent2);stop-opacity:1" />
              </linearGradient>
            </defs>
            <circle class="progress-ring-circle progress-ring-bg" cx="60" cy="60" r="52"></circle>
            <circle class="progress-ring-circle progress-ring-progress" cx="60" cy="60" r="52" id="overallProgressCircle"></circle>
          </svg>
          <div class="progress-ring-text" id="overallProgressText">0%</div>
        </div>
        <div class="stat-label">Kokonaisedistyminen</div>
      </div>
      
      <div class="stat-card">
        <div class="stat-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
          </svg>
        </div>
        <div class="stat-value" id="completedModules">0</div>
        <div class="stat-label">Moduulia suoritettu</div>
      </div>
      
      <div class="stat-card">
        <div class="stat-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
          </svg>
        </div>
        <div class="stat-value" id="totalSections">0</div>
        <div class="stat-label">Osiota suoritettu</div>
      </div>
      
      <div class="stat-card">
        <div class="stat-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 11l3 3L22 4"/>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
          </svg>
        </div>
        <div class="stat-value" id="checklistItems">0</div>
        <div class="stat-label">Tarkistuslistan kohtia</div>
      </div>
    </div>

    <!-- Achievements -->
    <div id="achievementsContainer" class="achievements-section" style="display: none;">
      <h3 style="text-align: center; margin-bottom: 1rem; font-family: 'Space Grotesk', sans-serif; color: var(--text);">Saavutukset</h3>
      <div class="achievements-grid" id="achievementsGrid"></div>
    </div>
    
    <div id="modulesContainer" class="loading">Ladataan moduuleja...</div>
  </div>
  
  <script>
    const API_URL = window.location.origin + '/api';
    
    // Icon SVG definitions (global scope)
    const iconSVGs = {
      shield: '<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
      robot: '<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="8" width="18" height="12" rx="2"/><rect x="7" y="14" width="4" height="4" rx="1"/><rect x="13" y="14" width="4" height="4" rx="1"/><path d="M8 8V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="12" y1="8" x2="12" y2="14"/></svg>',
      sparkles: '<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>',
      briefcase: '<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>',
      book: '<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>',
      lock: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>',
      check: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>',
      trophy: '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h2"/><path d="M18 9h2a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2h-2"/><path d="M6 9v10a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V9"/><path d="M12 2v7"/></svg>',
      star: '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
      medal: '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>'
    };
    
    // Check authentication (optional - no redirect)
    async function checkAuth() {
      try {
        const response = await fetch(`${API_URL}/auth/me`, {
          credentials: 'include'
        });
        
        if (!response.ok) {
          return null; // Not logged in, but continue anyway
        }
        
        const data = await response.json();
        return data.user;
      } catch (error) {
        return null; // Not logged in, but continue anyway
      }
    }
    
    // Load user info (optional)
    async function loadUser() {
      const user = await checkAuth();
      if (user) {
        document.getElementById('userName').textContent = user.name || user.email;
        document.getElementById('userEmail').textContent = user.email;
      } else {
        // Hide user section if not logged in
        const userSection = document.querySelector('.user-section');
        if (userSection) userSection.style.display = 'none';
      }
    }
    
    // Load modules (no authentication required)
    async function loadModules() {
      // No authentication check - load modules for everyone
      
      try {
        // Try to load progress, but continue even if it fails
        let summary = { modules: [], checklists: [] };
        try {
          const summaryResponse = await fetch(`${API_URL}/progress/summary`, {
            credentials: 'include'
          });
          
          if (summaryResponse.ok) {
            try {
              summary = await summaryResponse.json();
            } catch (parseError) {
              console.error('Error parsing summary response:', parseError);
            }
          }
        } catch (error) {
          // Progress loading failed, but continue anyway
          console.log('Progress not available (not logged in), continuing without progress tracking');
        }
        window.currentSummary = summary; // Store for statistics
        
        const modules = [
          // Osa 1: Perusmoduulit
          {
            id: 'moduuli1-tietosuoja',
            title: 'Moduuli 1: Tietosuoja ja vastuullinen tekoälyn käyttö',
            description: 'Opi mitä tietoja voit jakaa tekoälylle ja mitä ei koskaan.',
            icon: 'shield',
            order: 1,
            part: 1
          },
          {
            id: 'moduuli2-tekoaly-uhka-vai-mahdollisuus',
            title: 'Moduuli 2: Tekoäly – Uhka vai mahdollisuus?',
            description: 'Ymmärrä tekoäly, sen toiminta ja vaikutus työn tulevaisuuteen.',
            icon: 'robot',
            order: 2,
            part: 1
          },
          {
            id: 'moduuli3-master-prompt',
            title: 'Moduuli 3: Master Prompt – Oppaasi tekoälyn maailmassa',
            description: 'Opi luomaan tehokkaita promteja ja saamaan parhaat tulokset.',
            icon: 'sparkles',
            order: 3,
            part: 1
          },
          {
            id: 'moduuli4-prompt-tyonhakijalle',
            title: 'Moduuli 4: PROMPT Työnhakijalle',
            description: 'Käytä tekoälyä työnhaun apuna ja erotu hakijoiden joukosta.',
            icon: 'briefcase',
            order: 4,
            part: 1
          },
          {
            id: 'homework',
            title: 'Kotitehtävät',
            description: 'Lataa ja suorita harjoitustehtävät vahvistaaksesi oppimasi.',
            icon: 'book',
            order: 5,
            isHomework: true,
            part: 1
          },
          // Osa 2: Edistynyt sisältö
          {
            id: 'moduuli5-ai-myynnissa-ja-markkinoinnissa',
            title: 'Moduuli 5: AI myynnissä ja markkinoinnissa',
            description: 'Opi käyttämään tekoälyä myynnin ja markkinoinnin vahvistamiseen.',
            icon: 'briefcase',
            order: 6,
            part: 2,
            requiresPart1: true
          }
        ];
        
        // Check which modules are completed (only count main modules, not homework)
        const mainModules = modules.filter(m => !m.isHomework);
        const part1Modules = mainModules.filter(m => m.part === 1);
        const completedModules = new Set();
        let totalProgress = 0;
        let maxProgress = mainModules.length * 100; // Each module is worth 100%
        
        mainModules.forEach(module => {
          const moduleProgress = summary.modules.find(m => m.module_id === module.id);
          const checklistProgress = summary.checklists.find(c => c.module_id === module.id);
          
          const totalSections = parseInt(moduleProgress?.total_sections || 0);
          const completedSections = parseInt(moduleProgress?.completed_sections || 0);
          const totalItems = parseInt(checklistProgress?.total_items || 0);
          const completedItems = parseInt(checklistProgress?.completed_items || 0);
          
          // Calculate module progress: sections progress (50%) + checklist progress (50%)
          let sectionProgress = totalSections > 0 ? (completedSections / totalSections) * 50 : 0;
          let checklistProgressPercent = totalItems > 0 ? (completedItems / totalItems) * 50 : 0;
          
          // If no checklist exists, sections count for 100%
          if (totalItems === 0 && totalSections > 0) {
            sectionProgress = (completedSections / totalSections) * 100;
          }
          
          const moduleProgressPercent = Math.round(sectionProgress + checklistProgressPercent);
          totalProgress += moduleProgressPercent;
          
          // Module is completed if: all sections done OR all checklist items done OR progress >= 90%
          const isCompleted = (totalSections > 0 && completedSections === totalSections) ||
                             (totalItems > 0 && completedItems === totalItems) ||
                             moduleProgressPercent >= 90;
          
          if (isCompleted) {
            completedModules.add(module.id);
          }
        });
        
        // Calculate overall progress as percentage of modules completed
        const overallProgress = maxProgress > 0 ? Math.round((totalProgress / maxProgress) * 100) : 0;
        const completedModulesCount = completedModules.size;
        
        // Ensure summary has arrays
        if (!Array.isArray(summary.modules)) summary.modules = [];
        if (!Array.isArray(summary.checklists)) summary.checklists = [];
        
        // Count total sections completed across all modules
        let totalCompletedSections = 0;
        summary.modules.forEach(m => {
          totalCompletedSections += parseInt(m.completed_sections || 0);
        });
        
        // Update statistics
        updateStatistics(overallProgress, completedModulesCount, totalCompletedSections);
        
        // Update achievements
        updateAchievements(completedModulesCount, overallProgress);
        
        // Check if module 4 is completed - if so, unlock all Part 1 modules
        const module4Completed = completedModules.has('moduuli4-prompt-tyonhakijalle');
        
        // Check if all Part 1 modules (1-4) are completed
        const part1MainModules = part1Modules.filter(m => !m.isHomework);
        let allPart1Completed = true;
        part1MainModules.forEach(module => {
          if (!completedModules.has(module.id)) {
            allPart1Completed = false;
          }
        });
        
        const container = document.getElementById('modulesContainer');
        container.className = '';
        
        // Group modules by part
        const part1ModulesList = modules.filter(m => m.part === 1);
        const part2Modules = modules.filter(m => m.part === 2);
        
        let html = '';
        
        // Render Part 1
        if (part1ModulesList.length > 0) {
          html += '<div class="part-section"><h2 class="part-title">Osa 1: Perusmoduulit</h2><div class="modules-grid">';
          part1ModulesList.forEach((module, index) => {
            html += renderModuleCard(module, index, modules, summary, completedModules, module4Completed, true);
          });
          html += '</div></div>';
        }
        
        // Render Part 2
        if (part2Modules.length > 0) {
          html += '<div class="part-section"><h2 class="part-title">Osa 2: Edistynyt sisältö</h2><div class="modules-grid">';
          part2Modules.forEach((module, index) => {
            html += renderModuleCard(module, index, modules, summary, completedModules, module4Completed, allPart1Completed);
          });
          html += '</div></div>';
        }
        
        container.innerHTML = html;
      } catch (error) {
        console.error('Error loading modules:', error);
        console.error('Error details:', error.message, error.stack);
        const container = document.getElementById('modulesContainer');
        if (container) {
          container.innerHTML = `
            <div style="text-align: center; padding: 2rem; color: #fc8181;">
              <p style="margin-bottom: 1rem;">Virhe moduulien lataamisessa</p>
              <p style="font-size: 0.9rem; color: var(--muted);">Virhe: ${error.message}</p>
              <button onclick="location.reload()" style="margin-top: 1rem; padding: 8px 16px; background: var(--accent); color: #fff; border: none; border-radius: 8px; cursor: pointer;">
                Päivitä sivu
              </button>
            </div>
          `;
        }
      }
    }
    
    // Render module card (all modules are accessible)
    function renderModuleCard(module, index, allModules, summary, completedModules, module4Completed, allPart1Completed = true) {
      // Homework module is always accessible
      if (module.isHomework) {
        return `
          <div class="module-card" onclick="window.location.href='/homework'">
            <div class="module-icon">${iconSVGs[module.icon]}</div>
            <h2>${module.title}</h2>
            <p>${module.description}</p>
            <div class="progress-text">Aina saatavilla</div>
          </div>
        `;
      }
      
      const moduleProgress = summary.modules.find(m => m.module_id === module.id);
      const checklistProgress = summary.checklists.find(c => c.module_id === module.id);
      
      const totalSections = parseInt(moduleProgress?.total_sections || 0);
      const completedSections = parseInt(moduleProgress?.completed_sections || 0);
      const totalItems = parseInt(checklistProgress?.total_items || 0);
      const completedItems = parseInt(checklistProgress?.completed_items || 0);
      
      // Calculate progress: sections (50%) + checklist (50%), or sections (100%) if no checklist
      let sectionProgress = totalSections > 0 ? (completedSections / totalSections) * 50 : 0;
      let checklistProgressPercent = totalItems > 0 ? (completedItems / totalItems) * 50 : 0;
      if (totalItems === 0 && totalSections > 0) {
        sectionProgress = (completedSections / totalSections) * 100;
      }
      const progress = Math.round(sectionProgress + checklistProgressPercent);
      
      const isCompleted = completedModules.has(module.id);
      
      // All modules are accessible - no locking
      const isLocked = false;
      
      return `
        <div class="module-card ${isCompleted ? 'completed' : ''}" onclick="window.location.href='/module/${module.id}'">
          ${isCompleted ? '<div class="completion-badge">✓</div>' : ''}
          <div class="module-icon">${iconSVGs[module.icon]}</div>
          <h2>${module.title}</h2>
          <p>${module.description}</p>
          ${progress > 0 ? `
            <div class="progress-bar">
              <div class="progress-fill" style="width: ${progress}%"></div>
            </div>
            <div class="progress-text">${completedSections}/${totalSections} osiota suoritettu${isCompleted ? ' ✓' : ''}</div>
          ` : '<div class="progress-text">Valmis käyttöön</div>'}
        </div>
      `;
    }
    
    // Update statistics (only show if there's actual progress)
    function updateStatistics(overallProgress, completedModules, totalSections) {
      try {
        const statsContainer = document.getElementById('statsContainer');
        if (!statsContainer) {
          console.warn('Stats container not found');
          return;
        }
        
        // Count completed checklist items
        const summary = window.currentSummary || { checklists: [] };
        let completedChecklistItems = 0;
        if (summary.checklists && Array.isArray(summary.checklists)) {
          summary.checklists.forEach(c => {
            completedChecklistItems += parseInt(c.completed_items || 0);
          });
        }
        
        // Only show statistics if there's actual progress
        if (overallProgress === 0 && completedModules === 0 && totalSections === 0 && completedChecklistItems === 0) {
          statsContainer.style.display = 'none';
          return;
        }
        
        statsContainer.style.display = 'grid';
        
        // Update progress ring
        const circle = document.getElementById('overallProgressCircle');
        if (circle) {
          const radius = 52;
          const circumference = 2 * Math.PI * radius;
          const offset = circumference - (overallProgress / 100) * circumference;
          circle.style.strokeDasharray = `${circumference} ${circumference}`;
          circle.style.strokeDashoffset = offset;
        }
        
        const overallProgressText = document.getElementById('overallProgressText');
        if (overallProgressText) overallProgressText.textContent = Math.round(overallProgress) + '%';
        
        const completedModulesEl = document.getElementById('completedModules');
        if (completedModulesEl) completedModulesEl.textContent = completedModules;
        
        const totalSectionsEl = document.getElementById('totalSections');
        if (totalSectionsEl) totalSectionsEl.textContent = totalSections;
        
        const checklistItemsEl = document.getElementById('checklistItems');
        if (checklistItemsEl) checklistItemsEl.textContent = completedChecklistItems;
      } catch (error) {
        console.error('Error updating statistics:', error);
        // Hide stats on error
        const statsContainer = document.getElementById('statsContainer');
        if (statsContainer) statsContainer.style.display = 'none';
      }
    }
    
    // Update achievements
    function updateAchievements(completedModules, overallProgress) {
      try {
        const achievements = [
          { id: 'first', icon: 'star', earned: completedModules >= 1, title: 'Ensimmäinen moduuli' },
          { id: 'halfway', icon: 'medal', earned: completedModules >= 2, title: 'Puoliväli' },
          { id: 'almost', icon: 'trophy', earned: completedModules >= 3, title: 'Melkein valmis' },
          { id: 'complete', icon: 'check', earned: completedModules >= 4, title: 'Kurssi suoritettu' },
          { id: 'perfect', icon: 'star', earned: overallProgress >= 100, title: 'Täydellinen' }
        ];
        
        const container = document.getElementById('achievementsGrid');
        const achievementsContainer = document.getElementById('achievementsContainer');
        
        if (!container || !achievementsContainer) {
          console.warn('Achievements container not found');
          return;
        }
        
        if (achievements.some(a => a.earned)) {
          achievementsContainer.style.display = 'block';
          container.innerHTML = achievements.map(achievement => {
            const icon = iconSVGs[achievement.icon] || '';
            return `
              <div class="achievement-badge ${achievement.earned ? 'earned' : ''}" title="${achievement.title}">
                ${icon}
              </div>
            `;
          }).join('');
        }
      } catch (error) {
        console.error('Error updating achievements:', error);
      }
    }
    
    // Logout
    async function logout() {
      try {
        await fetch(`${API_URL}/auth/logout`, {
          method: 'POST',
          credentials: 'include'
        });
      } catch (error) {
        console.error('Logout error:', error);
      }
      window.location.reload(); // Reload page instead of redirecting to login
    }
    
    // Initialize
    loadUser();
    loadModules();
  </script>
</body>
</html>
