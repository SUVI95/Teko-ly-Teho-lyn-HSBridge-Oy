<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kurssin loppupalaute — HSBridge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1a2e;
  --ink2: #2d2d44;
  --paper: #f5f3ef;
  --paper2: #eeeae3;
  --warm: #e8e0d4;
  --accent: #c75b3a;
  --accent2: #2563a8;
  --accent3: #2a7a4b;
  --gold: #b8860b;
  --text: #1a1a2e;
  --muted: #6b6880;
  --border: rgba(26,26,46,0.12);
  --shadow: 0 2px 20px rgba(26,26,46,0.08);
  --shadow-md: 0 8px 40px rgba(26,26,46,0.12);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: linear-gradient(135deg, var(--paper) 0%, var(--paper2) 100%);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  padding: 2rem;
}

.container {
  max-width: 720px;
  margin: 0 auto;
  background: #fff;
  border-radius: 24px;
  padding: 3rem;
  box-shadow: var(--shadow-md);
}

.hero {
  text-align: center;
  margin-bottom: 2.5rem;
}

.hero-emoji {
  font-size: 4rem;
  margin-bottom: 0.5rem;
  animation: bounce 1s ease infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 2.2rem;
  margin-bottom: 0.5rem;
  color: var(--ink);
}

.subtitle {
  color: var(--muted);
  font-size: 1.05rem;
  line-height: 1.6;
}

.feedback-section {
  margin-bottom: 2rem;
}

.feedback-section label {
  display: block;
  font-weight: 600;
  font-size: 1rem;
  color: var(--ink);
  margin-bottom: 0.5rem;
}

.feedback-section label .hint {
  font-weight: 400;
  color: var(--muted);
  font-size: 0.9rem;
}

textarea {
  width: 100%;
  min-height: 100px;
  padding: 1rem;
  border: 1px solid var(--border);
  border-radius: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 1rem;
  resize: vertical;
  background: var(--paper);
  transition: border-color 0.2s, box-shadow 0.2s;
}

textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(199,91,58,0.1);
}

textarea::placeholder {
  color: var(--muted);
  opacity: 0.8;
}

/* Star rating - fun and easy */
.stars-section {
  text-align: center;
  padding: 2rem 0;
  background: linear-gradient(135deg, rgba(199,91,58,0.05) 0%, rgba(184,134,11,0.05) 100%);
  border-radius: 16px;
  margin: 2rem 0;
}

.stars-section h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.4rem;
  margin-bottom: 0.5rem;
  color: var(--ink);
}

.stars-section p {
  color: var(--muted);
  margin-bottom: 1.25rem;
  font-size: 0.95rem;
}

.stars-wrap {
  display: flex;
  gap: 8px;
  justify-content: center;
  font-size: 2.5rem;
  cursor: pointer;
  flex-wrap: wrap;
}

.star {
  color: var(--warm);
  transition: all 0.2s ease;
  user-select: none;
}

.star:hover,
.star.filled {
  color: var(--gold);
  transform: scale(1.15);
}

.star.filled {
  filter: drop-shadow(0 2px 4px rgba(184,134,11,0.3));
}

.star-label {
  font-size: 0.85rem;
  color: var(--muted);
  margin-top: 0.5rem;
}

.btn-submit {
  width: 100%;
  padding: 1rem 2rem;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-weight: 600;
  font-size: 1.1rem;
  cursor: pointer;
  transition: all 0.3s;
  margin-top: 2rem;
  font-family: 'DM Sans', sans-serif;
}

.btn-submit:hover:not(:disabled) {
  background: #b34e2f;
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(199,91,58,0.35);
}

.btn-submit:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.success-message {
  background: rgba(42,122,75,0.1);
  border: 1px solid rgba(42,122,75,0.3);
  color: var(--accent3);
  padding: 1.25rem;
  border-radius: 12px;
  margin-bottom: 2rem;
  display: none;
  text-align: center;
  font-weight: 500;
}

.success-message.show {
  display: block;
}

.error-message {
  background: rgba(199,91,58,0.1);
  border: 1px solid rgba(199,91,58,0.3);
  color: var(--accent);
  padding: 1rem;
  border-radius: 8px;
  margin-bottom: 2rem;
  display: none;
}

.error-message.show {
  display: block;
}

.back-link {
  display: inline-block;
  margin-bottom: 2rem;
  color: var(--accent);
  text-decoration: none;
  font-weight: 500;
}

.back-link:hover {
  text-decoration: underline;
}
</style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Takaisin etusivulle</a>
    
    <div class="hero">
      <div class="hero-emoji">🎉</div>
      <h1>Kurssi suoritettu!</h1>
      <p class="subtitle">Hienoa työtä! Kerro meille miten kurssi meni — vastaat vain niihin kysymyksiin joihin haluat.</p>
    </div>
    
    <div class="error-message" id="errorMessage"></div>
    <div class="success-message" id="successMessage"></div>
    
    <form id="feedbackForm">
      <div class="feedback-section">
        <label for="feelNow">Miten voit nyt kurssin jälkeen?</label>
        <textarea id="feelNow" name="feelNow" placeholder="Esim: Innoissani, valmis kokeilemaan uusia työkaluja! Tai: Rauhallinen, ymmärrän nyt paremmin mitä tekoäly voi..."></textarea>
      </div>
      
      <div class="feedback-section">
        <label for="learnedNew">Opitko jotain uutta?</label>
        <textarea id="learnedNew" name="learnedNew" placeholder="Esim: Kyllä! En tiennyt että voin käyttää AI:ta työnhaussa näin monella tavalla..."></textarea>
      </div>
      
      <div class="feedback-section">
        <label for="useInLife">Käytätkö tätä elämässäsi?</label>
        <textarea id="useInLife" name="useInLife" placeholder="Esim: Aivan varmasti — aloitan jo tänään CV:n päivittämisen AI:n avulla..."></textarea>
      </div>
      
      <div class="feedback-section">
        <label for="changedMind">Muuttiko kurssi mielipidettäsi tekoälystä?</label>
        <textarea id="changedMind" name="changedMind" placeholder="Esim: Kyllä, en enää pelkää sitä vaan näen mahdollisuudet. Tai: Olin jo positiivinen, nyt sain konkreettisia työkaluja..."></textarea>
      </div>
      
      <div class="feedback-section">
        <label for="recommend">Suosittelisitko meitä ystävillesi tai kollegoille?</label>
        <textarea id="recommend" name="recommend" placeholder="Esim: Kyllä, erityisesti niille jotka... Tai: Ehkä, jos..."></textarea>
      </div>
      
      <div class="stars-section">
        <h3>Anna meille tähdet! ⭐</h3>
        <p>Kuinka monta tähteä antaisit kurssille? (1–5)</p>
        <div class="stars-wrap" id="starsWrap">
          <span class="star" data-rating="1" title="1 tähti">★</span>
          <span class="star" data-rating="2" title="2 tähteä">★</span>
          <span class="star" data-rating="3" title="3 tähteä">★</span>
          <span class="star" data-rating="4" title="4 tähteä">★</span>
          <span class="star" data-rating="5" title="5 tähteä">★</span>
        </div>
        <div class="star-label" id="starLabel">Valitse klikkaamalla</div>
        <input type="hidden" id="rating" name="rating" value="">
      </div>
      
      <button type="submit" class="btn-submit" id="submitBtn">Lähetä palaute</button>
    </form>
  </div>
  
  <script src="/js/feedback.js"></script>
  <script>
    const API_URL = window.location.origin + '/api';
    let selectedRating = 0;
    
    const starLabels = {
      1: '1 tähti — Voi olla parempi',
      2: '2 tähteä — Jotain parannettavaa',
      3: '3 tähteä — Ihan ok',
      4: '4 tähteä — Hyvä kurssi!',
      5: '5 tähteä — Loistava! 🎉'
    };
    
    // Star rating - fun interaction
    const starsWrap = document.getElementById('starsWrap');
    const starLabel = document.getElementById('starLabel');
    
    starsWrap.querySelectorAll('.star').forEach(star => {
      star.addEventListener('click', function() {
        selectedRating = parseInt(this.dataset.rating);
        document.getElementById('rating').value = selectedRating;
        starsWrap.querySelectorAll('.star').forEach(s => {
          s.classList.toggle('filled', parseInt(s.dataset.rating) <= selectedRating);
        });
        starLabel.textContent = starLabels[selectedRating] || 'Valitse klikkaamalla';
      });
      star.addEventListener('mouseenter', function() {
        const r = parseInt(this.dataset.rating);
        starsWrap.querySelectorAll('.star').forEach(s => {
          s.classList.toggle('filled', parseInt(s.dataset.rating) <= r);
        });
      });
      star.addEventListener('mouseleave', function() {
        starsWrap.querySelectorAll('.star').forEach(s => {
          s.classList.toggle('filled', parseInt(s.dataset.rating) <= selectedRating);
        });
        starLabel.textContent = selectedRating ? starLabels[selectedRating] : 'Valitse klikkaamalla';
      });
    });
    
    // Form submission
    document.getElementById('feedbackForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const submitBtn = document.getElementById('submitBtn');
      const errorMsg = document.getElementById('errorMessage');
      const successMsg = document.getElementById('successMessage');
      
      if (selectedRating === 0) {
        errorMsg.textContent = 'Valitse tähtiarvostelu (1–5)!';
        errorMsg.classList.add('show');
        successMsg.classList.remove('show');
        return;
      }
      
      const feedbackParts = [
        'Miten voit nyt: ' + (document.getElementById('feelNow').value.trim() || '-'),
        'Opitko jotain uutta: ' + (document.getElementById('learnedNew').value.trim() || '-'),
        'Käytätkö elämässäsi: ' + (document.getElementById('useInLife').value.trim() || '-'),
        'Muuttiko mielipidettäsi AI:sta: ' + (document.getElementById('changedMind').value.trim() || '-'),
        'Suosittelisitko meitä: ' + (document.getElementById('recommend').value.trim() || '-')
      ];
      const feedbackText = feedbackParts.join('\n');
      
      submitBtn.disabled = true;
      submitBtn.textContent = 'Lähetetään...';
      errorMsg.classList.remove('show');
      successMsg.classList.remove('show');
      
      try {
        const result = await window.saveFeedback(null, 'course_feedback', feedbackText, selectedRating);
        
        if (result.success) {
          successMsg.textContent = 'Kiitos palautteesta! 🎉 Palaute on tallennettu. Ohjaamme sinut etusivulle...';
          successMsg.classList.add('show');
          document.getElementById('feedbackForm').reset();
          selectedRating = 0;
          starsWrap.querySelectorAll('.star').forEach(s => s.classList.remove('filled'));
          starLabel.textContent = 'Valitse klikkaamalla';
          
          setTimeout(() => {
            window.location.href = '/';
          }, 2500);
        } else {
          errorMsg.textContent = result.error || 'Palautteen lähetys epäonnistui. Yritä uudelleen.';
          errorMsg.classList.add('show');
        }
      } catch (error) {
        errorMsg.textContent = 'Yhteysvirhe. Yritä uudelleen.';
        errorMsg.classList.add('show');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Lähetä palaute';
      }
    });
    
    // Check authentication
    async function checkAuth() {
      try {
        const response = await fetch(`${API_URL}/auth/me`, {
          credentials: 'include'
        });
        if (!response.ok) {
          window.location.href = '/login?redirect=' + encodeURIComponent(window.location.pathname);
        }
      } catch (error) {
        window.location.href = '/login?redirect=' + encodeURIComponent(window.location.pathname);
      }
    }
    
    checkAuth();
  </script>
</body>
</html>
