<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Portfolio</title>
<meta name="robots" content="index, follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --brand: #2563a8;
  --accent: #c75b3a;
  --bg: #f5f3ef;
  --text: #1a1a2e;
  --muted: #6b7280;
  --card: #ffffff;
  --border: rgba(0,0,0,.06);
  --glass: rgba(255,255,255,.7);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased}

/* ── Hero ─────────────────────────── */
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:linear-gradient(135deg,var(--brand) 0%,color-mix(in srgb,var(--brand) 60%,#000) 100%)}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 40%,rgba(255,255,255,.08) 0%,transparent 60%);pointer-events:none}
.hero-inner{text-align:center;padding:3rem 2rem;position:relative;z-index:2;max-width:680px}
.hero-photo{width:160px;height:160px;border-radius:50%;object-fit:cover;border:4px solid rgba(255,255,255,.3);box-shadow:0 20px 60px rgba(0,0,0,.3);margin:0 auto 2rem;display:block;opacity:0;transform:translateY(30px);animation:fadeUp .8s .3s forwards}
.hero-photo-placeholder{width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.15);margin:0 auto 2rem;display:flex;align-items:center;justify-content:center;font-size:3.5rem;color:rgba(255,255,255,.6);border:4px solid rgba(255,255,255,.2);opacity:0;transform:translateY(30px);animation:fadeUp .8s .3s forwards}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(2.5rem,6vw,4rem);font-weight:700;color:#fff;letter-spacing:-.02em;margin-bottom:.75rem;opacity:0;transform:translateY(30px);animation:fadeUp .8s .5s forwards}
.hero .tagline{font-size:clamp(1.1rem,2.5vw,1.35rem);color:rgba(255,255,255,.85);font-weight:400;max-width:560px;margin:0 auto 2rem;opacity:0;transform:translateY(20px);animation:fadeUp .8s .7s forwards}
.hero .location{display:inline-flex;align-items:center;gap:.5rem;color:rgba(255,255,255,.65);font-size:.95rem;opacity:0;animation:fadeUp .8s .9s forwards}
.scroll-hint{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.4);font-size:.85rem;opacity:0;animation:fadeUp .8s 1.2s forwards}
.scroll-hint span{display:block;width:2px;height:30px;background:rgba(255,255,255,.3);margin:8px auto 0;animation:pulse 2s infinite}

/* ── Sections ─────────────────────── */
.section{max-width:900px;margin:0 auto;padding:6rem 2rem}
.section-title{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,2.4rem);font-weight:600;margin-bottom:.5rem;color:var(--text)}
.section-subtitle{color:var(--muted);font-size:1rem;margin-bottom:2.5rem}
.reveal{opacity:0;transform:translateY(40px);transition:opacity .7s cubic-bezier(.16,1,.3,1),transform .7s cubic-bezier(.16,1,.3,1)}
.reveal.visible{opacity:1;transform:translateY(0)}

/* ── Bio / About ──────────────────── */
.bio-text{font-size:1.15rem;line-height:1.9;color:#374151;max-width:720px}

/* ── Skills ────────────────────────── */
.skills-grid{display:flex;flex-wrap:wrap;gap:.6rem}
.skill-tag{padding:.55rem 1.1rem;border-radius:100px;font-size:.88rem;font-weight:500;background:color-mix(in srgb,var(--brand) 8%,white);color:var(--brand);border:1px solid color-mix(in srgb,var(--brand) 15%,transparent);transition:transform .2s,box-shadow .2s}
.skill-tag:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.06)}
.skill-category{margin-bottom:2rem}
.skill-category h3{font-size:1rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:1rem}

/* ── Experience Timeline ──────────── */
.timeline{position:relative;padding-left:2.5rem}
.timeline::before{content:'';position:absolute;left:.75rem;top:.5rem;bottom:.5rem;width:2px;background:linear-gradient(to bottom,var(--brand),color-mix(in srgb,var(--brand) 20%,transparent))}
.timeline-item{position:relative;margin-bottom:2.5rem;padding:.1rem 0}
.timeline-dot{position:absolute;left:-2.5rem;top:.3rem;width:1.5rem;height:1.5rem;border-radius:50%;background:var(--brand);border:3px solid var(--bg);box-shadow:0 0 0 2px var(--brand)}
.timeline-item h3{font-size:1.15rem;font-weight:700;color:var(--text);margin-bottom:.15rem}
.timeline-item .meta{font-size:.9rem;color:var(--muted);margin-bottom:.6rem;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.timeline-item ul{list-style:none;padding:0}
.timeline-item li{position:relative;padding-left:1.2rem;margin-bottom:.4rem;color:#374151;font-size:.95rem}
.timeline-item li::before{content:'';position:absolute;left:0;top:.65rem;width:6px;height:6px;border-radius:50%;background:var(--accent)}

/* ── Education ─────────────────────── */
.edu-card{display:flex;gap:1.5rem;align-items:flex-start;padding:1.5rem;background:var(--card);border-radius:16px;border:1px solid var(--border);margin-bottom:1rem;transition:transform .2s,box-shadow .2s}
.edu-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.06)}
.edu-icon{width:48px;height:48px;border-radius:12px;background:color-mix(in srgb,var(--brand) 10%,white);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.edu-card h3{font-size:1.05rem;font-weight:600;color:var(--text)}
.edu-card .meta{font-size:.88rem;color:var(--muted)}

/* ── Achievements ──────────────────── */
.achievement{display:flex;gap:1.2rem;align-items:flex-start;padding:1.5rem;background:var(--card);border-radius:16px;border:1px solid var(--border);margin-bottom:1rem}
.ach-num{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 70%,#000));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.1rem;flex-shrink:0}
.achievement p{font-size:1rem;color:#374151;line-height:1.6}

/* ── Languages ─────────────────────── */
.lang-item{display:inline-flex;align-items:center;gap:.5rem;padding:.6rem 1.2rem;background:var(--card);border-radius:100px;border:1px solid var(--border);margin:.3rem;font-size:.92rem}
.lang-dot{width:8px;height:8px;border-radius:50%}

/* ── Contact CTA ───────────────────── */
.cta-section{text-align:center;padding:6rem 2rem;background:linear-gradient(135deg,var(--brand),color-mix(in srgb,var(--brand) 70%,#000))}
.cta-section h2{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,2.8rem);color:#fff;margin-bottom:1rem}
.cta-section p{color:rgba(255,255,255,.75);font-size:1.1rem;margin-bottom:2rem;max-width:500px;margin-left:auto;margin-right:auto}
.cta-links{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.cta-btn{display:inline-flex;align-items:center;gap:.5rem;padding:.85rem 1.8rem;border-radius:100px;font-size:.95rem;font-weight:600;text-decoration:none;transition:transform .2s,box-shadow .2s}
.cta-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.2)}
.cta-btn.primary{background:#fff;color:var(--brand)}
.cta-btn.secondary{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3)}

/* ── Footer ────────────────────────── */
.portfolio-footer{text-align:center;padding:2rem;background:var(--text);color:rgba(255,255,255,.4);font-size:.8rem}
.portfolio-footer a{color:rgba(255,255,255,.5);text-decoration:none}

/* ── Loading ───────────────────────── */
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
.loading-screen.hide{opacity:0;pointer-events:none}
.loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin 1s linear infinite}

/* ── Animations ────────────────────── */
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.3;transform:scaleY(1)}50%{opacity:1;transform:scaleY(1.2)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Responsive ────────────────────── */
@media(max-width:640px){
  .hero-photo,.hero-photo-placeholder{width:120px;height:120px}
  .section{padding:4rem 1.5rem}
  .timeline{padding-left:2rem}
  .timeline-dot{left:-2rem;width:1.2rem;height:1.2rem}
  .edu-card{flex-direction:column;gap:1rem}
  .cta-links{flex-direction:column;align-items:center}
}

/* ── Reduced motion ────────────────── */
@media(prefers-reduced-motion:reduce){
  .reveal{opacity:1;transform:none;transition:none}
  .hero h1,.hero .tagline,.hero .location,.hero-photo,.hero-photo-placeholder,.scroll-hint{opacity:1;transform:none;animation:none}
}

/* ── 404 state ──────────────────────── */
.not-found{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
.not-found h1{font-family:'Playfair Display',serif;font-size:2rem;margin-bottom:1rem}
.not-found a{color:var(--brand);text-decoration:none;font-weight:600}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="loading-spinner"></div>
</div>

<div id="portfolioApp"></div>

<script>
(function() {
  var slug = window.location.pathname.split('/portfolio/')[1];
  if (!slug) return show404();
  slug = slug.replace(/\/+$/, '');

  fetch('/api/portfolio/view/' + encodeURIComponent(slug))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.portfolio) return show404();
      render(data.portfolio);
    })
    .catch(function() { show404(); });

  function show404() {
    hide_loading();
    document.getElementById('portfolioApp').innerHTML =
      '<div class="not-found"><div><h1>Portfoliota ei l\u00f6ydy</h1><p>T\u00e4m\u00e4 portfolio on ehk\u00e4 piilotettu tai sit\u00e4 ei ole viel\u00e4 julkaistu.</p><a href="/">Etusivulle \u2192</a></div></div>';
  }

  function hide_loading() {
    var ls = document.getElementById('loadingScreen');
    if (ls) { ls.classList.add('hide'); setTimeout(function(){ ls.remove(); }, 500); }
  }

  function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
  function hrefUrl(raw) {
    var u = String(raw || '').trim();
    if (!u) return '';
    if (/^https?:\/\//i.test(u)) return u;
    if (/^\/\//.test(u)) return 'https:' + u;
    return 'https://' + u.replace(/^\/+/, '');
  }

  function render(p) {
    // Apply brand colors
    document.documentElement.style.setProperty('--brand', p.brand_color || '#2563a8');
    document.documentElement.style.setProperty('--accent', p.brand_accent || '#c75b3a');
    document.documentElement.style.setProperty('--bg', p.brand_bg || '#f5f3ef');
    document.title = (p.full_name || 'Portfolio') + ' \u2014 Portfolio';

    var photoHtml = p.has_photo
      ? '<img class="hero-photo" src="/api/portfolio/photo/' + esc(p.slug) + '" alt="' + esc(p.full_name) + '">'
      : '<div class="hero-photo-placeholder">' + esc((p.full_name||'?')[0].toUpperCase()) + '</div>';

    var html = '';

    // Hero
    html += '<section class="hero">';
    html += '<div class="hero-inner">';
    html += photoHtml;
    html += '<h1>' + esc(p.full_name) + '</h1>';
    if (p.tagline) html += '<p class="tagline">' + esc(p.tagline) + '</p>';
    if (p.city || p.target_role) {
      html += '<div class="location">';
      if (p.city) html += '<span>\ud83d\udccd ' + esc(p.city) + '</span>';
      if (p.city && p.target_role) html += '<span>\u00b7</span>';
      if (p.target_role) html += '<span>' + esc(p.target_role) + '</span>';
      html += '</div>';
    }
    html += '</div>';
    html += '<div class="scroll-hint">Selaa alas<span></span></div>';
    html += '</section>';

    // Bio
    if (p.bio) {
      html += '<section class="section reveal">';
      html += '<div class="section-title">Tietoa minusta</div>';
      html += '<div class="section-subtitle">Kuka olen ja mit\u00e4 teen</div>';
      html += '<div class="bio-text">' + esc(p.bio).replace(/\n/g, '<br>') + '</div>';
      html += '</section>';
    }

    // Skills
    var skills = p.skills || [];
    if (skills.length > 0) {
      html += '<section class="section reveal">';
      html += '<div class="section-title">Osaaminen</div>';
      html += '<div class="section-subtitle">Taidot ja erikoisalueet</div>';
      // Group by category if available
      var grouped = {};
      skills.forEach(function(s) {
        var cat = (typeof s === 'string') ? 'Taidot' : (s.category || 'Taidot');
        var name = (typeof s === 'string') ? s : s.name;
        if (!grouped[cat]) grouped[cat] = [];
        grouped[cat].push(name);
      });
      Object.keys(grouped).forEach(function(cat) {
        html += '<div class="skill-category">';
        if (Object.keys(grouped).length > 1) html += '<h3>' + esc(cat) + '</h3>';
        html += '<div class="skills-grid">';
        grouped[cat].forEach(function(name) {
          html += '<span class="skill-tag">' + esc(name) + '</span>';
        });
        html += '</div></div>';
      });
      html += '</section>';
    }

    // Experience
    var exp = p.experience || [];
    if (exp.length > 0) {
      html += '<section class="section reveal">';
      html += '<div class="section-title">Ty\u00f6kokemus</div>';
      html += '<div class="section-subtitle">Urapolkuni</div>';
      html += '<div class="timeline">';
      exp.forEach(function(e) {
        html += '<div class="timeline-item">';
        html += '<div class="timeline-dot"></div>';
        html += '<h3>' + esc(e.role || e.title || '') + '</h3>';
        html += '<div class="meta">';
        if (e.company) html += '<span><strong>' + esc(e.company) + '</strong></span>';
        if (e.period) html += '<span>' + esc(e.period) + '</span>';
        html += '</div>';
        if (e.bullets && e.bullets.length) {
          html += '<ul>';
          e.bullets.forEach(function(b) { html += '<li>' + esc(b) + '</li>'; });
          html += '</ul>';
        }
        html += '</div>';
      });
      html += '</div></section>';
    }

    // Education
    var edu = p.education || [];
    if (edu.length > 0) {
      html += '<section class="section reveal">';
      html += '<div class="section-title">Koulutus</div>';
      html += '<div class="section-subtitle">Opinnot ja sertifikaatit</div>';
      edu.forEach(function(e) {
        html += '<div class="edu-card">';
        html += '<div class="edu-icon">\ud83c\udf93</div>';
        html += '<div>';
        html += '<h3>' + esc(e.degree || e.name || '') + '</h3>';
        html += '<div class="meta">' + esc(e.school || '') + (e.year ? ' \u00b7 ' + esc(e.year) : '') + '</div>';
        html += '</div></div>';
      });
      html += '</section>';
    }

    // Achievements
    var ach = p.achievements || [];
    if (ach.length > 0) {
      html += '<section class="section reveal">';
      html += '<div class="section-title">Saavutukset</div>';
      html += '<div class="section-subtitle">Tulokset jotka puhuvat puolestaan</div>';
      ach.forEach(function(a, i) {
        var text = (typeof a === 'string') ? a : a.text;
        html += '<div class="achievement">';
        html += '<div class="ach-num">' + (i+1) + '</div>';
        html += '<p>' + esc(text) + '</p>';
        html += '</div>';
      });
      html += '</section>';
    }

    // Languages
    var langs = p.languages || [];
    if (langs.length > 0) {
      html += '<section class="section reveal">';
      html += '<div class="section-title">Kielet</div>';
      html += '<div style="display:flex;flex-wrap:wrap;gap:.3rem">';
      var levelColors = {'erinomainen':'#22c55e','hyv\u00e4':'#3b82f6','perusteet':'#f59e0b','natiivi':'#22c55e'};
      langs.forEach(function(l) {
        var name = (typeof l === 'string') ? l : l.name;
        var level = (typeof l === 'string') ? '' : (l.level || '');
        var color = '#3b82f6';
        Object.keys(levelColors).forEach(function(k) { if (level.toLowerCase().indexOf(k) >= 0) color = levelColors[k]; });
        html += '<span class="lang-item">';
        html += '<span class="lang-dot" style="background:' + color + '"></span>';
        html += esc(name);
        if (level) html += ' <span style="color:var(--muted);font-size:.82rem">(' + esc(level) + ')</span>';
        html += '</span>';
      });
      html += '</div></section>';
    }

    // Contact CTA
    html += '<section class="cta-section reveal">';
    html += '<h2>Otetaan yhteytt\u00e4</h2>';
    html += '<p>Kiinnostuitko? Ota yhteytt\u00e4 \u2014 vastaan mielell\u00e4ni.</p>';
    html += '<div class="cta-links">';
    if (p.email_public) html += '<a class="cta-btn primary" href="mailto:' + esc(p.email_public) + '">\u2709\ufe0f L\u00e4het\u00e4 viesti</a>';
    if (p.phone_public) html += '<a class="cta-btn secondary" href="tel:' + esc(p.phone_public) + '">\ud83d\udcde Soita</a>';
    if (p.linkedin_url) html += '<a class="cta-btn secondary" href="' + esc(hrefUrl(p.linkedin_url)) + '" target="_blank" rel="noopener noreferrer">LinkedIn</a>';
    if (!p.email_public && !p.phone_public && !p.linkedin_url) {
      html += '<span style="color:rgba(255,255,255,.5)">Yhteystiedot lis\u00e4t\u00e4\u00e4n pian</span>';
    }
    html += '</div></section>';

    // Footer
    html += '<footer class="portfolio-footer">';
    html += '<p>Rakennettu <a href="/">AI Polku</a> -alustalla \u00b7 ' + new Date().getFullYear() + '</p>';
    html += '</footer>';

    document.getElementById('portfolioApp').innerHTML = html;
    hide_loading();

    // Scroll reveal observer
    var reveals = document.querySelectorAll('.reveal');
    if ('IntersectionObserver' in window) {
      var obs = new IntersectionObserver(function(entries) {
        entries.forEach(function(e) {
          if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -60px 0px' });
      reveals.forEach(function(el) { obs.observe(el); });
    } else {
      reveals.forEach(function(el) { el.classList.add('visible'); });
    }
  }
})();
</script>
</body>
</html>
