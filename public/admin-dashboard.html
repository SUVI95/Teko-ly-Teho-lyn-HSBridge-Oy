<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hallintapaneeli — AI Polku | HSBridge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1a2e;
  --ink2: #2d2d44;
  --paper: #f5f3ef;
  --paper2: #eeeae3;
  --warm: #e8e0d4;
  --accent: #c75b3a;
  --accent2: #2563a8;
  --accent3: #2a7a4b;
  --gold: #b8860b;
  --text: #1a1a2e;
  --muted: #6b6880;
  --border: rgba(26,26,46,0.12);
  --shadow: 0 2px 20px rgba(26,26,46,0.08);
  --shadow-md: 0 8px 40px rgba(26,26,46,0.12);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--paper);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  line-height: 1.7;
}

nav {
  background: rgba(245,243,239,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 1rem 2.5rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  font-family: 'DM Serif Display', serif;
  font-weight: 400;
  font-size: 1.3rem;
  color: var(--ink);
}

.nav-logo img {
  height: 40px;
  width: auto;
}

.nav-user {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.btn-logout {
  padding: 8px 16px;
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.3s;
  font-family: 'DM Sans', sans-serif;
}

.btn-logout:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(199,91,58,0.05);
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 2.5rem;
}

.page-header {
  margin-bottom: 2.5rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 1rem;
}

.page-header h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 2.5rem;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: 0.5rem;
}

.page-header p {
  color: var(--muted);
  font-size: 1rem;
}

.back-btn {
  padding: 10px 20px;
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-weight: 600;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.3s;
  font-family: 'DM Sans', sans-serif;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
}

.back-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(199,91,58,0.05);
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 1.5rem;
  margin-bottom: 3rem;
}

.stat-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem;
  box-shadow: var(--shadow);
  transition: all 0.3s;
}

.stat-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}

.stat-label {
  font-size: 0.85rem;
  color: var(--muted);
  font-weight: 500;
  margin-bottom: 0.5rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.stat-value {
  font-size: 2.5rem;
  font-weight: 600;
  color: var(--ink);
  font-family: 'DM Serif Display', serif;
}

.search-filter-bar {
  display: flex;
  gap: 1rem;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}

.search-input {
  flex: 1;
  min-width: 200px;
  padding: 10px 16px;
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 0.95rem;
  font-family: 'DM Sans', sans-serif;
}

.search-input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(199,91,58,0.1);
}

.students-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
  gap: 1.5rem;
  margin-bottom: 2rem;
}

.module-feedback-panel {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.25rem;
  box-shadow: var(--shadow);
  margin-bottom: 2rem;
}

.module-feedback-table-wrap {
  overflow-x: auto;
  border: 1px solid var(--border);
  border-radius: 12px;
}

.module-feedback-table {
  width: 100%;
  border-collapse: collapse;
  min-width: 980px;
}

.module-feedback-table th,
.module-feedback-table td {
  text-align: left;
  padding: 0.65rem 0.7rem;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  font-size: 0.86rem;
}

.module-feedback-table th {
  background: var(--paper2);
  color: var(--ink);
  font-weight: 600;
  position: sticky;
  top: 0;
}

.mini-stars {
  color: var(--gold);
  white-space: nowrap;
}

.emoji-pill {
  font-size: 1.05rem;
}

.student-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem;
  box-shadow: var(--shadow);
  transition: all 0.3s;
  cursor: pointer;
}

.student-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
  border-color: var(--accent);
}

.student-header {
  margin-bottom: 1rem;
}

.student-name {
  font-family: 'DM Serif Display', serif;
  font-size: 1.5rem;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: 0.25rem;
}

.student-email {
  color: var(--muted);
  font-size: 0.9rem;
  margin-bottom: 0.5rem;
}

.student-meta {
  display: flex;
  gap: 1rem;
  font-size: 0.85rem;
  color: var(--muted);
  margin-bottom: 1rem;
}

.progress-summary {
  margin-top: 1rem;
}

.progress-item {
  margin-bottom: 0.75rem;
}

.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 0.85rem;
  color: var(--text);
  margin-bottom: 0.25rem;
}

.progress-bar-container {
  height: 8px;
  background: var(--paper2);
  border-radius: 4px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  background: var(--accent);
  border-radius: 4px;
  transition: width 0.3s ease;
}

.progress-bar.completed {
  background: var(--accent3);
}

/* Student Detail View */
.student-detail {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 2rem;
  box-shadow: var(--shadow);
  margin-bottom: 2rem;
}

.student-detail-header {
  border-bottom: 2px solid var(--border);
  padding-bottom: 1.5rem;
  margin-bottom: 2rem;
}

.student-detail-name {
  font-family: 'DM Serif Display', serif;
  font-size: 2rem;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: 0.5rem;
}

.student-detail-email {
  font-size: 1.1rem;
  color: var(--muted);
  margin-bottom: 1rem;
}

.student-detail-meta {
  display: flex;
  gap: 2rem;
  flex-wrap: wrap;
  font-size: 0.9rem;
  color: var(--muted);
}

.meta-item {
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
}

.meta-label {
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-size: 0.75rem;
  font-weight: 600;
}

.meta-value {
  font-size: 1rem;
  color: var(--text);
}

.progress-overview {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 1rem;
  margin-bottom: 2rem;
}

.progress-card {
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1rem;
}

.progress-card-label {
  font-size: 0.85rem;
  color: var(--muted);
  margin-bottom: 0.5rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.progress-card-value {
  font-size: 1.8rem;
  font-weight: 600;
  color: var(--ink);
  font-family: 'DM Serif Display', serif;
}

.section {
  margin-bottom: 2.5rem;
}

.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
  gap: 1rem;
}

.section-title {
  font-family: 'DM Serif Display', serif;
  font-size: 1.8rem;
  font-weight: 400;
  color: var(--ink);
}

.section-actions {
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
}

.btn {
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  font-weight: 600;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.3s;
  font-family: 'DM Sans', sans-serif;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
}

.btn-primary:hover:not(:disabled) {
  background: #b34e2f;
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(199,91,58,0.35);
}

.btn-secondary {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
}

.btn-secondary:hover:not(:disabled) {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(199,91,58,0.05);
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.tabs {
  display: flex;
  gap: 0.5rem;
  border-bottom: 2px solid var(--border);
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}

.tab {
  padding: 0.75rem 1.5rem;
  background: transparent;
  border: none;
  border-bottom: 3px solid transparent;
  color: var(--muted);
  font-weight: 600;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.3s;
  font-family: 'DM Sans', sans-serif;
  margin-bottom: -2px;
}

.tab:hover {
  color: var(--text);
}

.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}

.content-item {
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
  margin-bottom: 1rem;
}

.content-item-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 0.75rem;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.content-item-title {
  font-weight: 600;
  color: var(--ink);
  font-size: 0.95rem;
}

.content-item-date {
  font-family: 'DM Mono', monospace;
  font-size: 0.85rem;
  color: var(--muted);
}

.content-item-text {
  color: var(--text);
  line-height: 1.7;
  white-space: pre-wrap;
  word-wrap: break-word;
}

.module-badge {
  display: inline-block;
  padding: 4px 12px;
  background: var(--warm);
  border-radius: 6px;
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--ink);
  margin-right: 0.5rem;
}

.feedback-rating {
  display: inline-flex;
  gap: 0.25rem;
  margin-left: 0.5rem;
}

.star {
  color: var(--gold);
  font-size: 1rem;
}

.star.empty {
  color: var(--border);
}

.loading {
  text-align: center;
  padding: 3rem;
  color: var(--muted);
}

.error-message {
  background: rgba(199,91,58,0.1);
  border: 1px solid rgba(199,91,58,0.3);
  color: var(--accent);
  padding: 1rem;
  border-radius: 10px;
  margin-bottom: 1.5rem;
  display: none;
}

.error-message.show {
  display: block;
}

.empty-state {
  text-align: center;
  padding: 3rem;
  color: var(--muted);
}

.empty-state-icon {
  font-size: 3rem;
  margin-bottom: 1rem;
  opacity: 0.5;
}

.hidden {
  display: none;
}

@media (max-width: 768px) {
  .container {
    padding: 1.5rem;
  }
  
  .page-header h1 {
    font-size: 2rem;
  }
  
  .stats-grid {
    grid-template-columns: 1fr;
  }
  
  .students-grid {
    grid-template-columns: 1fr;
  }
  
  .section-header {
    flex-direction: column;
    align-items: flex-start;
  }
  
  .search-filter-bar {
    flex-direction: column;
  }
  
  nav {
    padding: 1rem;
  }
  
  .student-detail-name {
    font-size: 1.5rem;
  }
}
</style>
</head>
<body>
  <nav>
    <div class="nav-logo">
      <img src="/assets/images/logo.png" alt="HSBridge Logo" onerror="this.style.display='none';" />
      <span>HSBridge | AI Polku</span>
    </div>
    <div class="nav-user">
      <button class="btn-logout" id="logoutBtn">Kirjaudu ulos</button>
    </div>
  </nav>

  <div class="container">
    <!-- Student List View -->
    <div id="studentListView">
      <div class="page-header">
        <div>
          <h1>Opiskelijat</h1>
          <p>Valitse opiskelija nähdäksesi kaikki hänen tiedot</p>
        </div>
        <div class="section-actions" style="display:flex;gap:0.5rem;flex-wrap:wrap;">
          <button class="btn btn-primary" id="approveAllBtn" onclick="approveAllStudents()" style="padding:8px 16px;background:var(--accent3);color:#fff;border:none;border-radius:8px;font-size:0.85rem;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;">
            Hyväksy kaikki
          </button>
          <button class="btn btn-secondary" id="downloadAllBtn">
            <span>Lataa kaikki CSV</span>
          </button>
        </div>
      </div>

      <div class="error-message" id="errorMessage"></div>

      <!-- Stats Section -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="stat-label">Opiskelijat</div>
          <div class="stat-value" id="totalStudents">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Aktiiviset</div>
          <div class="stat-value" id="activeStudents">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Keskimääräinen edistyminen</div>
          <div class="stat-value" id="avgProgress">-</div>
        </div>
      </div>

      <div class="module-feedback-panel">
        <div class="section-header" style="margin-bottom:0.75rem;">
          <h2 class="section-title" style="font-size:1.6rem;">Moduulipalautteet</h2>
        </div>
        <div class="search-filter-bar" style="margin-bottom:0.85rem;">
          <select class="search-input" id="moduleFeedbackModuleFilter" style="max-width:320px;">
            <option value="">Kaikki moduulit</option>
            <option value="moduuli6-ai-creation-sprint">moduuli6-ai-creation-sprint</option>
          </select>
          <input class="search-input" type="date" id="moduleFeedbackFromDate" style="max-width:200px;">
          <input class="search-input" type="date" id="moduleFeedbackToDate" style="max-width:200px;">
          <button class="btn btn-secondary" id="moduleFeedbackApplyBtn">Suodata</button>
          <button class="btn btn-secondary" id="moduleFeedbackResetBtn">Tyhjennä</button>
        </div>
        <div id="moduleFeedbackContainer">
          <div class="loading">Ladataan moduulipalautteita...</div>
        </div>
      </div>

      <!-- Search -->
      <div class="search-filter-bar">
        <input type="text" class="search-input" id="studentSearch" placeholder="Etsi nimen tai sähköpostin perusteella...">
      </div>

      <!-- Students Grid -->
      <div id="studentsContainer">
        <div class="loading">Ladataan opiskelijoita...</div>
      </div>
    </div>

    <!-- Student Detail View -->
    <div id="studentDetailView" class="hidden">
      <div class="page-header">
        <div>
          <button class="back-btn" id="backBtn">← Takaisin listaan</button>
        </div>
        <div class="section-actions">
          <button class="btn btn-secondary" id="downloadStudentBtn">
            <span>Lataa CSV</span>
          </button>
        </div>
      </div>

      <div class="error-message" id="detailErrorMessage"></div>

      <div id="studentDetailContainer">
        <div class="loading">Ladataan opiskelijan tietoja...</div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = window.location.origin + '/api';

    // State
    let students = [];
    let currentStudentId = null;
    let currentStudentData = null;
    let moduleReflections = [];

    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
      await loadStudents();
      await loadModuleReflections();
      setupEventListeners();
    });

    // Event Listeners
    function setupEventListeners() {
      document.getElementById('logoutBtn').addEventListener('click', handleLogout);
      document.getElementById('backBtn').addEventListener('click', showStudentList);
      document.getElementById('studentSearch').addEventListener('input', filterStudents);
      document.getElementById('downloadAllBtn').addEventListener('click', downloadAllData);
      document.getElementById('downloadStudentBtn').addEventListener('click', downloadStudentData);
      document.getElementById('moduleFeedbackApplyBtn').addEventListener('click', loadModuleReflections);
      document.getElementById('moduleFeedbackResetBtn').addEventListener('click', () => {
        document.getElementById('moduleFeedbackModuleFilter').value = '';
        document.getElementById('moduleFeedbackFromDate').value = '';
        document.getElementById('moduleFeedbackToDate').value = '';
        loadModuleReflections();
      });
    }

    // API Calls
    async function apiCall(endpoint, options = {}) {
      try {
        const response = await fetch(`${API_URL}${endpoint}`, {
          ...options,
          credentials: 'include',
          headers: {
            'Content-Type': 'application/json',
            ...options.headers
          }
        });

        if (response.status === 401 || response.status === 403) {
          window.location.href = '/login';
          return null;
        }

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error || 'API request failed');
        }

        return await response.json();
      } catch (error) {
        showError(error.message, 'errorMessage');
        return null;
      }
    }

    async function loadStudents() {
      const data = await apiCall('/admin/students/progress');
      if (data && data.students) {
        students = data.students;
        renderStudents();
        updateStats();
      }
    }

    async function loadModuleReflections() {
      const moduleName = document.getElementById('moduleFeedbackModuleFilter').value;
      const from = document.getElementById('moduleFeedbackFromDate').value;
      const to = document.getElementById('moduleFeedbackToDate').value;
      const params = new URLSearchParams();
      if (moduleName) params.set('module', moduleName);
      if (from) params.set('from', from);
      if (to) params.set('to', to);

      const query = params.toString() ? `?${params.toString()}` : '';
      const data = await apiCall(`/admin/module-reflections${query}`);
      if (data && data.moduleReflections) {
        moduleReflections = data.moduleReflections;
        renderModuleReflections();
      }
    }

    function renderModuleReflections() {
      const container = document.getElementById('moduleFeedbackContainer');
      if (!moduleReflections.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🗂️</div>
            <p>Ei moduulipalautteita valituilla suodattimilla</p>
          </div>
        `;
        return;
      }

      container.innerHTML = `
        <div class="module-feedback-table-wrap">
          <table class="module-feedback-table">
            <thead>
              <tr>
                <th>Opiskelija</th>
                <th>Moduuli</th>
                <th>Päivä</th>
                <th>Fiilis</th>
                <th>Tähdet</th>
                <th>Quiz</th>
                <th>Työkalu</th>
                <th>Väärinkäsitys</th>
                <th>Use case</th>
                <th>Avoin reflektio</th>
              </tr>
            </thead>
            <tbody>
              ${moduleReflections.map(r => `
                <tr>
                  <td><strong>${escapeHtml(r.name || 'Nimetön')}</strong><br><span style="color:var(--muted);font-size:.78rem;">${escapeHtml(r.email || '')}</span></td>
                  <td>${escapeHtml(r.module_name || '-')}</td>
                  <td>${formatDate(r.created_at) || '-'}</td>
                  <td class="emoji-pill">${escapeHtml(r.mood_emoji || '-')}</td>
                  <td class="mini-stars">${renderStars(r.helpfulness_rating)}</td>
                  <td>${Number.isFinite(Number(r.quiz_score)) ? `${Number(r.quiz_score)}/8` : '-'}</td>
                  <td>${escapeHtml(r.tool_choice || '-')}</td>
                  <td>${escapeHtml(r.misconception_had || '-')}</td>
                  <td>${formatUseCases(r)}</td>
                  <td>${escapeHtml(r.open_reflection || '-')}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    async function loadStudentDetail(userId) {
      currentStudentId = userId;
      const data = await apiCall(`/admin/students/${userId}`);
      if (data) {
        currentStudentData = data;
        renderStudentDetail(data);
        showStudentDetail();
      }
    }

    // Rendering
    function renderStudents() {
      const container = document.getElementById('studentsContainer');
      const searchTerm = document.getElementById('studentSearch').value.toLowerCase();

      const filtered = students.filter(s => {
        const name = (s.name || '').toLowerCase();
        const email = (s.email || '').toLowerCase();
        return !searchTerm || name.includes(searchTerm) || email.includes(searchTerm);

    function updateStats() {
      const total = students.length;
      const active = students.filter(s => s.last_login).length;
      const avgProgress = students.length > 0
        ? Math.round(students.reduce((sum, s) => {
            const progress = s.sections_accessed > 0 
              ? (s.sections_completed / s.sections_accessed) * 100 
              : 0;
            return sum + progress;
          }, 0) / students.length)
        : 0;

      document.getElementById('totalStudents').textContent = total;
      document.getElementById('activeStudents').textContent = active;
      document.getElementById('avgProgress').textContent = `${avgProgress}%`;
    }

    // Tab switching

      // Update tab buttons
      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
      if (ev && ev.target) ev.target.classList.add('active');

      // Update tab content
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      const tabEl = document.getElementById(`tab-${tabName}`);
      if (tabEl) tabEl.classList.add('active');
    };

          document.body.appendChild(a);
          a.click();

          window.URL.revokeObjectURL(url);

        if (feedbackRes.ok) {

          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `feedback-${new Date().toISOString().split('T')[0]}.csv`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          window.URL.revokeObjectURL(url);

    async function downloadStudentData() {
      if (!currentStudentId) return;

      const btn = document.getElementById('downloadStudentBtn');
      btn.disabled = true;
      btn.innerHTML = '<span>Ladataan...</span>';
      
      try {
        // Create CSV from current student data
        const { user, reflections, feedback, closingActions, consent } = currentStudentData;
        
        // Reflections CSV
        const reflectionsCSV = [
          'Module ID,Reflection Text,Created At,Updated At',
          ...reflections.map(r => {
            const text = (r.reflection_text || '').replace(/"/g, '""').replace(/\n/g, ' ');
            return `"${r.module_id || ''}","${text}","${r.created_at}","${r.updated_at}"`;
          })
        ].join('\n');

        // Feedback CSV
        const feedbackCSV = [
          'Module ID,Question Type,Feedback Text,Rating,Created At',
          ...feedback.map(f => {
            const text = (f.feedback_text || '').replace(/"/g, '""').replace(/\n/g, ' ');
            const questionType = f.question_type === 'what_learned' ? 'What Learned' :
                                f.question_type === 'learned_new' ? 'Learned New' :
                                f.question_type === 'course_feedback' ? 'Course Feedback' :
                                f.question_type === 'module_feedback' ? 'Module Feedback' : f.question_type;
            return `"${f.module_id || ''}","${questionType}","${text}","${f.rating || ''}","${f.created_at}"`;
          })
        ].join('\n');

        // Consent CSV
        const consentCSV = consent ? [
          'Consent Given,Consent Type,Consent Text,IP Address,Created At',
          `"${consent.consent_given}","${consent.consent_type || ''}","${(consent.consent_text || '').replace(/"/g, '""').replace(/\n/g, ' ')}","${consent.ip_address || ''}","${consent.created_at}"`
        ].join('\n') : '';

        // Closing Actions CSV
        const closingActionsCSV = [
          'Action Text,Created At',
          ...closingActions.map(ca => {
            const text = (ca.action_text || '').replace(/"/g, '""').replace(/\n/g, ' ');
            return `"${text}","${ca.created_at}"`;
          })
        ].join('\n');

        // Download all three files
        const downloadCSV = (content, filename) => {
          const blob = new Blob(['\ufeff' + content], { type: 'text/csv;charset=utf-8;' });
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          window.URL.revokeObjectURL(url);
        };

        downloadCSV(reflectionsCSV, `${user.email}-reflections-${new Date().toISOString().split('T')[0]}.csv`);
        setTimeout(() => {
          downloadCSV(feedbackCSV, `${user.email}-feedback-${new Date().toISOString().split('T')[0]}.csv`);
        }, 500);
        setTimeout(() => {
          downloadCSV(closingActionsCSV, `${user.email}-closing-actions-${new Date().toISOString().split('T')[0]}.csv`);
        }, 1000);
        if (consentCSV) {
          setTimeout(() => {
            downloadCSV(consentCSV, `${user.email}-consent-${new Date().toISOString().split('T')[0]}.csv`);
          }, 1500);
        }
      } catch (error) {
        showError('CSV:n lataaminen epäonnistui', 'detailErrorMessage');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<span>Lataa CSV</span>';
      }
    }

      }
    }

    // Utilities
    function formatDate(dateString) {
      if (!dateString) return null;
      const date = new Date(dateString);
      return date.toLocaleString('fi-FI', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function formatTime(seconds) {
      if (!seconds || seconds === 0) return '0 min';
      const hours = Math.floor(seconds / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);
      if (hours > 0) {
        return `${hours}h ${minutes}min`;
      }
      return `${minutes}min`;
    }

    function escapeHtml(text) {
      if (!text) return '-';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showError(message, elementId = 'errorMessage') {
      const errorEl = document.getElementById(elementId);
      errorEl.textContent = message;
      errorEl.classList.add('show');
      setTimeout(() => {
        errorEl.classList.remove('show');
      }, 5000);
    }

    function renderStars(rating) {
      const val = Number(rating || 0);
      if (!val) return '-';
      return Array.from({ length: 5 }, (_, i) => i < val ? '★' : '☆').join('');
    }

    function formatUseCases(row) {
      const first = Array.isArray(row.use_cases) ? row.use_cases : [];
      const second = Array.isArray(row.apply_where) ? row.apply_where : [];
      const merged = [...first, ...second];
      return merged.length ? merged.map(v => escapeHtml(v)).join(', ') : '-';
    }

    // Global function for loading student detail
    window.loadStudentDetail = function(userId) {
      loadStudentDetail(userId);
    };
  </script>
</body>
</html>
