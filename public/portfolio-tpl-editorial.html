<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --parchment:#F5F0E8;--parchment-dark:#EBE4D8;--manuscript:#1A1A2E;--editorial-red:#C0392B;
  --stone-warm:#8B8178;--glass-blue:rgba(214,228,240,.7);--glass-blue-solid:#A8BED4;
  --font-display:'Libre Baskerville',Georgia,serif;--font-body:'Source Sans 3',system-ui,sans-serif;
  --hero-grad:linear-gradient(160deg,#1A1A2E 0%,#2C2C4A 40%,#1A1A2E 100%);
  --density-pad:2rem;--card-radius:3px;
}
html{scroll-behavior:smooth;}
body{background:var(--parchment);color:var(--manuscript);font-family:var(--font-body);font-weight:300;line-height:1.65;overflow-x:hidden;}
.font-playfair{--font-display:'Playfair Display',Georgia,serif;}
.font-libre{--font-display:'Libre Baskerville',Georgia,serif;}
.density-compact{--density-pad:1.25rem;}
.density-spacious{--density-pad:3rem;}
.hero-light #heroSec{background:var(--parchment)!important;}
.hero-light #heroSec .hero-bg-dark{display:none!important;}
.hero-light #heroSec .hero-title,.hero-light #heroSec .hero-title span{color:var(--manuscript)!important;}
.hero-light #heroSec .hero-sub{color:rgba(26,26,46,.65)!important;}
.hero-light #heroSec .hero-stat{color:rgba(26,26,46,.45)!important;}
.hero-light #heroSec .hero-badge{background:rgba(26,26,46,.06)!important;border-color:rgba(26,26,46,.12)!important;color:rgba(26,26,46,.7)!important;}
.no-floats .float-photo{display:none!important;}
.card-flat .bento-card,.card-flat .manifesto-card{box-shadow:none!important;border:1px solid rgba(26,26,46,.1)!important;backdrop-filter:none!important;}
.card-glass .bento-card{background:rgba(214,228,240,.45)!important;border:1px solid rgba(214,228,240,.8)!important;backdrop-filter:blur(16px)!important;}
.grain-overlay{position:absolute;inset:0;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:.06;}
.font-display{font-family:var(--font-display);}
.font-body{font-family:var(--font-body);}
.btn-editorial{background:var(--editorial-red);color:var(--parchment);border:none;cursor:pointer;font-family:var(--font-body);font-weight:600;transition:opacity .2s,transform .2s;}
.btn-editorial:hover{opacity:.92;transform:translateY(-1px);}
.btn-ghost{background:transparent;border:1px solid rgba(214,228,240,.25);text-decoration:none;display:inline-block;transition:border-color .2s;}
.btn-ghost:hover{border-color:rgba(214,228,240,.5);}
header.site-header{position:fixed;top:0;left:0;right:0;z-index:40;padding:1.25rem 0;transition:background .4s,backdrop-filter .4s;}
header.site-header.scrolled{background:rgba(245,240,232,.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(26,26,46,.06);}
header.site-header.scrolled .nav-link{color:rgba(26,26,46,.55);}
header.site-header.scrolled .nav-link:hover{color:var(--manuscript);}
header.site-header.scrolled .nav-brand{color:var(--manuscript);}
.nav-inner{max-width:80rem;margin:0 auto;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;}
.nav-brand{display:flex;align-items:center;gap:.5rem;font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--parchment);text-decoration:none;}
header.scrolled .nav-brand{color:var(--manuscript);}
.nav-links{display:none;gap:2rem;list-style:none;}
@media(min-width:768px){.nav-links{display:flex;}}
.nav-link{font-size:.82rem;font-weight:500;color:rgba(214,228,240,.6);text-decoration:none;transition:color .2s;}
.nav-link:hover{color:var(--parchment);}
.nav-cta{font-size:.82rem;padding:.55rem 1.25rem;border-radius:var(--card-radius);}
#heroSec{position:relative;min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden;}
.hero-bg-dark{position:absolute;inset:0;background:var(--hero-grad);}
.hero-glow-a,.hero-glow-b{position:absolute;pointer-events:none;filter:blur(60px);}
.hero-glow-a{top:20%;left:30%;width:600px;height:400px;background:radial-gradient(ellipse,rgba(214,228,240,.07) 0%,transparent 70%);}
.hero-glow-b{bottom:10%;right:20%;width:400px;height:300px;background:radial-gradient(ellipse,rgba(192,57,43,.06) 0%,transparent 70%);}
.float-photo{position:absolute;z-index:6;overflow:hidden;border-radius:var(--card-radius);box-shadow:0 8px 32px rgba(0,0,0,.25);}
.float-photo img{width:100%;height:100%;object-fit:cover;filter:sepia(15%) brightness(.88);}
.float-photo::after{content:'';position:absolute;inset:0;box-shadow:inset 0 0 0 1px rgba(245,240,232,.12);border-radius:var(--card-radius);pointer-events:none;}
.float-a{top:12%;left:6%;width:180px;height:240px;animation:floatA 8s ease-in-out infinite;}
.float-b{top:5%;right:8%;width:160px;height:210px;animation:floatB 9s ease-in-out infinite;}
.float-c{bottom:20%;left:3%;width:150px;height:200px;animation:floatC 7s ease-in-out infinite;}
.float-d{top:30%;right:4%;width:140px;height:190px;animation:floatD 10s ease-in-out infinite;}
@keyframes floatA{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes floatB{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(10px) rotate(1deg)}}
@keyframes floatC{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes floatD{0%,100%{transform:translateY(0)}50%{transform:translateY(14px)}}
.hero-content{position:relative;z-index:10;padding:8rem 1.5rem 4rem;max-width:64rem;margin:0 auto;width:100%;}
.hero-badge{display:inline-flex;align-items:center;gap:.6rem;padding:.35rem 1rem;border-radius:999px;background:rgba(214,228,240,.12);border:1px solid rgba(214,228,240,.25);backdrop-filter:blur(12px);margin-bottom:2rem;}
.ping-dot{position:relative;width:8px;height:8px;}
.ping-dot::before{content:'';position:absolute;inset:0;border-radius:50%;background:#4ade80;animation:ping 1.5s cubic-bezier(0,0,.2,1) infinite;}
.ping-dot::after{content:'';position:absolute;inset:0;border-radius:50%;background:#4ade80;}
@keyframes ping{75%,100%{transform:scale(2);opacity:0;}}
.hero-badge span{font-size:.68rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:rgba(214,228,240,.8);}
.hero-title{font-family:var(--font-display);font-size:clamp(2.5rem,8vw,5.5rem);line-height:.92;font-weight:700;color:var(--parchment);letter-spacing:-.02em;margin-bottom:1.5rem;}
.hero-title .grad-italic{font-style:italic;background:linear-gradient(135deg,#F5F0E8 0%,#D6E4F0 50%,#F5F0E8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero-sub{font-size:1.05rem;line-height:1.7;color:rgba(214,228,240,.7);max-width:36rem;margin-bottom:2rem;font-weight:300;}
.hero-actions{display:flex;flex-wrap:wrap;gap:1rem;margin-bottom:2.5rem;}
.hero-actions .btn-editorial{padding:1rem 2rem;font-size:.95rem;border-radius:var(--card-radius);}
.hero-actions .btn-ghost{padding:1rem 2rem;font-size:.9rem;border-radius:var(--card-radius);color:rgba(214,228,240,.8);}
.hero-stats{display:flex;flex-wrap:wrap;gap:2rem;font-size:.68rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:rgba(214,228,240,.4);}
.scroll-hint{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:.5rem;color:rgba(214,228,240,.3);font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;}
.scroll-line{width:1px;height:3rem;background:linear-gradient(to bottom,rgba(214,228,240,.3),transparent);}
.section{padding:5rem 0;position:relative;overflow:hidden;}
.section-inner{max-width:72rem;margin:0 auto;padding:0 1.5rem;position:relative;z-index:1;}
.section-label{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;}
.section-label-line{width:2rem;height:1px;background:var(--editorial-red);}
.section-label-text{font-size:.68rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--editorial-red);}
.section-h{font-family:var(--font-display);font-size:clamp(2rem,5vw,3.5rem);line-height:1.05;font-weight:700;letter-spacing:-.02em;margin-bottom:2rem;max-width:18ch;}
.section-h em{font-style:italic;color:var(--editorial-red);}
.rule-lines{position:absolute;inset:0;pointer-events:none;z-index:0;}
.rule-lines div{position:absolute;width:100%;height:1px;background:rgba(26,26,46,.04);}
.manifesto-card{position:relative;border-radius:var(--card-radius);overflow:hidden;margin-bottom:1.5rem;padding:2rem;border:1px solid rgba(26,26,46,.08);box-shadow:0 4px 24px rgba(26,26,46,.06);}
.manifesto-card:nth-child(odd){background:rgba(245,240,232,.95);margin-right:1rem;}
.manifesto-card:nth-child(even){background:rgba(214,228,240,.45);margin-left:1.5rem;}
.manifesto-grid{display:grid;grid-template-columns:1fr;gap:1.5rem;}
@media(min-width:768px){.manifesto-grid{grid-template-columns:auto 1fr auto;align-items:start;}}
.manifesto-num{font-family:var(--font-display);font-size:2rem;font-weight:300;color:rgba(26,26,46,.2);}
.manifesto-title{font-family:var(--font-display);font-size:clamp(1.1rem,2.5vw,1.5rem);font-weight:600;line-height:1.3;margin-bottom:.75rem;}
.manifesto-body{font-size:.95rem;line-height:1.75;color:rgba(26,26,46,.6);}
.manifesto-note{padding:.5rem .75rem;border-radius:var(--card-radius);background:rgba(192,57,43,.08);border:1px solid rgba(192,57,43,.2);font-size:.72rem;font-style:italic;color:var(--editorial-red);font-family:var(--font-display);white-space:nowrap;}
.quote-block{background:var(--manuscript);padding:2.5rem;text-align:center;border-radius:var(--card-radius);box-shadow:0 16px 64px rgba(26,26,46,.2);margin-top:2rem;}
.quote-block p{font-family:var(--font-display);font-style:italic;font-size:clamp(1.2rem,3vw,1.8rem);color:var(--parchment);line-height:1.25;}
.bento-grid{display:grid;grid-template-columns:1fr;gap:1.25rem;}
@media(min-width:768px){.bento-grid{grid-template-columns:repeat(3,1fr);}}
.bento-card{border-radius:var(--card-radius);overflow:hidden;padding:var(--density-pad);position:relative;min-height:200px;display:flex;flex-direction:column;}
.bento-card.span2{grid-column:span 1;}
@media(min-width:768px){.bento-card.span2{grid-column:span 2;}}
.bento-card.dark{background:var(--manuscript);color:var(--parchment);}
.bento-card.light{background:rgba(245,240,232,.97);border:1px solid rgba(26,26,46,.08);}
.bento-card.glass{background:rgba(214,228,240,.5);border:1px solid rgba(214,228,240,.8);backdrop-filter:blur(16px);}
.bento-label{font-size:.68rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--editorial-red);margin-bottom:.75rem;}
.bento-card.dark .bento-label{color:var(--editorial-red);}
.bento-card.glass .bento-label,.bento-card.light .bento-label{color:var(--stone-warm);}
.bento-h{font-family:var(--font-display);font-size:1.2rem;font-weight:600;line-height:1.35;margin-bottom:.75rem;}
.bento-card.dark .bento-h{color:var(--parchment);}
.bento-p{font-size:.88rem;line-height:1.65;color:rgba(26,26,46,.55);}
.bento-card.dark .bento-p{color:rgba(214,228,240,.6);}
.skill-bar-row{margin-bottom:.65rem;}
.skill-bar-meta{display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:.3rem;}
.skill-bar-track{height:3px;border-radius:999px;background:rgba(26,26,46,.08);overflow:hidden;}
.skill-bar-fill{height:100%;border-radius:999px;background:var(--editorial-red);width:0;transition:width 1s ease;}
.bento-stat{font-family:var(--font-display);font-size:3rem;font-weight:700;color:var(--editorial-red);line-height:1;}
.process-list{padding-left:0;}
.process-step{padding-bottom:3rem;border-bottom:1px solid rgba(214,228,240,.06);margin-bottom:0;}
.process-step:last-child{border-bottom:none;}
.process-grid{display:grid;grid-template-columns:1fr;gap:1.5rem;}
@media(min-width:768px){.process-grid{grid-template-columns:5rem 1fr 12rem;align-items:start;}}
.process-num{font-family:var(--font-display);font-size:3rem;font-weight:300;color:rgba(214,228,240,.12);line-height:1;}
.process-period{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(192,57,43,.6);margin-top:.5rem;}
.process-h{font-family:var(--font-display);font-size:1.15rem;font-weight:600;color:var(--parchment);margin-bottom:.35rem;}
.process-tagline{font-family:var(--font-display);font-style:italic;color:rgba(214,228,240,.4);font-size:.9rem;margin-bottom:.75rem;}
.process-body{font-size:.88rem;line-height:1.75;color:rgba(214,228,240,.5);}
.process-deliverable{padding:.75rem 1rem;border-radius:var(--card-radius);background:rgba(214,228,240,.05);border:1px solid rgba(214,228,240,.1);font-size:.78rem;color:rgba(214,228,240,.6);}
.testimonial-grid{display:grid;grid-template-columns:1fr;gap:1.5rem;}
@media(min-width:768px){.testimonial-grid{grid-template-columns:1fr 2fr;}}
.testimonial-card{border-radius:var(--card-radius);padding:2rem;}
.testimonial-card.dark{background:var(--manuscript);}
.testimonial-card.light{background:rgba(214,228,240,.5);border:1px solid rgba(214,228,240,.8);}
.testimonial-quote{font-family:var(--font-display);font-style:italic;line-height:1.7;margin-bottom:1.5rem;}
.testimonial-card.dark .testimonial-quote{color:rgba(245,240,232,.8);font-size:1.05rem;}
.testimonial-card.light .testimonial-quote{color:rgba(26,26,46,.75);font-size:.95rem;}
.marquee-wrap{overflow:hidden;margin-top:3rem;position:relative;}
.marquee-fade-l,.marquee-fade-r{position:absolute;top:0;bottom:0;width:6rem;z-index:2;pointer-events:none;}
.marquee-fade-l{left:0;background:linear-gradient(to right,var(--parchment),transparent);}
.marquee-fade-r{right:0;background:linear-gradient(to left,var(--parchment),transparent);}
.marquee-track{display:flex;gap:2rem;width:max-content;animation:marquee 40s linear infinite;}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.marquee-item{font-family:var(--font-display);font-size:.85rem;color:rgba(26,26,46,.25);white-space:nowrap;font-style:italic;}
.contact-section{background:var(--manuscript);padding:5rem 0;}
.contact-h{font-family:var(--font-display);font-size:clamp(1.8rem,4vw,2.8rem);color:var(--parchment);margin-bottom:1rem;}
.contact-sub{color:rgba(214,228,240,.55);max-width:28rem;margin-bottom:2rem;line-height:1.7;}
.contact-form{max-width:28rem;}
.contact-field{width:100%;background:rgba(214,228,240,.06);border:1px solid rgba(214,228,240,.12);border-radius:var(--card-radius);padding:.75rem 1rem;color:var(--parchment);font-family:var(--font-body);font-size:.88rem;margin-bottom:.75rem;}
.contact-field:focus{outline:none;border-color:rgba(214,228,240,.3);}
.contact-field::placeholder{color:rgba(214,228,240,.35);}
textarea.contact-field{min-height:88px;resize:vertical;}
.contact-info-row{display:flex;flex-wrap:wrap;gap:1rem;margin-top:2rem;}
.contact-chip{padding:.5rem 1rem;border-radius:var(--card-radius);background:rgba(214,228,240,.06);border:1px solid rgba(214,228,240,.1);font-size:.82rem;color:rgba(214,228,240,.7);text-decoration:none;}
.contact-chip:hover{border-color:rgba(214,228,240,.25);}
.site-footer{border-top:1px solid rgba(26,26,46,.1);padding:2.5rem 0 6rem;background:var(--parchment);}
.footer-inner{max-width:80rem;margin:0 auto;padding:0 1.5rem;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:1.5rem;}
.footer-brand{font-family:var(--font-display);font-weight:700;color:rgba(26,26,46,.7);}
.sticky-cta{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(26,26,46,.85);backdrop-filter:blur(12px);border-top:1px solid rgba(214,228,240,.12);padding:1rem 0;}
.sticky-inner{max-width:80rem;margin:0 auto;padding:0 1.5rem;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:1rem;}
.sticky-text{font-family:var(--font-display);font-style:italic;color:rgba(245,240,232,.85);font-size:.95rem;}
.reveal-item{opacity:0;transform:translateY(24px);transition:opacity .65s ease,transform .65s ease;}
.reveal-item.in{opacity:1;transform:translateY(0);}
.loading-screen{position:fixed;inset:0;background:var(--parchment);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s;}
.loading-screen.hide{opacity:0;pointer-events:none;}
.ldsp{width:36px;height:36px;border:2px solid rgba(26,26,46,.1);border-top-color:var(--editorial-red);border-radius:50%;animation:spin .9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:767px){.float-photo{display:none;}.manifesto-card:nth-child(even){margin-left:0;}.manifesto-card:nth-child(odd){margin-right:0;}}
</style>
</head>
<body>
<div class="loading-screen" id="loadingScreen"><div class="ldsp"></div></div>
<div id="app"></div>
<script>
function portfolioSlugFromPath(){
  var path=location.pathname.replace(/^\/+|\/+$/g,'');
  if(!path) return '';
  var seg=path.split('/').filter(Boolean);
  if(seg[0]==='portfolio'&&seg[1]) return seg[1].split('?')[0];
  if(seg.length===1) return seg[0].split('?')[0];
  return '';
}
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function hrefUrl(raw){var u=String(raw||'').trim();if(!u)return'';if(/^https?:\/\//i.test(u))return u;if(/^\/\//.test(u))return'https:'+u;return'https://'+u.replace(/^\/+/,'');}
function ini(n){return(n||'').split(/\s+/).map(function(w){return w[0]||'';}).join('').substring(0,2).toUpperCase();}
function hexRgb(hex){hex=String(hex||'').replace('#','').trim();if(hex.length===3)hex=hex.split('').map(function(c){return c+c;}).join('');if(hex.length!==6)return null;return[parseInt(hex.slice(0,2),16),parseInt(hex.slice(2,4),16),parseInt(hex.slice(4,6),16)];}
function rgbaHex(hex,a){var c=hexRgb(hex);if(!c)return'rgba(192,57,43,'+a+')';return'rgba('+c[0]+','+c[1]+','+c[2]+','+a+')';}

function applyEditorialTheme(p){
  var vs=(p.visual_style&&typeof p.visual_style==='object')?p.visual_style:{};
  var parchment=vs.parchment||p.brand_bg||'#F5F0E8';
  var manuscript=vs.manuscript||p.brand_color||'#1A1A2E';
  var accent=vs.accent||p.brand_accent||'#C0392B';
  document.documentElement.style.setProperty('--parchment',parchment);
  document.documentElement.style.setProperty('--parchment-dark',vs.parchment_dark||parchment);
  document.documentElement.style.setProperty('--manuscript',manuscript);
  document.documentElement.style.setProperty('--editorial-red',accent);
  document.body.classList.remove('font-playfair','font-libre','density-compact','density-spacious','hero-light','no-floats','card-flat','card-glass');
  if(vs.font_display==='playfair') document.body.classList.add('font-playfair');
  else document.body.classList.add('font-libre');
  if(vs.density==='compact') document.body.classList.add('density-compact');
  else if(vs.density==='spacious') document.body.classList.add('density-spacious');
  if(vs.hero_style==='light') document.body.classList.add('hero-light');
  if(vs.show_float_photos===false) document.body.classList.add('no-floats');
  if(vs.card_style==='flat') document.body.classList.add('card-flat');
  else if(vs.card_style==='glass') document.body.classList.add('card-glass');
  if(vs.font_body){
    document.documentElement.style.setProperty('--font-body',"'"+vs.font_body+"',system-ui,sans-serif");
  }
  if(vs.font_display_name){
    document.documentElement.style.setProperty('--font-display',"'"+vs.font_display_name+"',Georgia,serif");
  }
}

function sectionVisible(p,key){
  var vs=p.visual_style||{};
  var sec=vs.sections||{};
  if(sec[key]===false) return false;
  return true;
}

function render(p){
  applyEditorialTheme(p);
  var vs=p.visual_style||{};
  var nm=esc(p.full_name||''),bio=esc(p.bio||''),ct=esc(p.city||''),rl=esc(p.target_role||''),em=esc(p.email_public||''),li=p.linkedin_url?esc(hrefUrl(p.linkedin_url)):'';
  var photo=p.has_photo?'/api/portfolio/photo/'+encodeURIComponent(p.slug):'';
  var sk=p.skills||[],ex=(p.experience||[]).filter(function(e){return e&&e.show!==false;}),ed=p.education||[],la=p.languages||[],achiev=p.achievements||[];
  var hs=esc(p.hidden_strengths||''),cs=esc(p.career_summary||'');
  document.title=(p.full_name||'Portfolio')+' — Elävä CV';

function initScrollEffects(){
  var hdr=document.getElementById('siteHeader');
  window.addEventListener('scroll',function(){
    if(!hdr) return;
    hdr.classList.toggle('scrolled',window.scrollY>60);
  },{passive:true});
  var obs=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){
        e.target.classList.add('in');
        e.target.querySelectorAll('.skill-bar-fill[data-w]').forEach(function(b){b.style.width=b.getAttribute('data-w')+'%';});
        obs.unobserve(e.target);
      }
    });
  },{threshold:.12,rootMargin:'0px 0px -40px 0px'});
  document.querySelectorAll('.reveal-item').forEach(function(el){obs.observe(el);});
}

async function sendContact(){
  var btn=event&&event.target?event.target:null;
  var ok=document.getElementById('contactOk');
  var name=document.getElementById('contactName').value.trim();
  var email=document.getElementById('contactEmail').value.trim();
  var message=document.getElementById('contactMsg').value.trim();
  if(!name||!email||!message){ok.style.display='block';ok.style.color='#f87171';ok.textContent='Täytä kaikki kentät.';return;}
  if(btn) btn.disabled=true;
  try{
    var r=await fetch('/api/portfolio/contact',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slug:window._portfolioSlug,name:name,email:email,message:message})});
    var d=await r.json();
    if(!r.ok) throw new Error(d.error||'Virhe');
    ok.style.display='block';ok.style.color='#4ade80';ok.textContent='✓ Viesti lähetetty!';
  }catch(e){ok.style.display='block';ok.style.color='#f87171';ok.textContent=e.message||'Lähetys epäonnistui.';}
  if(btn) btn.disabled=false;
}

function hideLoad(){var l=document.getElementById('loadingScreen');if(l){l.classList.add('hide');setTimeout(function(){l.remove();},400);}}

var slug=portfolioSlugFromPath();
if(!slug){hideLoad();document.getElementById('app').innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;text-align:center;"><p>Portfoliota ei löytynyt.</p></div>';}
else{
  slug=slug.replace(/\/+$/,'').split('?')[0];
  var qs=new URLSearchParams(location.search);
  var isPreview=qs.get('preview')==='1';
  var pt=qs.get('pt')||'';
  var apiUrl=isPreview?'/api/portfolio/preview/'+encodeURIComponent(slug):'/api/portfolio/view/'+encodeURIComponent(slug);
  if(isPreview&&pt) apiUrl+='?pt='+encodeURIComponent(pt);
  fetch(apiUrl,{credentials:isPreview&&!pt?'include':'same-origin'}).then(function(r){return r.json().then(function(d){return{ok:r.ok,status:r.status,data:d};});})
  .then(function(o){
    if(o.ok&&o.data.portfolio){
      var pf=o.data.portfolio;
      if(pf.template!=='editorial'&&pf.workspace_draft&&pf.workspace_draft.visual_style) pf.visual_style=pf.workspace_draft.visual_style;
      return render(pf);
    }
    hideLoad();
    document.getElementById('app').innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;text-align:center;"><h1 style="font-family:serif;margin-bottom:1rem;">Portfolio ei saatavilla</h1><p style="color:#666;">Julkaise portfolio Editorial-moodissa tai käytä esikatselulinkkiä.</p></div>';
  }).catch(function(){hideLoad();});
}
</script>
