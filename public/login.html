<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kirjaudu sisään - HSBridge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1a2e;
  --ink2: #2d2d44;
  --paper: #f5f3ef;
  --paper2: #eeeae3;
  --warm: #e8e0d4;
  --accent: #c75b3a;
  --accent2: #2563a8;
  --accent3: #2a7a4b;
  --gold: #b8860b;
  --text: #1a1a2e;
  --muted: #6b6880;
  --border: rgba(26,26,46,0.12);
  --shadow: 0 2px 20px rgba(26,26,46,0.08);
  --shadow-md: 0 8px 40px rgba(26,26,46,0.12);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--paper);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  position: relative;
  overflow: hidden;
}

body::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 50%, rgba(199,91,58,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 30%, rgba(37,99,168,0.06) 0%, transparent 60%);
  pointer-events: none;
}

.login-container {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3rem;
  max-width: 450px;
  width: 100%;
  box-shadow: var(--shadow-md);
  position: relative;
  z-index: 1;
}

.logo {
  text-align: center;
  margin-bottom: 2.5rem;
}

.logo img {
  height: 60px;
  width: auto;
  margin-bottom: 1rem;
}

.logo h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.8rem;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: 0.5rem;
}

.logo p {
  color: var(--muted);
  font-size: 0.95rem;
  font-weight: 300;
}

.form-group {
  margin-bottom: 1.5rem;
}

label {
  display: block;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 0.5rem;
  font-family: 'DM Sans', sans-serif;
}

input {
  width: 100%;
  padding: 12px 16px;
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 1rem;
  transition: all 0.3s;
  font-family: 'DM Sans', sans-serif;
}

input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(199,91,58,0.1);
}

.btn-primary {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-weight: 600;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.3s;
  margin-top: 0.5rem;
  font-family: 'DM Sans', sans-serif;
}

.btn-primary:hover:not(:disabled) {
  background: #b34e2f;
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(199,91,58,0.35);
}

.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.forgot-password {
  text-align: center;
  margin-top: 1rem;
}

.forgot-password a {
  color: var(--accent2);
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 500;
  transition: color 0.2s;
}

.forgot-password a:hover {
  color: var(--accent);
  text-decoration: underline;
}

.divider {
  text-align: center;
  margin: 2rem 0;
  color: var(--muted);
  font-size: 0.85rem;
  position: relative;
  font-family: 'DM Mono', monospace;
}

.divider::before,
.divider::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 40%;
  height: 1px;
  background: var(--border);
}

.divider::before { left: 0; }
.divider::after { right: 0; }

.btn-secondary {
  width: 100%;
  padding: 14px;
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-weight: 600;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.3s;
  text-decoration: none;
  display: block;
  text-align: center;
  font-family: 'DM Sans', sans-serif;
}

.btn-secondary:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(199,91,58,0.05);
}

.error-message {
  background: rgba(199,91,58,0.1);
  border: 1px solid rgba(199,91,58,0.3);
  color: var(--accent);
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 1rem;
  font-size: 0.9rem;
  display: none;
}

.error-message.show {
  display: block;
}

.success-message {
  background: rgba(42,122,75,0.1);
  border: 1px solid rgba(42,122,75,0.3);
  color: var(--accent3);
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 1rem;
  font-size: 0.9rem;
  display: none;
}

.success-message.show {
  display: block;
}

@media (max-width: 480px) {
  .login-container {
    padding: 2rem 1.5rem;
  }
}
</style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <img src="/logo.png" alt="HSBridge Logo" />
      <h1>HSBridge</h1>
      <p>Kirjaudu sisään jatkaaksesi oppimista</p>
    </div>
    
    <div class="error-message" id="errorMessage"></div>
    <div class="success-message" id="successMessage"></div>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Sähköposti</label>
        <input type="email" id="email" name="email" required autocomplete="email">
      </div>
      
      <div class="form-group">
        <label for="password">Salasana</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>
      
      <button type="submit" class="btn-primary" id="submitBtn">Kirjaudu sisään</button>
      
      <div class="forgot-password">
        <a href="#" onclick="showForgotPassword(); return false;">Unohditko salasanan?</a>
      </div>
    </form>
    
    <div id="forgotPasswordForm" style="display: none;">
      <div class="form-group">
        <label for="resetEmail">Sähköposti</label>
        <input type="email" id="resetEmail" name="resetEmail" required>
      </div>
      <button type="button" class="btn-primary" onclick="requestPasswordReset()">Lähetä salasanan palautuslinkki</button>
      <div class="forgot-password">
        <a href="#" onclick="showLogin(); return false;">← Takaisin kirjautumiseen</a>
      </div>
    </div>
    
    <div class="divider">tai</div>
    
    <a href="/register" class="btn-secondary">Luo uusi tili</a>
  </div>
  
  <script>
    const API_URL = window.location.origin + '/api';
    
    function showForgotPassword() {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('forgotPasswordForm').style.display = 'block';
      document.getElementById('errorMessage').classList.remove('show');
      document.getElementById('successMessage').classList.remove('show');
    }
    
    function showLogin() {
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('forgotPasswordForm').style.display = 'none';
      document.getElementById('errorMessage').classList.remove('show');
      document.getElementById('successMessage').classList.remove('show');
    }
    
    async function requestPasswordReset() {
      const email = document.getElementById('resetEmail').value.trim();
      const errorMsg = document.getElementById('errorMessage');
      const successMsg = document.getElementById('successMessage');
      
      if (!email) {
        errorMsg.textContent = 'Syötä sähköpostiosoite';
        errorMsg.classList.add('show');
        successMsg.classList.remove('show');
        return;
      }
      
      try {
        const response = await fetch(`${API_URL}/auth/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          successMsg.textContent = 'Salasanan palautuslinkki on lähetetty sähköpostiisi. Tarkista postilaatikkosi.';
          successMsg.classList.add('show');
          errorMsg.classList.remove('show');
        } else {
          errorMsg.textContent = data.error || 'Salasanan palautus epäonnistui';
          errorMsg.classList.add('show');
          successMsg.classList.remove('show');
        }
      } catch (error) {
        errorMsg.textContent = 'Yhteysvirhe. Yritä uudelleen hetken kuluttua.';
        errorMsg.classList.add('show');
        successMsg.classList.remove('show');
      }
    }
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const submitBtn = document.getElementById('submitBtn');
      const errorMsg = document.getElementById('errorMessage');
      
      submitBtn.disabled = true;
      submitBtn.textContent = 'Kirjaudutaan...';
      errorMsg.classList.remove('show');
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      try {
        const response = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          window.location.href = '/';
        } else {
          errorMsg.textContent = data.error || 'Kirjautuminen epäonnistui';
          errorMsg.classList.add('show');
        }
      } catch (error) {
        errorMsg.textContent = 'Yhteysvirhe. Tarkista että palvelin on käynnissä.';
        errorMsg.classList.add('show');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Kirjaudu sisään';
      }
    });
  </script>
</body>
</html>
