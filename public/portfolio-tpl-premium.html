<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<meta name="robots" content="index, follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --v:#7c6ef2;--v2:#5b4de0;
  --b:#3b82f6;
  --em:#10b981;
  --bg:#faf9f6;--bg2:#f2f0ec;--bg3:#eceae4;
  --fg:#1a1a2e;--fg2:#6b6880;--fg3:#aaa8b8;
  --glass:rgba(255,255,255,.7);--glass2:rgba(255,255,255,.9);
  --bd:rgba(26,26,46,.1);--bd2:rgba(26,26,46,.2);
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--fg);font-family:'DM Sans',sans-serif;font-weight:400;line-height:1.65;overflow-x:hidden;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;background:rgba(250,249,246,.92);backdrop-filter:blur(18px);border-bottom:1px solid var(--bd);}
.nav-brand{display:flex;align-items:center;gap:.6rem;text-decoration:none;color:var(--fg);font-size:.9rem;font-weight:500;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--v);box-shadow:0 0 10px rgba(124,110,242,.45);}
.nav-links{display:flex;gap:2rem;list-style:none;}
.nav-links a{font-size:.8rem;color:var(--fg2);text-decoration:none;transition:color .2s;}
.nav-links a:hover{color:var(--fg);}
.btn-pill{background:var(--v);color:#fff;padding:.5rem 1.35rem;border-radius:999px;font-size:.8rem;font-weight:500;text-decoration:none;transition:all .2s;}
.btn-pill:hover{background:var(--v2);transform:translateY(-1px);}

/* HERO */
.orb{position:absolute;border-radius:50%;pointer-events:none;filter:blur(80px);}
.orb1{width:700px;height:700px;top:-200px;left:-200px;background:radial-gradient(circle,rgba(124,110,242,.28) 0%,transparent 65%);}
.orb2{width:800px;height:800px;bottom:-300px;right:-200px;background:radial-gradient(circle,rgba(59,130,246,.22) 0%,transparent 65%);}
.grid-bg{position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(rgba(26,26,46,.045) 1px,transparent 1px);background-size:28px 28px;mask-image:radial-gradient(ellipse at center,black 30%,transparent 75%);}
.hero-layout{display:flex;align-items:center;gap:4rem;}
.hero-content{flex:1;}
.hero-photo{flex-shrink:0;width:280px;height:280px;border-radius:50%;background:linear-gradient(135deg,rgba(124,110,242,.12) 0%,rgba(59,130,246,.12) 100%);border:2px solid rgba(124,110,242,.2);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.hero-photo::before{content:'';position:absolute;inset:-3px;border-radius:50%;background:conic-gradient(from 0deg,var(--v),var(--b),var(--v));z-index:-1;animation:spinGrad 8s linear infinite;}
.hero-photo::after{content:'';position:absolute;inset:0;border-radius:50%;background:var(--bg);z-index:-1;}
@keyframes spinGrad{to{transform:rotate(360deg)}}
.hero-photo svg{width:80px;height:80px;color:var(--fg3);opacity:.5;}
.hero-photo img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.hero-pill{display:inline-flex;align-items:center;gap:.5rem;background:rgba(255,255,255,.65);border:1px solid rgba(124,110,242,.2);border-radius:999px;padding:.35rem 1rem;font-size:.73rem;color:var(--fg2);margin-bottom:2rem;backdrop-filter:blur(8px);}
h1{font-family:'Instrument Serif',serif;font-size:clamp(3rem,8vw,6.5rem);line-height:.95;letter-spacing:-.02em;margin-bottom:1.75rem;}
h1 .block{display:block;}
.grad{background:linear-gradient(135deg,#6d5ce6 0%,#7c6ef2 45%,#4f8ef0 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-style:italic;}
.hero-sub{font-size:1.05rem;color:var(--fg2);max-width:500px;line-height:1.8;margin-bottom:2.75rem;font-weight:300;}
.hero-sub strong{color:var(--fg);font-weight:500;}
.btn-row{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:4rem;}
.btn-primary{background:var(--v);color:#fff;padding:.9rem 2rem;border-radius:999px;font-size:.88rem;font-weight:500;text-decoration:none;display:inline-flex;align-items:center;gap:.6rem;transition:all .25s;}
.btn-primary:hover{background:var(--v2);transform:translateY(-2px);box-shadow:0 10px 28px rgba(124,110,242,.4);}
.blink{width:7px;height:7px;border-radius:50%;background:#fff;animation:blink 1.4s ease infinite;}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.7)}}
.btn-outline{background:rgba(255,255,255,.7);color:var(--fg);padding:.9rem 2rem;border-radius:999px;font-size:.88rem;font-weight:500;text-decoration:none;border:1px solid var(--bd);transition:all .25s;backdrop-filter:blur(8px);}
.btn-outline:hover{color:var(--fg);border-color:var(--bd2);background:#fff;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(26,26,46,.1);border-radius:1rem;overflow:hidden;border:1px solid rgba(26,26,46,.1);}
.stat{background:rgba(255,255,255,.6);padding:1.25rem 1.5rem;}
.stat-n{font-family:'Instrument Serif',serif;font-size:1.7rem;color:var(--fg);}
.stat-l{font-size:.7rem;color:var(--fg3);margin-top:.2rem;line-height:1.4;}
.scroll-hint{display:flex;align-items:center;gap:.5rem;margin-top:2rem;font-size:.72rem;color:var(--fg2);}
.scroll-hint svg{width:13px;height:13px;animation:bob .9s ease-in-out infinite alternate;}
@keyframes bob{from{transform:translateY(0)}to{transform:translateY(4px)}}

/* SECTIONS */
.wrap{max-width:1100px;margin:0 auto;padding:6rem 2.5rem;}
.eyebrow{font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;color:var(--fg3);margin-bottom:1rem;}
h2{font-family:'Instrument Serif',serif;font-size:clamp(2rem,4.5vw,3.25rem);line-height:1.08;margin-bottom:1.5rem;}
.lead{font-size:1rem;color:var(--fg2);line-height:1.8;font-weight:300;}
.divider{height:1px;background:rgba(26,26,46,.08);max-width:1100px;margin:0 auto;}

/* ABOUT */
.about-grid{display:grid;grid-template-columns:4fr 6fr;gap:4rem;align-items:start;}
.chip-row{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:1.5rem;}
.chip{font-size:.73rem;padding:.3rem .85rem;border-radius:999px;background:rgba(255,255,255,.85);border:1px solid var(--bd);color:var(--fg2);}

/* SKILLS */
.alt-bg{background:linear-gradient(to bottom,var(--bg),var(--bg2) 50%,var(--bg));}
.skills-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-top:2.5rem;}
.card{background:rgba(255,255,255,.85);border:1px solid var(--bd);border-radius:1.25rem;padding:1.75rem;transition:all .35s;box-shadow:0 1px 3px rgba(26,26,46,.06);}
.card:hover{background:#fff;border-color:var(--bd2);box-shadow:0 4px 16px rgba(26,26,46,.1);}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;}
.card-head span:first-child{font-family:'Instrument Serif',serif;font-size:1.3rem;}
.card-head span:last-child{font-size:.68rem;color:var(--fg3);}
.bar-row{margin-bottom:.85rem;}
.bar-label{display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:.4rem;}
.bar-label span:first-child{color:var(--fg);}
.bar-label span:last-child{color:var(--fg3);}
.bar-track{height:3px;border-radius:999px;background:rgba(26,26,46,.06);}
.bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--v),var(--b));transform:scaleX(0);transform-origin:left;transition:transform 1.2s cubic-bezier(.16,1,.3,1);}
.bar-fill.animated{transform:scaleX(1);}

/* EXPERIENCE */
.timeline{margin-top:2.5rem;position:relative;}
.tl-rule{position:absolute;left:13px;top:8px;bottom:8px;width:1px;background:linear-gradient(to bottom,transparent,var(--bd) 12%,var(--bd) 88%,transparent);}
.tl-item{position:relative;padding-left:3.25rem;margin-bottom:1.25rem;}
.tl-node{position:absolute;left:0;top:1.6rem;width:26px;height:26px;border-radius:50%;background:var(--glass);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;}
.tl-gem{width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,var(--v),var(--b));}
.tl-date{font-size:.68rem;text-transform:uppercase;letter-spacing:.15em;color:var(--fg3);margin-bottom:.3rem;}
.tl-role{font-family:'Instrument Serif',serif;font-size:1.3rem;margin-bottom:.15rem;}
.tl-co{font-size:.8rem;color:var(--fg3);margin-bottom:.85rem;}
.tl-list{list-style:none;display:flex;flex-direction:column;gap:.4rem;}
.tl-list li{font-size:.84rem;color:var(--fg2);padding-left:1rem;position:relative;line-height:1.55;}
.tl-list li::before{content:'';position:absolute;left:0;top:.6rem;width:4px;height:4px;border-radius:50%;background:var(--v);}

/* WORK ICONS (Lucide) */
.wi{width:40px;height:40px;border-radius:.75rem;background:rgba(124,110,242,.12);border:1px solid rgba(124,110,242,.18);display:flex;align-items:center;justify-content:center;margin-bottom:1.25rem;}
.wi svg{width:20px;height:20px;stroke:var(--v);stroke-width:1.8;fill:none;}
.work-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:auto auto;gap:1.25rem;margin-top:2.5rem;}
.work-card{background:rgba(255,255,255,.85);border:1px solid var(--bd);border-radius:1.25rem;padding:1.5rem;transition:all .35s;position:relative;overflow:hidden;box-shadow:0 1px 3px rgba(26,26,46,.06);}
.work-card:hover{background:#fff;transform:translateY(-2px);box-shadow:0 6px 20px rgba(26,26,46,.1);}
.wn{font-size:.68rem;color:var(--fg3);margin-top:1rem;}

/* LANGUAGES */
.langs-split{display:grid;grid-template-columns:4fr 6fr;gap:4rem;align-items:center;}
.lang-rows{display:flex;flex-direction:column;gap:.75rem;}
.lang-row{background:rgba(255,255,255,.85);border:1px solid var(--bd);border-radius:.875rem;padding:1rem 1.25rem;display:flex;align-items:center;gap:1rem;box-shadow:0 1px 3px rgba(26,26,46,.05);}
.lang-body{flex:1;}
.lang-meta{display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:.4rem;}
.lang-meta strong{font-weight:500;}
.lang-meta span{color:var(--fg3);}
.lang-bar{height:3px;background:rgba(255,255,255,.07);border-radius:999px;overflow:hidden;}
.lang-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--v),var(--b));}

/* CONTACT */
.contact-card{background:linear-gradient(135deg,#ede9ff 0%,#dde8fb 50%,#f0ecff 100%);border:1px solid rgba(124,110,242,.18);border-radius:1.5rem;padding:3.5rem;position:relative;overflow:hidden;}
.contact-card::before{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(124,110,242,.09) 0%,transparent 65%);}
.contact-inner{position:relative;}
.contact-h{font-family:'Instrument Serif',serif;font-size:clamp(1.8rem,4vw,3rem);line-height:1.1;max-width:600px;margin-bottom:1.5rem;}
.contact-sub{font-size:.95rem;color:var(--fg2);max-width:460px;line-height:1.75;margin-bottom:2.25rem;font-weight:300;}
.info-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-top:2.5rem;}
.info-cell{background:rgba(255,255,255,.72);border:1px solid rgba(124,110,242,.15);border-radius:.875rem;padding:1rem 1.25rem;}
.ic-label{font-size:.62rem;text-transform:uppercase;letter-spacing:.18em;color:var(--fg3);margin-bottom:.3rem;}
.ic-val{font-size:.85rem;font-weight:500;color:var(--fg);}

/* FOOTER */
footer{max-width:1100px;margin:0 auto;padding:1.5rem 2.5rem;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--bd);font-size:.72rem;color:var(--fg3);}
.avail{display:flex;align-items:center;gap:.4rem;}
.em-dot{width:6px;height:6px;border-radius:50%;background:var(--em);animation:blink 2s infinite;}

/* LOADING */
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s;}
.loading-screen.hide{opacity:0;pointer-events:none;}
.loading-spinner{width:40px;height:40px;border:3px solid var(--bd);border-top-color:var(--v);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* REVEAL */
.reveal-el{opacity:0;transform:translateY(24px);transition:opacity .6s cubic-bezier(.16,1,.3,1),transform .6s cubic-bezier(.16,1,.3,1);}
.reveal-el.visible{opacity:1;transform:translateY(0);}

/* 404 */
.not-found{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;}
.not-found h1{font-family:'Instrument Serif',serif;font-size:2rem;margin-bottom:1rem;}
.not-found a{color:var(--v);text-decoration:none;font-weight:600;}

/* RESPONSIVE */
@media(max-width:760px){
  nav{padding:0 1.25rem;}
  .nav-links{display:none;}
  .about-grid,.langs-split{grid-template-columns:1fr;gap:2.5rem;}
  .skills-grid,.work-grid{grid-template-columns:1fr;}
  .stats-grid{grid-template-columns:1fr 1fr;}
  .info-row{grid-template-columns:1fr;}
  .wrap{padding:4.5rem 1.25rem;}
  h1{font-size:clamp(2.5rem,10vw,3.5rem);}
  .contact-card{padding:2rem;}
  .hero-layout{flex-direction:column;text-align:center;gap:2rem;}
  .hero-photo{width:180px;height:180px;margin:0 auto;}
  .hero-pill{margin:0 auto 2rem;}
  .btn-row{justify-content:center;}
  .scroll-hint{justify-content:center;}
}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen"><div class="loading-spinner"></div></div>
<div id="app"></div>

<script>
(function(){
  var slug = window.location.pathname.split('/portfolio/')[1];
  if (!slug) return show404();
  slug = slug.replace(/\/+$/, '');

  fetch('/api/portfolio/view/' + encodeURIComponent(slug))
    .then(function(r){ return r.json(); })
    .then(function(data){
      if (!data.portfolio) return show404();
      render(data.portfolio);
    })
    .catch(function(){ show404(); });

  function show404(){
    hideLoading();
    document.getElementById('app').innerHTML =
      '<div class="not-found"><div><h1>Portfoliota ei l\u00f6ydy</h1><p>T\u00e4m\u00e4 portfolio on ehk\u00e4 piilotettu tai sit\u00e4 ei ole viel\u00e4 julkaistu.</p><a href="/">Etusivulle \u2192</a></div></div>';
  }

  function hideLoading(){
    var ls=document.getElementById('loadingScreen');
    if(ls){ls.classList.add('hide');setTimeout(function(){ls.remove();},500);}
  }

  function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

  function render(p){
    document.title=(p.full_name||'Portfolio')+' \u2014 Portfolio';
    var name=esc(p.full_name||'');
    var tagline=esc(p.tagline||'');
    var bio=esc(p.bio||'');
    var city=esc(p.city||'');
    var role=esc(p.target_role||'');
    var photoUrl=p.has_photo?'/api/portfolio/photo/'+esc(p.slug):'';
    var langs=p.languages||[];

    var html='';

    /* NAV */
    html+='<nav>';
    html+='<a href="#top" class="nav-brand"><span class="dot"></span>'+name+'</a>';
    html+='<ul class="nav-links">';
    if(bio) html+='<li><a href="#about">Tietoa</a></li>';
    html+='<li><a href="#skills">Taidot</a></li>';
    html+='<li><a href="#experience">Kokemus</a></li>';
    html+='<li><a href="#contact">Yhteystiedot</a></li>';
    html+='</ul>';
    html+='<a href="#contact" class="btn-pill">Ota yhteytt\u00e4</a>';
    html+='</nav>';

    /* HERO with photo */
    html+='<section id="top" style="background:linear-gradient(135deg,#ede9ff 0%,#dde8fb 38%,#f0ecff 65%,#f5f9ff 100%);min-height:100vh;display:flex;align-items:center;padding:8rem 2.5rem 5rem;position:relative;overflow:hidden;">';
    html+='<div class="orb orb1"></div><div class="orb orb2"></div><div class="grid-bg"></div>';
    html+='<div style="max-width:1100px;margin:0 auto;width:100%;position:relative;z-index:1;">';
    html+='<div class="hero-layout">';
    html+='<div class="hero-content">';
    if(city||role) html+='<div class="hero-pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;color:var(--v);"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/></svg>'+(role?role:'')+(role&&city?' \u00b7 ':'')+city+'</div>';
    html+='<h1><span class="block">'+name+'.</span>';
    if(tagline) html+='<span class="block grad">'+tagline+'</span>';
    html+='</h1>';
    if(bio){
      var shortBio=bio.split('.').slice(0,2).join('.')+'.';
      html+='<p class="hero-sub">'+shortBio+'</p>';
    }
    html+='<div class="btn-row">';
    if(p.email_public) html+='<a href="mailto:'+esc(p.email_public)+'" class="btn-primary">Ota yhteytt\u00e4<span class="blink"></span></a>';
    if(p.linkedin_url) html+='<a href="'+esc(p.linkedin_url)+'" target="_blank" class="btn-outline">LinkedIn</a>';
    html+='</div>';
    html+='</div>';

    /* Photo */
    html+='<div class="hero-photo">';
    if(photoUrl){
      html+='<img src="'+photoUrl+'" alt="'+name+'">';
    } else {
      html+='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';
    }
    html+='</div>';
    html+='</div>';

    html+='<div class="scroll-hint"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px;"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>Selaa alas</div>';
    html+='</div></section>';

    html+='<div class="divider"></div>';

    /* ABOUT */
    if(bio){
      html+='<div class="wrap reveal-el" id="about"><div class="about-grid"><div>';
      html+='<div class="eyebrow">Tietoa</div>';
      html+='<h2>'+name+'</h2>';
      html+='</div><div>';
      html+='<p class="lead">'+bio.replace(/\n/g,'<br>')+'</p>';
      var chips=[];
      if(city) chips.push(city);
      if(langs.length){
        var langNames=langs.map(function(l){return typeof l==='string'?l:(l.name||'');}).filter(Boolean);
        if(langNames.length) chips.push(langNames.join(' \u00b7 '));
      }
      if(chips.length){
        html+='<div class="chip-row">';
        chips.forEach(function(c){html+='<span class="chip">'+esc(c)+'</span>';});
        html+='</div>';
      }
      html+='</div></div></div>';
      html+='<div class="divider"></div>';
    }

    /* SKILLS */
    var skills=p.skills||[];
    if(skills.length){
      html+='<div class="wrap alt-bg reveal-el" id="skills">';
      html+='<div class="eyebrow">Taidot</div>';
      html+='<h2>Osaaminen ja <span class="grad">vahvuudet.</span></h2>';
      html+='<div class="skills-grid">';
      var chunk=Math.ceil(skills.length/2);
      for(var c=0;c<2;c++){
        html+='<div class="card"><div class="card-head"><span>Taidot</span><span>0'+(c+1)+'</span></div>';
        var slice=skills.slice(c*chunk,(c+1)*chunk);
        slice.forEach(function(s){
          var name2=typeof s==='string'?s:(s.name||s);
          html+='<div class="bar-row"><div class="bar-label"><span>'+esc(name2)+'</span></div><div class="bar-track"><div class="bar-fill" style="width:85%"></div></div></div>';
        });
        html+='</div>';
      }
      html+='</div></div>';
      html+='<div class="divider"></div>';
    }

    /* EXPERIENCE */
    var exp=p.experience||[];
    if(exp.length){
      html+='<div class="wrap reveal-el" id="experience">';
      html+='<div class="eyebrow">Kokemus</div>';
      html+='<h2>Ty\u00f6kokemus ja <span class="grad">urapolku.</span></h2>';
      html+='<div class="timeline"><div class="tl-rule"></div>';
      exp.forEach(function(e){
        html+='<div class="tl-item card" style="padding:1.75rem 1.75rem 1.75rem 3.5rem;">';
        html+='<div class="tl-node"><div class="tl-gem"></div></div>';
        if(e.period) html+='<div class="tl-date">'+esc(e.period)+'</div>';
        html+='<div class="tl-role">'+esc(e.role||e.title||'')+'</div>';
        if(e.company) html+='<div class="tl-co">'+esc(e.company)+'</div>';
        if(e.bullets&&e.bullets.length){
          html+='<ul class="tl-list">';
          e.bullets.forEach(function(b){html+='<li>'+esc(b)+'</li>';});
          html+='</ul>';
        }
        html+='</div>';
      });
      html+='</div></div>';
      html+='<div class="divider"></div>';
    }

    /* EDUCATION */
    var edu=p.education||[];
    if(edu.length){
      html+='<div class="wrap alt-bg reveal-el">';
      html+='<div class="eyebrow">Koulutus</div>';
      html+='<h2>Opinnot ja <span class="grad">tutkinnot.</span></h2>';
      edu.forEach(function(e){
        html+='<div class="card" style="margin-bottom:1rem;display:flex;gap:1.25rem;align-items:center;">';
        html+='<div class="wi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.962 5.267a2 2 0 0 0-1.924 0L2.6 9.084a1 1 0 0 0 0 1.832l8.438 3.817a2 2 0 0 0 1.924 0z"/><path d="M22 10v6"/><path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"/></svg></div>';
        html+='<div><div style="font-family:\'Instrument Serif\',serif;font-size:1.15rem;">'+esc(e.degree||e.name||'')+'</div>';
        html+='<div style="font-size:.82rem;color:var(--fg3);">'+esc(e.school||'')+(e.year?' \u00b7 '+esc(e.year):'')+'</div></div></div>';
      });
      html+='</div>';
      html+='<div class="divider"></div>';
    }

    /* LANGUAGES */
    if(langs.length){
      html+='<div class="wrap reveal-el">';
      html+='<div class="langs-split"><div>';
      html+='<div class="eyebrow">Kielet</div>';
      html+='<h2>Kielitaito.</h2>';
      html+='</div><div class="lang-rows">';
      langs.forEach(function(l){
        var lname=typeof l==='string'?l:(l.name||'');
        var level=typeof l==='string'?'':(l.level||'');
        var pct=level.toLowerCase().indexOf('natiivi')>=0||level.toLowerCase().indexOf('erinomainen')>=0?100:level.toLowerCase().indexOf('hyv')>=0?80:level.toLowerCase().indexOf('perus')>=0?50:70;
        html+='<div class="lang-row"><div class="lang-body">';
        html+='<div class="lang-meta"><strong>'+esc(lname)+'</strong><span>'+esc(level)+'</span></div>';
        html+='<div class="lang-bar"><div class="lang-bar-fill" style="width:'+pct+'%"></div></div>';
        html+='</div></div>';
      });
      html+='</div></div></div>';
      html+='<div class="divider"></div>';
    }

    /* CONTACT */
    html+='<div class="wrap reveal-el" id="contact"><div class="contact-card"><div class="contact-inner">';
    html+='<div style="font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;color:var(--fg3);margin-bottom:1.5rem;">Ota yhteytt\u00e4</div>';
    html+='<h2 class="contact-h">Kiinnostuitko? <span class="grad">Otetaan yhteytt\u00e4.</span></h2>';
    html+='<p class="contact-sub">Olen avoin uusille mahdollisuuksille'+(role?' alalla '+role:'')+'.</p>';
    html+='<div class="btn-row">';
    if(p.email_public) html+='<a href="mailto:'+esc(p.email_public)+'" class="btn-primary"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m22 7-8.991 5.727a2 2 0 0 1-2.009 0L2 7"/><rect x="2" y="4" width="20" height="16" rx="2"/></svg>L\u00e4het\u00e4 viesti</a>';
    if(p.phone_public) html+='<a href="tel:'+esc(p.phone_public)+'" class="btn-outline"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>Soita</a>';
    if(p.linkedin_url) html+='<a href="'+esc(p.linkedin_url)+'" target="_blank" class="btn-outline">LinkedIn \u2197</a>';
    html+='</div>';
    html+='<div class="info-row">';
    if(p.email_public) html+='<div class="info-cell"><div class="ic-label">Email</div><div class="ic-val" style="font-size:.78rem;word-break:break-all;">'+esc(p.email_public)+'</div></div>';
    if(city) html+='<div class="info-cell"><div class="ic-label">Sijainti</div><div class="ic-val">'+city+'</div></div>';
    if(role) html+='<div class="info-cell"><div class="ic-label">Ala</div><div class="ic-val">'+role+'</div></div>';
    html+='</div>';
    html+='</div></div></div>';

    /* FOOTER */
    html+='<footer><span>\u00a9 '+new Date().getFullYear()+' '+name+'. Rakennettu AI Polku -alustalla.</span>';
    html+='<div class="avail"><span class="em-dot"></span>Avoin uusille mahdollisuuksille</div></footer>';

    document.getElementById('app').innerHTML=html;
    hideLoading();

    /* Staggered scroll reveal */
    var els=document.querySelectorAll('.reveal-el,.card,.tl-item,.lang-row,.stat');
    els.forEach(function(el){if(!el.classList.contains('reveal-el'))el.classList.add('reveal-el');});

    /* stagger siblings in grids */
    document.querySelectorAll('.skills-grid,.info-row,.lang-rows').forEach(function(parent){
      var ch=parent.children;
      for(var i=0;i<ch.length;i++) ch[i].style.transitionDelay=(i*80)+'ms';
    });

    if('IntersectionObserver' in window){
      var obs=new IntersectionObserver(function(entries){
        entries.forEach(function(e){
          if(e.isIntersecting){
            e.target.classList.add('visible');
            e.target.querySelectorAll('.bar-fill').forEach(function(bar,i){
              setTimeout(function(){bar.classList.add('animated');},(i+1)*150);
            });
            obs.unobserve(e.target);
          }
        });
      },{threshold:0.08,rootMargin:'0px 0px -40px 0px'});
      els.forEach(function(el){obs.observe(el);});
    } else {
      els.forEach(function(el){el.classList.add('visible');});
      document.querySelectorAll('.bar-fill').forEach(function(b){b.classList.add('animated');});
    }
  }
})();
</script>
</body>
</html>
