<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<meta name="description" content="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--v:#7c6ef2;--v2:#5b4de0;--b:#3b82f6;--em:#10b981;--bg:#faf9f6;--bg2:#f2f0ec;--fg:#1a1a2e;--fg2:#6b6880;--fg3:#aaa8b8;--glass:rgba(255,255,255,.7);--glass2:rgba(255,255,255,.9);--bd:rgba(26,26,46,.1);--bd2:rgba(26,26,46,.2);--hero-bg:linear-gradient(135deg,#ede9ff 0%,#dde8fb 38%,#f0ecff 65%,#f5f9ff 100%);--orb1:rgba(124,110,242,.28);--orb2:rgba(59,130,246,.22);--card-bg:rgba(255,255,255,.85);--contact-bg:linear-gradient(135deg,#ede9ff 0%,#dde8fb 50%,#f0ecff 100%);--photo-grad:linear-gradient(145deg,#ece8ff 0%,#d2c9f5 45%,#bbb1ef 100%);--nav-bg:rgba(250,249,246,.92);--chat-panel-bg:rgba(18,18,24,.96);--grad:linear-gradient(135deg,#6d5ce6 0%,#7c6ef2 45%,#4f8ef0 100%);--v-soft:rgba(124,110,242,.12);--v-soft2:rgba(124,110,242,.1);--v-border:rgba(124,110,242,.18);--v-border2:rgba(124,110,242,.15);--shadow-v:rgba(124,110,242,.4);--shadow-v2:rgba(124,110,242,.22);--shadow-v3:rgba(124,110,242,.45);--shadow-v4:rgba(124,110,242,.55);--work-glow:rgba(124,110,242,.22);--contact-glow:rgba(124,110,242,.09);}
/* EXECUTIVE DARK THEME */
.theme-executive{--v:#10b981;--v2:#059669;--b:#065f46;--em:#10b981;--bg:#0b1512;--bg2:#111f1a;--fg:#e8f5f0;--fg2:#94b8a8;--fg3:#5e8575;--glass:rgba(16,185,129,.08);--glass2:rgba(16,185,129,.12);--bd:rgba(16,185,129,.15);--bd2:rgba(16,185,129,.25);--hero-bg:linear-gradient(135deg,#0b1512 0%,#0f1f18 38%,#0d1a14 65%,#0b1512 100%);--orb1:rgba(16,185,129,.18);--orb2:rgba(6,95,70,.15);--card-bg:rgba(16,185,129,.06);--contact-bg:linear-gradient(135deg,#0f1a14 0%,#132a20 50%,#0f1a14 100%);--photo-grad:linear-gradient(145deg,#0f1f18 0%,#132a20 45%,#0d1a14 100%);--nav-bg:rgba(11,21,18,.94);--chat-panel-bg:rgba(8,16,12,.97);--grad:linear-gradient(135deg,#10b981 0%,#34d399 45%,#065f46 100%);--v-soft:rgba(16,185,129,.1);--v-soft2:rgba(16,185,129,.1);--v-border:rgba(16,185,129,.2);--v-border2:rgba(16,185,129,.15);--shadow-v:rgba(16,185,129,.4);--shadow-v2:rgba(16,185,129,.15);--shadow-v3:rgba(16,185,129,.35);--shadow-v4:rgba(16,185,129,.4);--work-glow:rgba(16,185,129,.15);--contact-glow:rgba(16,185,129,.06);}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--fg);font-family:'DM Sans',sans-serif;font-weight:400;line-height:1.65;overflow-x:hidden;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;background:var(--nav-bg);backdrop-filter:blur(18px);border-bottom:1px solid var(--bd);}
.nav-brand{display:flex;align-items:center;gap:.6rem;text-decoration:none;color:var(--fg);font-size:.9rem;font-weight:500;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--v);box-shadow:0 0 10px currentColor;}
.nav-links{display:flex;gap:2rem;list-style:none;}
.nav-links a{font-size:.8rem;color:var(--fg2);text-decoration:none;transition:color .2s;}
.nav-links a:hover{color:var(--fg);}
.btn-pill{background:var(--v);color:#fff;padding:.5rem 1.35rem;border-radius:999px;font-size:.8rem;font-weight:500;text-decoration:none;transition:all .2s;}
.btn-pill:hover{background:var(--v2);transform:translateY(-1px);}
#hero{min-height:100vh;display:flex;align-items:center;padding:8rem 2.5rem 5rem;position:relative;overflow:hidden;background:var(--hero-bg);}
.hero-inner{max-width:1100px;margin:0 auto;width:100%;position:relative;z-index:1;display:grid;grid-template-columns:1fr 360px;gap:5rem;align-items:center;}
.orb{position:absolute;border-radius:50%;pointer-events:none;filter:blur(80px);}
.orb1{width:700px;height:700px;top:-200px;left:-200px;background:radial-gradient(circle,var(--orb1) 0%,transparent 65%);}
.orb2{width:800px;height:800px;bottom:-300px;right:-200px;background:radial-gradient(circle,var(--orb2) 0%,transparent 65%);}
.grid-bg{position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(rgba(26,26,46,.045) 1px,transparent 1px);background-size:28px 28px;mask-image:radial-gradient(ellipse at center,black 30%,transparent 75%);}
.theme-executive .grid-bg{background-image:radial-gradient(rgba(16,185,129,.06) 1px,transparent 1px);}
.hero-pill{display:inline-flex;align-items:center;gap:.5rem;background:var(--glass);border:1px solid var(--bd);border-radius:999px;padding:.35rem 1rem;font-size:.73rem;color:var(--fg2);margin-bottom:2rem;backdrop-filter:blur(8px);}
.hero-pill svg{width:13px;height:13px;color:var(--v);flex-shrink:0;}
h1{font-family:'Instrument Serif',serif;font-size:clamp(3rem,7vw,6rem);line-height:.95;letter-spacing:-.02em;margin-bottom:1.75rem;}
h1 .block{display:block;}
.grad{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-style:italic;}
.hero-sub{font-size:1.05rem;color:var(--fg2);max-width:500px;line-height:1.8;margin-bottom:1.25rem;font-weight:300;}
.hero-sub strong{color:var(--fg);font-weight:500;}
.hero-highlights{display:flex;flex-wrap:wrap;gap:.45rem;margin:0 0 2.25rem;max-width:540px;}
.hero-highlight-chip{font-size:.72rem;line-height:1.45;padding:.38rem .72rem;border-radius:999px;background:var(--v-soft);border:1px solid var(--v-border);color:var(--fg2);}
.hero-left .hero-highlights{opacity:0;transform:translateY(16px);transition:opacity .6s .42s ease,transform .6s .42s ease;}
.hero-left.loaded .hero-highlights{opacity:1;transform:translateY(0);}
.btn-row{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:4rem;}
.btn-primary{background:var(--v);color:#fff;padding:.9rem 2rem;border-radius:999px;font-size:.88rem;font-weight:500;text-decoration:none;display:inline-flex;align-items:center;gap:.6rem;transition:all .25s;}
.btn-primary:hover{background:var(--v2);transform:translateY(-2px);box-shadow:0 10px 28px var(--shadow-v);}
.blink{width:7px;height:7px;border-radius:50%;background:#fff;animation:blink 1.4s ease infinite;}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.7)}}
.btn-outline{background:var(--glass);color:var(--fg);padding:.9rem 2rem;border-radius:999px;font-size:.88rem;font-weight:500;text-decoration:none;border:1px solid var(--bd);transition:all .25s;backdrop-filter:blur(8px);display:inline-flex;align-items:center;gap:.6rem;}
.btn-outline:hover{border-color:var(--bd2);background:var(--glass2);}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bd);border-radius:1rem;overflow:hidden;border:1px solid var(--bd);}
.stat{background:var(--glass);padding:1.25rem 1.5rem;}
.stat-n{font-family:'Instrument Serif',serif;font-size:1.7rem;color:var(--fg);}
.stat-l{font-size:.7rem;color:var(--fg3);margin-top:.2rem;line-height:1.4;}
.scroll-hint{display:flex;align-items:center;gap:.5rem;margin-top:2rem;font-size:.72rem;color:var(--fg2);}
.scroll-hint svg{width:14px;height:14px;animation:bob .9s ease-in-out infinite alternate;}
@keyframes bob{from{transform:translateY(0)}to{transform:translateY(5px)}}
.photo-col{display:flex;justify-content:center;align-items:stretch;padding-top:0;}
.photo-frame{width:100%;height:520px;border-radius:2rem;background:var(--photo-grad);border:1px solid var(--bd);box-shadow:0 28px 64px var(--shadow-v2),0 2px 8px rgba(26,26,46,.1);position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.9rem;}
.theme-executive .photo-frame{box-shadow:0 28px 64px var(--shadow-v2),0 2px 8px rgba(0,0,0,.3);}
.photo-frame::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 55% at 50% 20%,rgba(255,255,255,.42) 0%,transparent 65%);pointer-events:none;}
.theme-executive .photo-frame::before{background:radial-gradient(ellipse 80% 55% at 50% 20%,rgba(16,185,129,.12) 0%,transparent 65%);}
.photo-frame.has-img{background:none;border:none;box-shadow:none;}
.photo-frame.has-img::before{display:none;}
.photo-frame.has-img img{width:100%;height:100%;object-fit:cover;object-position:center top;border-radius:2rem;box-shadow:0 28px 64px var(--shadow-v2),0 2px 8px rgba(26,26,46,.1);}
.theme-executive .photo-frame.has-img img{box-shadow:0 28px 64px var(--shadow-v2),0 2px 8px rgba(0,0,0,.3);}
.photo-avatar{width:92px;height:92px;border-radius:50%;background:linear-gradient(135deg,var(--v),var(--b));display:flex;align-items:center;justify-content:center;box-shadow:0 8px 28px var(--shadow-v3);position:relative;z-index:1;}
.theme-executive .photo-avatar{box-shadow:0 8px 28px var(--shadow-v3);}
.photo-avatar::after{content:'';position:absolute;inset:-5px;border-radius:50%;border:2px solid var(--bd);}
.photo-initials{font-family:'Instrument Serif',serif;font-size:2.1rem;color:#fff;line-height:1;}
.photo-name{font-size:.7rem;color:var(--fg3);letter-spacing:.18em;text-transform:uppercase;font-weight:500;position:relative;z-index:1;}
.photo-badge{position:absolute;bottom:1.25rem;left:50%;transform:translateX(-50%);background:var(--glass2);border:1px solid var(--bd);border-radius:999px;padding:.38rem 1rem;display:flex;align-items:center;gap:.45rem;font-size:.7rem;font-weight:500;color:var(--fg);backdrop-filter:blur(8px);white-space:nowrap;box-shadow:0 4px 14px rgba(26,26,46,.12);}
.badge-dot{width:6px;height:6px;border-radius:50%;background:var(--em);animation:blink 2s infinite;flex-shrink:0;}
.wrap{max-width:1100px;margin:0 auto;padding:6rem 2.5rem;}
.eyebrow{font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;color:var(--fg3);margin-bottom:1rem;}
h2{font-family:'Instrument Serif',serif;font-size:clamp(2rem,4.5vw,3.25rem);line-height:1.08;margin-bottom:1.5rem;}
.lead{font-size:1rem;color:var(--fg2);line-height:1.8;font-weight:300;}
.divider{height:1px;background:var(--bd);max-width:1100px;margin:0 auto;}
.alt-bg{background:linear-gradient(to bottom,var(--bg),var(--bg2) 50%,var(--bg));}
.about-grid{display:grid;grid-template-columns:4fr 6fr;gap:4rem;align-items:start;}
.chip-row{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:1.5rem;}
.chip{font-size:.73rem;padding:.3rem .85rem;border-radius:999px;background:var(--card-bg);border:1px solid var(--bd);color:var(--fg2);}
.skills-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-top:2.5rem;}
.card{background:var(--card-bg);border:1px solid var(--bd);border-radius:1.25rem;padding:1.75rem;transition:all .35s;box-shadow:0 1px 3px rgba(26,26,46,.06);}
.card:hover{border-color:var(--bd2);box-shadow:0 4px 16px rgba(26,26,46,.1);}
.theme-executive .card:hover{box-shadow:0 4px 16px rgba(16,185,129,.1);}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;}
.card-head span:first-child{font-family:'Instrument Serif',serif;font-size:1.3rem;}
.card-head span:last-child{font-size:.68rem;color:var(--fg3);}
.bar-row{margin-bottom:.85rem;}
.bar-label{display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:.4rem;}
.bar-label span:first-child{color:var(--fg);}
.bar-label span:last-child{color:var(--fg3);}
.bar-track{height:3px;border-radius:999px;background:rgba(26,26,46,.07);}
.theme-executive .bar-track{background:rgba(16,185,129,.1);}
.bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--v),var(--b));width:0;transition:width 1.1s cubic-bezier(.22,1,.36,1);}
.timeline{margin-top:2.5rem;position:relative;}
.tl-rule{position:absolute;left:13px;top:8px;bottom:8px;width:1px;background:linear-gradient(to bottom,transparent,var(--bd) 12%,var(--bd) 88%,transparent);}
.tl-item{position:relative;padding-left:3.25rem;margin-bottom:1.25rem;}
.tl-node{position:absolute;left:0;top:1.6rem;width:26px;height:26px;border-radius:50%;background:var(--glass);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;}
.tl-gem{width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,var(--v),var(--b));}
.tl-date{font-size:.68rem;text-transform:uppercase;letter-spacing:.15em;color:var(--fg3);margin-bottom:.3rem;}
.tl-role{font-family:'Instrument Serif',serif;font-size:1.3rem;margin-bottom:.15rem;}
.tl-co{font-size:.8rem;color:var(--fg3);margin-bottom:.85rem;}
.tl-list{list-style:none;display:flex;flex-direction:column;gap:.4rem;}
.tl-list li{font-size:.84rem;color:var(--fg2);padding-left:1rem;position:relative;line-height:1.55;}
.tl-list li::before{content:'';position:absolute;left:0;top:.6rem;width:4px;height:4px;border-radius:50%;background:var(--v);}
.work-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:auto auto;gap:1.25rem;margin-top:2.5rem;}
.work-card{background:var(--card-bg);border:1px solid var(--bd);border-radius:1.25rem;padding:1.5rem;transition:all .35s;position:relative;overflow:hidden;box-shadow:0 1px 3px rgba(26,26,46,.06);}
.work-card.tall{grid-row:1/3;}
.work-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(26,26,46,.1);}
.work-card::before{content:'';position:absolute;top:-60px;right:-60px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,var(--work-glow) 0%,transparent 65%);opacity:0;transition:opacity .4s;}
.work-card:hover::before{opacity:1;}
.wi{width:40px;height:40px;border-radius:.75rem;background:var(--v-soft);border:1px solid var(--v-border);display:flex;align-items:center;justify-content:center;margin-bottom:1.25rem;}
.wi svg{width:20px;height:20px;color:var(--v);}
.wn{font-size:.68rem;color:var(--fg3);margin-top:1rem;}
.edu-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-top:2.5rem;}
.edu-card{background:var(--card-bg);border:1px solid var(--bd);border-radius:1.25rem;padding:1.5rem;transition:all .35s;}
.edu-card:hover{border-color:var(--bd2);}
.edu-icon{width:40px;height:40px;border-radius:.75rem;background:var(--v-soft2);border:1px solid var(--v-border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.edu-icon svg{width:20px;height:20px;color:var(--v);}
.cert-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:2.5rem;}
.cert-card{background:var(--card-bg);border:1px solid var(--bd);border-radius:1rem;padding:1.25rem;text-align:center;transition:all .3s;}
.cert-card:hover{border-color:var(--bd2);}
.cert-icon{width:44px;height:44px;border-radius:50%;background:var(--v-soft2);border:1px solid var(--v-border2);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;}
.cert-icon svg{width:20px;height:20px;color:var(--v);}
.langs-split{display:grid;grid-template-columns:4fr 6fr;gap:4rem;align-items:center;}
.lang-rows{display:flex;flex-direction:column;gap:.75rem;}
.lang-row{background:var(--card-bg);border:1px solid var(--bd);border-radius:.875rem;padding:1rem 1.25rem;display:flex;align-items:center;gap:1rem;}
.lang-body{flex:1;}
.lang-meta{display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:.4rem;}
.lang-meta strong{font-weight:500;}
.lang-meta span{color:var(--fg3);}
.lang-bar{height:3px;background:rgba(26,26,46,.07);border-radius:999px;overflow:hidden;}
.theme-executive .lang-bar{background:rgba(16,185,129,.1);}
.lang-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--v),var(--b));width:0;transition:width 1.1s cubic-bezier(.22,1,.36,1);}
.contact-card{background:var(--contact-bg);border:1px solid var(--bd);border-radius:1.5rem;padding:3.5rem;position:relative;overflow:hidden;}
.contact-card::before{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 80% 60% at 50% 50%,var(--contact-glow) 0%,transparent 65%);}
.contact-inner{position:relative;}
.contact-h{font-family:'Instrument Serif',serif;font-size:clamp(1.8rem,4vw,3rem);line-height:1.1;max-width:600px;margin-bottom:1.5rem;}
.contact-sub{font-size:.95rem;color:var(--fg2);max-width:460px;line-height:1.75;margin-bottom:2.25rem;font-weight:300;}
.contact-form-box{margin-top:1.5rem;padding:1.5rem;background:var(--glass);border:1px solid var(--bd);border-radius:1rem;max-width:520px;}
.contact-form-box label{font-size:.68rem;color:var(--fg3);margin-bottom:.25rem;display:block;text-transform:uppercase;letter-spacing:.12em;}
.contact-form-field{width:100%;background:rgba(255,255,255,.55);border:1px solid var(--bd);border-radius:8px;padding:.65rem .85rem;font-size:.88rem;color:var(--fg);font-family:'DM Sans',sans-serif;box-sizing:border-box;margin-bottom:.75rem;}
.theme-executive .contact-form-field{background:rgba(255,255,255,.06);color:#e8e6f0;}
.contact-form-field:focus{outline:none;border-color:var(--v);}
textarea.contact-form-field{min-height:88px;resize:vertical;}
.contact-form-submit{padding:.75rem 1.5rem;border-radius:8px;background:var(--v);color:#fff;border:none;font-size:.88rem;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;}
.contact-form-submit:disabled{opacity:.45;cursor:default;}
.contact-form-ok{font-size:.82rem;margin-top:.65rem;display:none;}
.info-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.75rem;margin-top:2.5rem;}
.info-cell{background:var(--glass);border:1px solid var(--bd);border-radius:.875rem;padding:1rem 1.25rem;}
.ic-label{font-size:.62rem;text-transform:uppercase;letter-spacing:.18em;color:var(--fg3);margin-bottom:.3rem;display:flex;align-items:center;gap:.35rem;}
.ic-label svg{width:11px;height:11px;color:var(--v);}
.ic-val{font-size:.85rem;font-weight:500;color:var(--fg);}
footer{max-width:1100px;margin:0 auto;padding:1.5rem 2.5rem;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--bd);font-size:.72rem;color:var(--fg3);}
.avail{display:flex;align-items:center;gap:.4rem;}
.em-dot{width:6px;height:6px;border-radius:50%;background:var(--em);animation:blink 2s infinite;}
#chatBtn{position:fixed;bottom:1.5rem;right:1.5rem;z-index:300;background:var(--v);color:#fff;border:none;border-radius:999px;padding:.85rem 1.5rem;font-size:.85rem;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:.5rem;box-shadow:0 4px 32px var(--shadow-v4);transition:all .25s;font-family:'DM Sans',sans-serif;}
#chatBtn:hover{background:var(--v2);transform:translateY(-2px);}
#chatBtn svg{width:15px;height:15px;}
#chatPanel{position:fixed;bottom:5.5rem;right:1.25rem;z-index:299;width:min(400px,calc(100vw - 2rem));background:var(--chat-panel-bg);backdrop-filter:blur(24px);border:1px solid var(--bd);border-radius:1.25rem;overflow:hidden;display:none;flex-direction:column;height:min(580px,72vh);box-shadow:0 24px 64px rgba(0,0,0,.6);}
#chatPanel.open{display:flex;}
.cp-head{padding:1rem 1.25rem;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:.75rem;}
.cp-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--v),var(--b));display:flex;align-items:center;justify-content:center;font-family:'Instrument Serif',serif;font-size:1rem;color:#fff;position:relative;flex-shrink:0;}
.cp-online{position:absolute;bottom:-1px;right:-1px;width:10px;height:10px;border-radius:50%;background:var(--em);border:2px solid var(--chat-panel-bg);}
.cp-name{font-size:.85rem;font-weight:500;color:#e8e6f0;}
.cp-sub{font-size:.7rem;color:var(--fg3);}
.cp-close{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--fg3);padding:.25rem;transition:color .2s;display:flex;align-items:center;}
.cp-close:hover{color:#fff;}
.cp-close svg{width:14px;height:14px;}
.cp-msgs{flex:1;overflow-y:auto;padding:1rem 1.25rem;display:flex;flex-direction:column;gap:.75rem;}
.cp-msgs::-webkit-scrollbar{width:0;}
.msg{max-width:86%;padding:.7rem 1rem;border-radius:.875rem;font-size:.84rem;line-height:1.55;}
.msg.ai{background:rgba(255,255,255,.07);border:1px solid var(--bd);align-self:flex-start;border-bottom-left-radius:.2rem;color:#e8e6f0;}

function hexRgb(hex){
  hex=String(hex||'').replace('#','').trim();
  if(hex.length===3) hex=hex.split('').map(function(c){return c+c;}).join('');
  if(hex.length!==6) return null;
  return [parseInt(hex.slice(0,2),16),parseInt(hex.slice(2,4),16),parseInt(hex.slice(4,6),16)];
}
function rgbaHex(hex,a){
  var c=hexRgb(hex); if(!c) return 'rgba(124,110,242,'+a+')';
  return 'rgba('+c[0]+','+c[1]+','+c[2]+','+a+')';
}
function shadeHex(hex,f){
  var c=hexRgb(hex); if(!c) return hex||'#7c6ef2';
  return 'rgb('+c.map(function(x){return Math.max(0,Math.min(255,Math.round(f<0?x*(1+f):x+(255-x)*f)));}).join(',')+')';
}
function applyBrandTheme(p){

    +'}';

function buildLocalFaqAnswer(p,fn,nm){

    if(/rooli|teht\xe4v|ammatti/.test(q)) return p.target_role||'Avoin uusille mahdollisuuksille.';

  };

function normText(s){return String(s||'').replace(/\s+/g,' ').trim().toLowerCase();}
function textsOverlap(a,b){
  var x=normText(a),y=normText(b);
  if(!x||!y) return false;
  if(x===y) return true;
  var shorter=x.length<y.length?x:y,longer=x.length<y.length?y:x;
  if(shorter.length>=60&&longer.indexOf(shorter)>=0) return true;
  var prefix=shorter.slice(0,100);
  return prefix.length>=50&&longer.indexOf(prefix)>=0;
}
function dedupeParagraphs(text){
  var paras=String(text||'').split(/\n\n+/).map(function(p){return p.trim();}).filter(Boolean);
  var out=[],seen={};
  paras.forEach(function(p){
    var k=normText(p).slice(0,120);
    if(!k||seen[k]) return;
    seen[k]=true;
    out.push(p);
  });
  return out.join('\n\n');
}
function filterBioForAbout(bio,heroText){
  var paras=String(bio||'').split(/\n\n+/).map(function(p){return p.trim();}).filter(Boolean);
  var hero=String(heroText||'').trim();
  if(!paras.length) return '';
  if(!hero) return dedupeParagraphs(bio||'');
  var kept=paras.filter(function(p){return !textsOverlap(p,hero);});
  return kept.length?kept.join('\n\n'):paras.join('\n\n');
}
function shortHighlight(text,maxWords){
  var words=String(text||'').trim().split(/\s+/).filter(Boolean);
  if(!words.length) return '';
  maxWords=maxWords||12;
  if(words.length<=maxWords) return words.join(' ');
  return words.slice(0,maxWords).join(' ')+'\u2026';
}

var chatOpen=false;
function toggleChat(){chatOpen=!chatOpen;document.getElementById('chatPanel').classList.toggle('open',chatOpen);}
function scrollToContactForm(e){
  if(e) e.preventDefault();
  if(chatOpen){ chatOpen=false; document.getElementById('chatPanel').classList.remove('open'); }
  var sec=document.getElementById('contact');
  if(sec) sec.scrollIntoView({behavior:'smooth',block:'start'});
  setTimeout(function(){
    var box=document.getElementById('contactFormBox');
    if(box) box.style.boxShadow='0 0 0 2px var(--v)';
    var n=document.getElementById('contactName');
    if(n) n.focus();
    setTimeout(function(){ if(box) box.style.boxShadow=''; }, 2200);
  }, 420);
}
function showCpTab(which){
  var faq=document.getElementById('cpPaneFaq');
  var tF=document.getElementById('tabFaq');
  var tC=document.getElementById('tabContact');
  if(which==='contact'){
    scrollToContactForm();
    return;
  }
  faq.classList.remove('hidden');
  tF.classList.add('active'); tC.classList.remove('active');
}
function addMsg(t,r){var m=document.getElementById('cpMsgs');var d=document.createElement('div');d.className='msg '+r;d.textContent=t;m.appendChild(d);m.scrollTop=m.scrollHeight;return d;}
function quickAsk(b){document.getElementById('chatInput').value=b.textContent;document.getElementById('chatSend').disabled=false;sendChat();}
function sendChat(){
  var inp=document.getElementById('chatInput'); var t=inp.value.trim(); if(!t) return;
  inp.value=''; document.getElementById('chatSend').disabled=true;
  var s=document.getElementById('sugs'); if(s) s.style.display='none';
  addMsg(t,'user');
  var rp=window._faqAnswer?window._faqAnswer(t):'T\xe4yt\xe4 yhteydenottolomake sivun alaosassa (Ota yhteytt\xe4).';
  setTimeout(function(){ addMsg(rp,'ai'); document.getElementById('chatSend').disabled=false; }, 280);
}
async function sendContact(){
  var btn=document.getElementById('contactSubmit');
  var ok=document.getElementById('contactOk');
  var name=document.getElementById('contactName').value.trim();
  var email=document.getElementById('contactEmail').value.trim();
  var message=document.getElementById('contactMsg').value.trim();
  if(!name||!email||!message){ ok.style.display='block'; ok.style.color='#f87171'; ok.textContent='T\xe4yt\xe4 kaikki kent\xe4t.'; return; }
  btn.disabled=true; ok.style.display='none';
  try{
    var r=await fetch('/api/portfolio/contact',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slug:window._portfolioSlug,name:name,email:email,message:message})});
    var d=await r.json();
    if(!r.ok) throw new Error(d.error||'Virhe');
    ok.style.display='block'; ok.style.color='#34d399';
    ok.textContent='\u2713 Viesti l\xe4hetetty! Hakija saa sen s\xe4hk\xf6postiinsa.';
    document.getElementById('contactName').value='';
    document.getElementById('contactEmail').value='';
    document.getElementById('contactMsg').value='';
  }catch(e){
    ok.style.display='block'; ok.style.color='#f87171';
    ok.textContent=e.message||'Lähetys epäonnistui.';
  }
  btn.disabled=false;
}
</script>
