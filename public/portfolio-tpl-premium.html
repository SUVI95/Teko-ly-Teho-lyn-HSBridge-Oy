<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<meta name="description" content="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--v:#7c6ef2;--v2:#5b4de0;--b:#3b82f6;--em:#10b981;--bg:#faf9f6;--bg2:#f2f0ec;--fg:#1a1a2e;--fg2:#6b6880;--fg3:#aaa8b8;--glass:rgba(255,255,255,.7);--glass2:rgba(255,255,255,.9);--bd:rgba(26,26,46,.1);--bd2:rgba(26,26,46,.2);}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--fg);font-family:'DM Sans',sans-serif;font-weight:400;line-height:1.65;overflow-x:hidden;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;background:rgba(250,249,246,.92);backdrop-filter:blur(18px);border-bottom:1px solid var(--bd);}
.nav-brand{display:flex;align-items:center;gap:.6rem;text-decoration:none;color:var(--fg);font-size:.9rem;font-weight:500;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--v);box-shadow:0 0 10px rgba(124,110,242,.45);}
.nav-links{display:flex;gap:2rem;list-style:none;}
.nav-links a{font-size:.8rem;color:var(--fg2);text-decoration:none;transition:color .2s;}
.nav-links a:hover{color:var(--fg);}
.btn-pill{background:var(--v);color:#fff;padding:.5rem 1.35rem;border-radius:999px;font-size:.8rem;font-weight:500;text-decoration:none;transition:all .2s;}
.btn-pill:hover{background:var(--v2);transform:translateY(-1px);}
#hero{min-height:100vh;display:flex;align-items:center;padding:8rem 2.5rem 5rem;position:relative;overflow:hidden;background:linear-gradient(135deg,#ede9ff 0%,#dde8fb 38%,#f0ecff 65%,#f5f9ff 100%);}
.hero-inner{max-width:1100px;margin:0 auto;width:100%;position:relative;z-index:1;display:grid;grid-template-columns:1fr 360px;gap:5rem;align-items:center;}
.orb{position:absolute;border-radius:50%;pointer-events:none;filter:blur(80px);}
.orb1{width:700px;height:700px;top:-200px;left:-200px;background:radial-gradient(circle,rgba(124,110,242,.28) 0%,transparent 65%);}
.orb2{width:800px;height:800px;bottom:-300px;right:-200px;background:radial-gradient(circle,rgba(59,130,246,.22) 0%,transparent 65%);}
.grid-bg{position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(rgba(26,26,46,.045) 1px,transparent 1px);background-size:28px 28px;mask-image:radial-gradient(ellipse at center,black 30%,transparent 75%);}
.hero-pill{display:inline-flex;align-items:center;gap:.5rem;background:rgba(255,255,255,.65);border:1px solid rgba(124,110,242,.2);border-radius:999px;padding:.35rem 1rem;font-size:.73rem;color:var(--fg2);margin-bottom:2rem;backdrop-filter:blur(8px);}
.hero-pill svg{width:13px;height:13px;color:var(--v);flex-shrink:0;}
h1{font-family:'Instrument Serif',serif;font-size:clamp(3rem,7vw,6rem);line-height:.95;letter-spacing:-.02em;margin-bottom:1.75rem;}
h1 .block{display:block;}
.grad{background:linear-gradient(135deg,#6d5ce6 0%,#7c6ef2 45%,#4f8ef0 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-style:italic;}
.hero-sub{font-size:1.05rem;color:var(--fg2);max-width:500px;line-height:1.8;margin-bottom:2.75rem;font-weight:300;}
.hero-sub strong{color:var(--fg);font-weight:500;}
.btn-row{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:4rem;}
.btn-primary{background:var(--v);color:#fff;padding:.9rem 2rem;border-radius:999px;font-size:.88rem;font-weight:500;text-decoration:none;display:inline-flex;align-items:center;gap:.6rem;transition:all .25s;}
.btn-primary:hover{background:var(--v2);transform:translateY(-2px);box-shadow:0 10px 28px rgba(124,110,242,.4);}
.blink{width:7px;height:7px;border-radius:50%;background:#fff;animation:blink 1.4s ease infinite;}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.7)}}
.btn-outline{background:rgba(255,255,255,.7);color:var(--fg);padding:.9rem 2rem;border-radius:999px;font-size:.88rem;font-weight:500;text-decoration:none;border:1px solid var(--bd);transition:all .25s;backdrop-filter:blur(8px);display:inline-flex;align-items:center;gap:.6rem;}
.btn-outline:hover{border-color:var(--bd2);background:#fff;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(26,26,46,.1);border-radius:1rem;overflow:hidden;border:1px solid rgba(26,26,46,.1);}
.stat{background:rgba(255,255,255,.6);padding:1.25rem 1.5rem;}
.stat-n{font-family:'Instrument Serif',serif;font-size:1.7rem;color:var(--fg);}
.stat-l{font-size:.7rem;color:var(--fg3);margin-top:.2rem;line-height:1.4;}
.scroll-hint{display:flex;align-items:center;gap:.5rem;margin-top:2rem;font-size:.72rem;color:var(--fg2);}
.scroll-hint svg{width:14px;height:14px;animation:bob .9s ease-in-out infinite alternate;}
@keyframes bob{from{transform:translateY(0)}to{transform:translateY(5px)}}
.photo-col{display:flex;justify-content:center;align-items:flex-start;padding-top:1.5rem;}
.photo-frame{width:300px;height:390px;border-radius:2rem;background:linear-gradient(145deg,#ece8ff 0%,#d2c9f5 45%,#bbb1ef 100%);border:1px solid rgba(124,110,242,.2);box-shadow:0 28px 64px rgba(124,110,242,.22),0 2px 8px rgba(26,26,46,.1);position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.9rem;}
.photo-frame::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 55% at 50% 20%,rgba(255,255,255,.42) 0%,transparent 65%);pointer-events:none;}
.photo-frame.has-img{background:none;border:none;box-shadow:none;}
.photo-frame.has-img::before{display:none;}
.photo-frame.has-img img{width:100%;height:100%;object-fit:cover;border-radius:2rem;box-shadow:0 28px 64px rgba(124,110,242,.22),0 2px 8px rgba(26,26,46,.1);}
.photo-avatar{width:92px;height:92px;border-radius:50%;background:linear-gradient(135deg,var(--v),var(--b));display:flex;align-items:center;justify-content:center;box-shadow:0 8px 28px rgba(124,110,242,.45);position:relative;z-index:1;}
.photo-avatar::after{content:'';position:absolute;inset:-5px;border-radius:50%;border:2px solid rgba(124,110,242,.28);}
.photo-initials{font-family:'Instrument Serif',serif;font-size:2.1rem;color:#fff;line-height:1;}
.photo-name{font-size:.7rem;color:rgba(80,60,200,.7);letter-spacing:.18em;text-transform:uppercase;font-weight:500;position:relative;z-index:1;}
.photo-hint{font-size:.61rem;color:var(--fg3);text-align:center;background:rgba(255,255,255,.8);border:1px dashed rgba(124,110,242,.22);border-radius:.5rem;padding:.35rem .8rem;backdrop-filter:blur(4px);max-width:185px;line-height:1.5;position:relative;z-index:1;display:flex;align-items:center;gap:.3rem;}
.photo-hint svg{width:11px;height:11px;color:var(--v);flex-shrink:0;}
.photo-badge{position:absolute;bottom:1.25rem;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.92);border:1px solid rgba(124,110,242,.14);border-radius:999px;padding:.38rem 1rem;display:flex;align-items:center;gap:.45rem;font-size:.7rem;font-weight:500;color:var(--fg);backdrop-filter:blur(8px);white-space:nowrap;box-shadow:0 4px 14px rgba(26,26,46,.12);}
.badge-dot{width:6px;height:6px;border-radius:50%;background:var(--em);animation:blink 2s infinite;flex-shrink:0;}
.wrap{max-width:1100px;margin:0 auto;padding:6rem 2.5rem;}
.eyebrow{font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;color:var(--fg3);margin-bottom:1rem;}
h2{font-family:'Instrument Serif',serif;font-size:clamp(2rem,4.5vw,3.25rem);line-height:1.08;margin-bottom:1.5rem;}
.lead{font-size:1rem;color:var(--fg2);line-height:1.8;font-weight:300;}
.divider{height:1px;background:rgba(26,26,46,.08);max-width:1100px;margin:0 auto;}
.alt-bg{background:linear-gradient(to bottom,var(--bg),var(--bg2) 50%,var(--bg));}
.about-grid{display:grid;grid-template-columns:4fr 6fr;gap:4rem;align-items:start;}
.chip-row{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:1.5rem;}
.chip{font-size:.73rem;padding:.3rem .85rem;border-radius:999px;background:rgba(255,255,255,.85);border:1px solid var(--bd);color:var(--fg2);}
.skills-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-top:2.5rem;}
.card{background:rgba(255,255,255,.85);border:1px solid var(--bd);border-radius:1.25rem;padding:1.75rem;transition:all .35s;box-shadow:0 1px 3px rgba(26,26,46,.06);}
.card:hover{background:#fff;border-color:var(--bd2);box-shadow:0 4px 16px rgba(26,26,46,.1);}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;}
.card-head span:first-child{font-family:'Instrument Serif',serif;font-size:1.3rem;}
.card-head span:last-child{font-size:.68rem;color:var(--fg3);}
.bar-row{margin-bottom:.85rem;}
.bar-label{display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:.4rem;}
.bar-label span:first-child{color:var(--fg);}
.bar-label span:last-child{color:var(--fg3);}
.bar-track{height:3px;border-radius:999px;background:rgba(26,26,46,.07);}
.bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--v),var(--b));width:0;transition:width 1.1s cubic-bezier(.22,1,.36,1);}
.timeline{margin-top:2.5rem;position:relative;}
.tl-rule{position:absolute;left:13px;top:8px;bottom:8px;width:1px;background:linear-gradient(to bottom,transparent,var(--bd) 12%,var(--bd) 88%,transparent);}
.tl-item{position:relative;padding-left:3.25rem;margin-bottom:1.25rem;}
.tl-node{position:absolute;left:0;top:1.6rem;width:26px;height:26px;border-radius:50%;background:var(--glass);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;}
.tl-gem{width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,var(--v),var(--b));}
.tl-date{font-size:.68rem;text-transform:uppercase;letter-spacing:.15em;color:var(--fg3);margin-bottom:.3rem;}
.tl-role{font-family:'Instrument Serif',serif;font-size:1.3rem;margin-bottom:.15rem;}
.tl-co{font-size:.8rem;color:var(--fg3);margin-bottom:.85rem;}
.tl-list{list-style:none;display:flex;flex-direction:column;gap:.4rem;}
.tl-list li{font-size:.84rem;color:var(--fg2);padding-left:1rem;position:relative;line-height:1.55;}
.tl-list li::before{content:'';position:absolute;left:0;top:.6rem;width:4px;height:4px;border-radius:50%;background:var(--v);}
.work-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:auto auto;gap:1.25rem;margin-top:2.5rem;}
.work-card{background:rgba(255,255,255,.85);border:1px solid var(--bd);border-radius:1.25rem;padding:1.5rem;transition:all .35s;position:relative;overflow:hidden;box-shadow:0 1px 3px rgba(26,26,46,.06);}
.work-card.tall{grid-row:1/3;}
.work-card:hover{background:#fff;transform:translateY(-2px);box-shadow:0 6px 20px rgba(26,26,46,.1);}
.work-card::before{content:'';position:absolute;top:-60px;right:-60px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(124,110,242,.22) 0%,transparent 65%);opacity:0;transition:opacity .4s;}
.work-card:hover::before{opacity:1;}
.wi{width:40px;height:40px;border-radius:.75rem;background:rgba(124,110,242,.12);border:1px solid rgba(124,110,242,.18);display:flex;align-items:center;justify-content:center;margin-bottom:1.25rem;}
.wi svg{width:20px;height:20px;color:var(--v);}
.wn{font-size:.68rem;color:var(--fg3);margin-top:1rem;}
.langs-split{display:grid;grid-template-columns:4fr 6fr;gap:4rem;align-items:center;}
.lang-rows{display:flex;flex-direction:column;gap:.75rem;}
.lang-row{background:rgba(255,255,255,.85);border:1px solid var(--bd);border-radius:.875rem;padding:1rem 1.25rem;display:flex;align-items:center;gap:1rem;box-shadow:0 1px 3px rgba(26,26,46,.05);}
.lang-body{flex:1;}
.lang-meta{display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:.4rem;}
.lang-meta strong{font-weight:500;}
.lang-meta span{color:var(--fg3);}
.lang-bar{height:3px;background:rgba(26,26,46,.07);border-radius:999px;overflow:hidden;}
.lang-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--v),var(--b));width:0;transition:width 1.1s cubic-bezier(.22,1,.36,1);}
.contact-card{background:linear-gradient(135deg,#ede9ff 0%,#dde8fb 50%,#f0ecff 100%);border:1px solid rgba(124,110,242,.18);border-radius:1.5rem;padding:3.5rem;position:relative;overflow:hidden;}
.contact-card::before{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(124,110,242,.09) 0%,transparent 65%);}
.contact-inner{position:relative;}
.contact-h{font-family:'Instrument Serif',serif;font-size:clamp(1.8rem,4vw,3rem);line-height:1.1;max-width:600px;margin-bottom:1.5rem;}
.contact-sub{font-size:.95rem;color:var(--fg2);max-width:460px;line-height:1.75;margin-bottom:2.25rem;font-weight:300;}
.info-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-top:2.5rem;}
.info-cell{background:rgba(255,255,255,.72);border:1px solid rgba(124,110,242,.15);border-radius:.875rem;padding:1rem 1.25rem;}
.ic-label{font-size:.62rem;text-transform:uppercase;letter-spacing:.18em;color:var(--fg3);margin-bottom:.3rem;display:flex;align-items:center;gap:.35rem;}
.ic-label svg{width:11px;height:11px;color:var(--v);}
.ic-val{font-size:.85rem;font-weight:500;color:var(--fg);}
footer{max-width:1100px;margin:0 auto;padding:1.5rem 2.5rem;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--bd);font-size:.72rem;color:var(--fg3);}
.avail{display:flex;align-items:center;gap:.4rem;}
.em-dot{width:6px;height:6px;border-radius:50%;background:var(--em);animation:blink 2s infinite;}
#chatBtn{position:fixed;bottom:1.5rem;right:1.5rem;z-index:300;background:var(--v);color:#fff;border:none;border-radius:999px;padding:.85rem 1.5rem;font-size:.85rem;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:.5rem;box-shadow:0 4px 32px rgba(124,110,242,.55);transition:all .25s;font-family:'DM Sans',sans-serif;}
#chatBtn:hover{background:var(--v2);transform:translateY(-2px);}
#chatBtn svg{width:15px;height:15px;}
#chatPanel{position:fixed;bottom:5.5rem;right:1.25rem;z-index:299;width:min(400px,calc(100vw - 2rem));background:rgba(18,18,24,.96);backdrop-filter:blur(24px);border:1px solid var(--bd);border-radius:1.25rem;overflow:hidden;display:none;flex-direction:column;height:min(580px,72vh);box-shadow:0 24px 64px rgba(0,0,0,.6);}
#chatPanel.open{display:flex;}
.cp-head{padding:1rem 1.25rem;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:.75rem;}
.cp-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--v),var(--b));display:flex;align-items:center;justify-content:center;font-family:'Instrument Serif',serif;font-size:1rem;color:#fff;position:relative;flex-shrink:0;}
.cp-online{position:absolute;bottom:-1px;right:-1px;width:10px;height:10px;border-radius:50%;background:var(--em);border:2px solid rgba(18,18,24,.96);}
.cp-name{font-size:.85rem;font-weight:500;color:#e8e6f0;}
.cp-sub{font-size:.7rem;color:var(--fg3);}
.cp-close{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--fg3);padding:.25rem;transition:color .2s;display:flex;align-items:center;}
.cp-close:hover{color:#fff;}
.cp-close svg{width:14px;height:14px;}
.cp-msgs{flex:1;overflow-y:auto;padding:1rem 1.25rem;display:flex;flex-direction:column;gap:.75rem;}
.cp-msgs::-webkit-scrollbar{width:0;}
.msg{max-width:86%;padding:.7rem 1rem;border-radius:.875rem;font-size:.84rem;line-height:1.55;}
.msg.ai{background:rgba(255,255,255,.07);border:1px solid var(--bd);align-self:flex-start;border-bottom-left-radius:.2rem;color:#e8e6f0;}
.msg.user{background:var(--v);align-self:flex-end;border-bottom-right-radius:.2rem;color:#fff;}
.typing{display:flex;gap:4px;align-items:center;padding:.65rem .9rem;}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--fg3);animation:typing 1s ease infinite;}
.typing span:nth-child(2){animation-delay:.15s;}
.typing span:nth-child(3){animation-delay:.3s;}
@keyframes typing{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.sugs{display:flex;flex-wrap:wrap;gap:.4rem;padding:.5rem 1.25rem .75rem;}
.sug{font-size:.72rem;padding:.32rem .7rem;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid var(--bd);color:var(--fg3);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
.sug:hover{background:rgba(255,255,255,.12);color:#fff;}
.cp-form{padding:.75rem 1rem;border-top:1px solid var(--bd);display:flex;gap:.5rem;align-items:center;}
#chatInput{flex:1;background:rgba(255,255,255,.06);border:1px solid var(--bd);border-radius:999px;padding:.55rem 1rem;font-size:.84rem;color:#e8e6f0;outline:none;font-family:'DM Sans',sans-serif;transition:border-color .2s;}
#chatInput::placeholder{color:var(--fg3);}
#chatInput:focus{border-color:var(--bd2);}
#chatSend{width:34px;height:34px;border-radius:50%;background:var(--v);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
#chatSend:disabled{opacity:.35;cursor:default;}
#chatSend:not(:disabled):hover{background:var(--v2);}
#chatSend svg{width:13px;height:13px;color:#fff;}
.reveal{opacity:0;transform:translateY(26px);transition:opacity .65s cubic-bezier(.22,1,.36,1),transform .65s cubic-bezier(.22,1,.36,1);}
.reveal.in{opacity:1;transform:translateY(0);}
.reveal-left{opacity:0;transform:translateX(-30px);transition:opacity .7s cubic-bezier(.22,1,.36,1),transform .7s cubic-bezier(.22,1,.36,1);}
.reveal-left.in{opacity:1;transform:translateX(0);}
.reveal-right{opacity:0;transform:translateX(30px);transition:opacity .7s cubic-bezier(.22,1,.36,1),transform .7s cubic-bezier(.22,1,.36,1);}
.reveal-right.in{opacity:1;transform:translateX(0);}
.reveal-scale{opacity:0;transform:scale(.94);transition:opacity .65s cubic-bezier(.22,1,.36,1),transform .65s cubic-bezier(.22,1,.36,1);}
.reveal-scale.in{opacity:1;transform:scale(1);}
.hero-left .hero-pill{opacity:0;transform:translateY(16px);transition:opacity .55s .1s ease,transform .55s .1s ease;}
.hero-left h1{opacity:0;transform:translateY(22px);transition:opacity .6s .22s ease,transform .6s .22s ease;}
.hero-left .hero-sub{opacity:0;transform:translateY(18px);transition:opacity .6s .36s ease,transform .6s .36s ease;}
.hero-left .btn-row{opacity:0;transform:translateY(16px);transition:opacity .6s .48s ease,transform .6s .48s ease;}
.hero-left .stats-grid{opacity:0;transform:translateY(14px);transition:opacity .6s .6s ease,transform .6s .6s ease;}
.hero-left .scroll-hint{opacity:0;transition:opacity .6s .74s ease;}
.hero-left.loaded .hero-pill,.hero-left.loaded h1,.hero-left.loaded .hero-sub,.hero-left.loaded .btn-row,.hero-left.loaded .stats-grid,.hero-left.loaded .scroll-hint{opacity:1;transform:translateY(0);}
.hero-photo{opacity:0;transform:translateX(24px) scale(.97);transition:opacity .75s .42s ease,transform .75s .42s ease;}
.hero-photo.loaded{opacity:1;transform:translateX(0) scale(1);}
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s;}
.loading-screen.hide{opacity:0;pointer-events:none;}
.ldsp{width:40px;height:40px;border:3px solid var(--bd);border-top-color:var(--v);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.not-found{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;}
.not-found h1{font-size:2rem;margin-bottom:1rem;}
.not-found a{color:var(--v);text-decoration:none;font-weight:600;}
@media(max-width:860px){
  nav{padding:0 1.25rem;}
  .nav-links{display:none;}
  .hero-inner{grid-template-columns:1fr;}
  .photo-col{display:none;}
  .about-grid,.langs-split{grid-template-columns:1fr;gap:2.5rem;}
  .skills-grid,.work-grid{grid-template-columns:1fr;}
  .work-card.tall{grid-row:auto;}
  .stats-grid{grid-template-columns:1fr 1fr;}
  .info-row{grid-template-columns:1fr;}
  .wrap{padding:4.5rem 1.25rem;}
  h1{font-size:clamp(2.5rem,10vw,3.5rem);}
  .contact-card{padding:2rem;}
}
</style>
</head>
<body>
<div class="loading-screen" id="loadingScreen"><div class="ldsp"></div></div>
<div id="app"></div>
<script>

// CHAT FUNCTIONS
var chatOpen=false;
function toggleChat(){chatOpen=!chatOpen;document.getElementById('chatPanel').classList.toggle('open',chatOpen);}
function addMsg(text,role){var m=document.getElementById('cpMsgs');var d=document.createElement('div');d.className='msg '+role;d.textContent=text;m.appendChild(d);m.scrollTop=m.scrollHeight;return d;}
function addTyping(){var m=document.getElementById('cpMsgs');var d=document.createElement('div');d.className='msg ai';d.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';m.appendChild(d);m.scrollTop=m.scrollHeight;return d;}
function quickAsk(btn){document.getElementById('chatInput').value=btn.textContent;document.getElementById('chatSend').disabled=false;sendChat();}

async function sendChat(){
var inp=document.getElementById('chatInput');var text=inp.value.trim();if(!text)return;
inp.value='';document.getElementById('chatSend').disabled=true;
var s=document.getElementById('sugs');if(s)s.style.display='none';
addMsg(text,'user');window._chatHistory.push({role:'user',content:text});
var t=addTyping();
try{
var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:window._CHAT_CTX,messages:window._chatHistory})});
var data=await res.json();var reply=(data.content&&data.content[0]&&data.content[0].text)||'Connection issue — please use the email above.';
t.remove();addMsg(reply,'ai');window._chatHistory.push({role:'assistant',content:reply});
}catch(e){t.remove();addMsg('Connection issue — please use the email above.','ai');}
}

// FAQ TOGGLE (used if FAQ section added)
