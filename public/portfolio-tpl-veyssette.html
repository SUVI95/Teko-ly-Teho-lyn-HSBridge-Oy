<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<script src="/js/portfolio-public-features.js"></script>
<script src="/portfolio-veyssette-preview.js"></script>
<script>
function slugFromPath(){
  var path=location.pathname.replace(/^\/+|\/+$/g,'');
  var seg=path.split('/').filter(Boolean);
  if(seg[0]==='portfolio'&&seg[1]) return seg[1].split('?')[0];
  if(seg.length===1) return seg[0].split('?')[0];
  return '';
}
function applyVeyssetteDraft(p){
  var wd=p.workspace_draft||{};
  if(wd.visual_style) p.visual_style=Object.assign({},p.visual_style||{},wd.visual_style);
  if(wd.images) p.images=wd.images;
  return p;
}
function showPortfolio(p){
  p=applyVeyssetteDraft(p||{});
  document.open();
  document.write(renderVeyssettePreview(p));
  document.close();
}
function showErr(msg){
  document.body.innerHTML='<p style="padding:2rem;text-align:center;font-family:system-ui,sans-serif;background:#F8F4EE;color:#2C2419">'+msg+'</p>';
}
(function(){
  var slug=slugFromPath();
  if(!slug){ showErr('Portfoliota ei löytynyt.'); return; }
  slug=slug.replace(/\/+$/,'').split('?')[0];
  var qs=new URLSearchParams(location.search);
  var isPreview=qs.get('preview')==='1';
  var pt=qs.get('pt')||'';
  var url=isPreview?'/api/portfolio/preview/'+encodeURIComponent(slug):'/api/portfolio/view/'+encodeURIComponent(slug);
  if(isPreview&&pt) url+='?pt='+encodeURIComponent(pt);
  fetch(url,{credentials:isPreview&&!pt?'include':'same-origin'}).then(function(r){return r.json();}).then(function(d){
    if(d.portfolio) showPortfolio(d.portfolio);
    else showErr(d.message||d.error||'Portfolio ei saatavilla.');
  }).catch(function(){ showErr('Virhe ladattaessa portfolioa.'); });
})();
</script>
</head>
<body></body>
</html>
