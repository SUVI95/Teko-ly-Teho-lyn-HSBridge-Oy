<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palauta salasana - HSBridge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1a2e;
  --ink2: #2d2d44;
  --paper: #f5f3ef;
  --paper2: #eeeae3;
  --warm: #e8e0d4;
  --accent: #c75b3a;
  --accent2: #2563a8;
  --accent3: #2a7a4b;
  --text: #1a1a2e;
  --muted: #6b6880;
  --border: rgba(26,26,46,0.12);
  --shadow: 0 2px 20px rgba(26,26,46,0.08);
  --shadow-md: 0 8px 40px rgba(26,26,46,0.12);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--paper);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  position: relative;
  overflow: hidden;
}

body::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 50%, rgba(199,91,58,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 30%, rgba(37,99,168,0.06) 0%, transparent 60%);
  pointer-events: none;
}

.reset-container {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3rem;
  max-width: 450px;
  width: 100%;
  box-shadow: var(--shadow-md);
  position: relative;
  z-index: 1;
}

.logo {
  text-align: center;
  margin-bottom: 2rem;
}

.logo img {
  height: 50px;
  width: auto;
  margin-bottom: 0.75rem;
}

.logo h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.5rem;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: 0.5rem;
}

.form-group {
  margin-bottom: 1.5rem;
}

label {
  display: block;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 0.5rem;
  font-family: 'DM Sans', sans-serif;
}

input {
  width: 100%;
  padding: 12px 16px;
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 1rem;
  transition: all 0.3s;
  font-family: 'DM Sans', sans-serif;
}

input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(199,91,58,0.1);
}

.btn-primary {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-weight: 600;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.3s;
  margin-top: 0.5rem;
  font-family: 'DM Sans', sans-serif;
}

.btn-primary:hover:not(:disabled) {
  background: #b34e2f;
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(199,91,58,0.35);
}

.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.error-message {
  background: rgba(199,91,58,0.1);
  border: 1px solid rgba(199,91,58,0.3);
  color: var(--accent);
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 1rem;
  font-size: 0.9rem;
  display: none;
}

.error-message.show {
  display: block;
}

.success-message {
  background: rgba(42,122,75,0.1);
  border: 1px solid rgba(42,122,75,0.3);
  color: var(--accent3);
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 1rem;
  font-size: 0.9rem;
  display: none;
}

.success-message.show {
  display: block;
}

.back-link {
  text-align: center;
  margin-top: 1.5rem;
}

.back-link a {
  color: var(--accent2);
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 500;
}

.back-link a:hover {
  text-decoration: underline;
}
</style>
</head>
<body>
  <div class="reset-container">
    <div class="logo">
      <img src="/assets/images/logo.png" alt="HSBridge Logo" onerror="this.style.display='none';" />
      <h1>Palauta salasana</h1>
    </div>
    
    <div class="error-message" id="errorMessage"></div>
    <div class="success-message" id="successMessage"></div>
    
    <form id="resetForm">
      <div class="form-group">
        <label for="password">Uusi salasana</label>
        <input type="password" id="password" name="password" required autocomplete="new-password" minlength="6">
        <small style="color: var(--muted); font-size: 0.8rem; margin-top: 0.25rem; display: block;">Vähintään 6 merkkiä</small>
      </div>
      
      <div class="form-group">
        <label for="confirmPassword">Vahvista salasana</label>
        <input type="password" id="confirmPassword" name="confirmPassword" required autocomplete="new-password" minlength="6">
      </div>
      
      <button type="submit" class="btn-primary" id="submitBtn">Vaihda salasana</button>
    </form>
    
    <div class="back-link">
      <a href="/login">← Takaisin kirjautumiseen</a>
    </div>
  </div>
  
  <script>
    const API_URL = window.location.origin + '/api';
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    
    if (!token) {
      document.getElementById('errorMessage').textContent = 'Salasanan palautuslinkki puuttuu tai on virheellinen.';
      document.getElementById('errorMessage').classList.add('show');
      document.getElementById('resetForm').style.display = 'none';
    }
    
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const submitBtn = document.getElementById('submitBtn');
      const errorMsg = document.getElementById('errorMessage');
      const successMsg = document.getElementById('successMessage');
      
      if (password !== confirmPassword) {
        errorMsg.textContent = 'Salasanat eivät täsmää';
        errorMsg.classList.add('show');
        successMsg.classList.remove('show');
        return;
      }
      
      if (password.length < 6) {
        errorMsg.textContent = 'Salasanan tulee olla vähintään 6 merkkiä';
        errorMsg.classList.add('show');
        successMsg.classList.remove('show');
        return;
      }
      
      submitBtn.disabled = true;
      submitBtn.textContent = 'Vaihdetaan...';
      errorMsg.classList.remove('show');
      
      try {
        const response = await fetch(`${API_URL}/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          successMsg.textContent = 'Salasana vaihdettu onnistuneesti! Sinut ohjataan kirjautumissivulle...';
          successMsg.classList.add('show');
          errorMsg.classList.remove('show');
          setTimeout(() => {
            window.location.href = '/login';
          }, 2000);
        } else {
          errorMsg.textContent = data.error || 'Salasanan vaihto epäonnistui';
          errorMsg.classList.add('show');
          successMsg.classList.remove('show');
        }
      } catch (error) {
        errorMsg.textContent = 'Yhteysvirhe. Yritä uudelleen hetken kuluttua.';
        errorMsg.classList.add('show');
        successMsg.classList.remove('show');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Vaihda salasana';
      }
    });
  </script>
</body>
</html>
