<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rekisteröidy - Tekoälykurssi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Space+Grotesk:wght@400;500;700&display=swap');
  
  :root {
    --bg: #050810;
    --surface: #0d1117;
    --surface2: #111827;
    --border: rgba(99,179,237,0.15);
    --accent: #63b3ed;
    --accent2: #9f7aea;
    --text: #e2e8f0;
    --muted: #718096;
  }
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  
  .register-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3rem;
    max-width: 450px;
    width: 100%;
    box-shadow: 0 0 50px rgba(99,179,237,0.1);
  }
  
  .logo {
    text-align: center;
    margin-bottom: 2rem;
  }
  
  .logo h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
  }
  
  .logo p {
    color: var(--muted);
    font-size: 0.9rem;
  }
  
  .form-group {
    margin-bottom: 1.5rem;
  }
  
  label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 0.5rem;
  }
  
  input {
    width: 100%;
    padding: 12px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 1rem;
    transition: all 0.3s;
  }
  
  input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(99,179,237,0.1);
  }
  
  .btn-primary {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    border-radius: 10px;
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 0.5rem;
  }
  
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 30px rgba(99,179,237,0.3);
  }
  
  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }
  
  .divider {
    text-align: center;
    margin: 2rem 0;
    color: var(--muted);
    font-size: 0.85rem;
    position: relative;
  }
  
  .divider::before,
  .divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 40%;
    height: 1px;
    background: var(--border);
  }
  
  .divider::before { left: 0; }
  .divider::after { right: 0; }
  
  .btn-secondary {
    width: 100%;
    padding: 14px;
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.3s;
    text-decoration: none;
    display: block;
    text-align: center;
  }
  
  .btn-secondary:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(99,179,237,0.05);
  }
  
  .error-message {
    background: rgba(254,100,100,0.1);
    border: 1px solid rgba(254,100,100,0.3);
    color: #fc8181;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 1rem;
    font-size: 0.9rem;
    display: none;
  }
  
  .error-message.show {
    display: block;
  }
  
  .success-message {
    background: rgba(104,211,145,0.1);
    border: 1px solid rgba(104,211,145,0.3);
    color: #68d391;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 1rem;
    font-size: 0.9rem;
    display: none;
  }
  
  .success-message.show {
    display: block;
  }
</style>
</head>
<body>
  <div class="register-container">
    <div class="logo">
      <h1>🤖 Tekoälykurssi</h1>
      <p>Luo tili aloittaaksesi oppimisen</p>
    </div>
    
    <div class="error-message" id="errorMessage"></div>
    <div class="success-message" id="successMessage"></div>
    
    <form id="registerForm">
      <div class="form-group">
        <label for="name">Nimi (valinnainen)</label>
        <input type="text" id="name" name="name" autocomplete="name">
      </div>
      
      <div class="form-group">
        <label for="email">Sähköposti</label>
        <input type="email" id="email" name="email" required autocomplete="email">
      </div>
      
      <div class="form-group">
        <label for="password">Salasana</label>
        <input type="password" id="password" name="password" required autocomplete="new-password" minlength="6">
      </div>
      
      <button type="submit" class="btn-primary" id="submitBtn">Luo tili</button>
    </form>
    
    <div class="divider">tai</div>
    
    <a href="/login" class="btn-secondary">Kirjaudu sisään</a>
  </div>
  
  <script>
    const API_URL = 'http://localhost:3000/api';
    
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const submitBtn = document.getElementById('submitBtn');
      const errorMsg = document.getElementById('errorMessage');
      const successMsg = document.getElementById('successMessage');
      
      submitBtn.disabled = true;
      submitBtn.textContent = 'Luodaan tiliä...';
      errorMsg.classList.remove('show');
      successMsg.classList.remove('show');
      
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      if (password.length < 6) {
        errorMsg.textContent = 'Salasanan tulee olla vähintään 6 merkkiä';
        errorMsg.classList.add('show');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Luo tili';
        return;
      }
      
      try {
        const response = await fetch(`${API_URL}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ email, password, name: name || null })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          successMsg.textContent = 'Tili luotu onnistuneesti! Ohjataan...';
          successMsg.classList.add('show');
          setTimeout(() => {
            window.location.href = '/';
          }, 1000);
        } else {
          errorMsg.textContent = data.error || 'Rekisteröinti epäonnistui';
          errorMsg.classList.add('show');
        }
      } catch (error) {
        errorMsg.textContent = 'Yhteysvirhe. Tarkista että palvelin on käynnissä.';
        errorMsg.classList.add('show');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Luo tili';
      }
    });
  </script>
</body>
</html>
