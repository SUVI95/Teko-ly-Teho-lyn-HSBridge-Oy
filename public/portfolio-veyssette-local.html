<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Elävä CV — rekrytoijan näkymä</title>
<script src="/portfolio-veyssette-preview.js"></script>
<script>
(function(){
  var KEY='ecv_veyssette_publish';
  function errPage(title,msg){
    document.write('<!DOCTYPE html><html lang="fi"><head><meta charset="UTF-8"><title>'+title+'</title></head><body style="font-family:system-ui,sans-serif;background:#F8F4EE;color:#2C2419;padding:2rem;max-width:520px;margin:auto;line-height:1.6"><h1>'+title+'</h1><p>'+msg+'</p><p><a href="/module/moduuli-elava-cv-veyssette" style="color:#A67C52">← Elävä CV — Veyssette -editori</a></p></body></html>');
  }
  var raw=localStorage.getItem(KEY)||sessionStorage.getItem(KEY);
  if(!raw){
    errPage('Portfolioa ei löytynyt','Avaa editori ja paina <strong>Koko sivu ↗</strong> tai <strong>Julkaise</strong>.');
    return;
  }
  try{
    var d=JSON.parse(raw);
    if(typeof renderVeyssettePreview!=='function') throw new Error('Esikatseluskripti puuttuu');
    document.write(renderVeyssettePreview(d.P||{}));
  }catch(e){
    errPage('Virhe',String(e.message||e));
  }
})();
</script>
</head>
</html>
