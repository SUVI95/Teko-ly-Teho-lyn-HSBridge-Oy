<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moduuli 5 – AI myynnissä ja markkinoinnissa</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Space+Grotesk:wght@400;500;700&display=swap');

  :root {
    --bg: #050810;
    --surface: #0d1117;
    --surface2: #111827;
    --border: rgba(99,179,237,0.15);
    --accent: #63b3ed;
    --accent2: #9f7aea;
    --accent3: #68d391;
    --accent4: #f6ad55;
    --text: #e2e8f0;
    --muted: #718096;
    --glow: rgba(99,179,237,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(5,8,16,0.85); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-logo { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 0.9rem; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; }
  .nav-progress { display: flex; gap: 6px; align-items: center; }
  .nav-back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.8rem;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.3s;
    margin-right: 1rem;
  }
  .nav-back-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(99,179,237,0.05);
  }

  .section { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 2rem 4rem; position: relative; z-index: 1; }
  .section-inner { max-width: 900px; width: 100%; }

  #hero { text-align: center; }
  .module-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(99,179,237,0.1); border: 1px solid rgba(99,179,237,0.3); border-radius: 100px; padding: 6px 16px; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 2rem; }

  h1.hero-title { font-family: 'Space Grotesk', sans-serif; font-size: clamp(2.5rem, 6vw, 5rem); font-weight: 700; line-height: 1.1; margin-bottom: 1.5rem; background: linear-gradient(135deg, #fff 0%, var(--accent) 50%, var(--accent2) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .hero-sub { font-size: 1.2rem; color: var(--muted); max-width: 600px; margin: 0 auto 3rem; line-height: 1.7; }

  .section-tag { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.75rem; }
  h2.section-title { font-family: 'Space Grotesk', sans-serif; font-size: clamp(1.8rem, 4vw, 3rem); font-weight: 700; line-height: 1.2; margin-bottom: 1rem; color: #fff; }
  .section-lead { font-size: 1.05rem; color: var(--muted); line-height: 1.8; margin-bottom: 3rem; max-width: 680px; }

  .placeholder-box {
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: 20px;
    padding: 4rem 2rem;
    text-align: center;
    margin: 2rem 0;
  }

  .placeholder-box h3 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.5rem;
    color: var(--accent);
    margin-bottom: 1rem;
  }

  .placeholder-box p {
    color: var(--muted);
    line-height: 1.7;
  }
</style>
</head>
<body>
  <nav>
    <div style="display: flex; align-items: center;">
      <a href="/" class="nav-back-btn">← Etusivu</a>
      <div class="nav-logo">AI Kurssi · Moduuli 5</div>
    </div>
  </nav>

  <section id="hero" class="section">
    <div class="section-inner">
      <div class="module-badge">Osa 2 · Moduuli 5</div>
      <h1 class="hero-title">AI myynnissä ja markkinoinnissa</h1>
      <p class="hero-sub">Opi käyttämään tekoälyä myynnin ja markkinoinnin vahvistamiseen</p>
    </div>
  </section>

  <section class="section" data-index="1">
    <div class="section-inner">
      <div class="placeholder-box">
        <h3>📝 Sisältö tulossa</h3>
        <p>Moduulin sisältö lisätään pian. Tarkista myöhemmin uudelleen!</p>
      </div>
    </div>
  </section>

  <script>
    const API_URL = window.location.origin + '/api';
    const MODULE_ID = 'moduuli5-ai-myynnissa-ja-markkinoinnissa';

    // Basic progress tracking (will be expanded when content is added)
    async function saveSectionProgress(sectionId, completed) {
      try {
        await fetch(`${API_URL}/progress/module/${MODULE_ID}/section/${sectionId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ completed })
        });
      } catch (error) {
        console.error('Error saving progress:', error);
      }
    }

    // Track section views
    const sectionObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const section = entry.target;
          const sectionIndex = section.getAttribute('data-index');
          if (sectionIndex) {
            saveSectionProgress(sectionIndex, false);
          }
        }
      });
    }, { threshold: 0.5 });

    document.querySelectorAll('.section[data-index]').forEach(section => {
      sectionObserver.observe(section);
    });
  </script>
</body>
</html>
